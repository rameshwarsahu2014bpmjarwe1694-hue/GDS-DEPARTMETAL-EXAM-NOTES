<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candidate Login</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#b30000,#0044cc,#008000);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:#fff;
padding:30px;
border-radius:15px;
width:90%;
max-width:380px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
text-align:center;
}

h2{
margin-bottom:20px;
color:#b30000;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:#b30000;
color:#fff;
border:none;
border-radius:8px;
font-size:17px;
font-weight:bold;
cursor:pointer;
margin-top:8px;
}

button:hover{
background:#900000;
}

a{
display:block;
margin-top:12px;
text-decoration:none;
color:#0044cc;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<div class="login-box">
<h2>Candidate Login</h2>

<input type="email" id="loginEmail" placeholder="Enter Email">
<input type="password" id="loginPassword" placeholder="Enter Password">

<button type="button" onclick="candidateLogin()">Login</button>

<a href="#" onclick="resetPassword()">Forgot Password?</a>
<a href="register.html">New User? Register</a>
<a href="index.html">⬅ Back Home</a>

</div>

<script type="module" src="firebase.js"></script>
<script defer src="script.js"></script>

<script>
function waitForFirebase(callback){
if(window.auth && window.signInWithEmailAndPassword){
callback();
}else{
setTimeout(function(){
waitForFirebase(callback);
},300);
}
}

window.resetPassword = function () {

let email = document.getElementById("loginEmail").value.trim();

if(email === ""){
alert("Please enter your registered email first.");
return;
}

waitForFirebase(function(){

import("https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js")
.then((firebaseAuth) => {

firebaseAuth.sendPasswordResetEmail(window.auth, email)
.then(() => {
alert("Password reset link sent successfully.\nPlease check your Spam folder.");
})
.catch((error) => {
alert(error.message);
});

});

});

};
</script>

</body>
</html>
