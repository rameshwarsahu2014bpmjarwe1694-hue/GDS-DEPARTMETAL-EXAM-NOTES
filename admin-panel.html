<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f4f4;
}

.topbar{
background:#000;
color:#fff;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
padding:20px;
max-width:1000px;
margin:auto;
}

.card{
background:#fff;
padding:15px;
margin:10px 0;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

button{
padding:8px 12px;
background:green;
color:#fff;
border:none;
border-radius:6px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="topbar">Admin Control Panel</div>

<div class="container">

<h2>Pending Payments</h2>
<div id="paymentList">Loading...</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
query,
where,
doc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "YOUR_DOMAIN",
projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* WHATSAPP CONFIG */
const PHONE = "91XXXXXXXXXX";
const API_KEY = "YOUR_API_KEY";

/* WHATSAPP ALERT */
function sendWhatsApp(msg){
fetch(
`https://api.callmebot.com/whatsapp.php?phone=${PHONE}&text=`+
encodeURIComponent(msg)+
`&apikey=${API_KEY}`
);
}

/* LOAD PENDING PAYMENTS */
async function loadPayments(){

const q = query(collection(db,"payments"), where("status","==","pending"));
const snap = await getDocs(q);

let html = "";

snap.forEach(d => {

const p = d.data();

html += `
<div class="card">
<b>${p.name || ""}</b><br>
Email: ${p.email || ""}<br>
Amount: ₹${p.amount || ""}<br>
Txn: ${p.txnId || ""}<br><br>

<button onclick="approve('${d.id}','${p.uid}','${p.name}','${p.amount}')">
Approve
</button>

</div>
`;
});

document.getElementById("paymentList").innerHTML =
html || "No Pending Payments";
}

/* APPROVE PAYMENT */
window.approve = async function(paymentId, uid, name, amount){

/* UPDATE PAYMENT */
await updateDoc(doc(db,"payments",paymentId),{
status:"approved",
approvedAt:Date.now()
});

/* UPDATE USER */
await updateDoc(doc(db,"candidates",uid),{
isPaidMember:true
});

/* WHATSAPP ALERT */
sendWhatsApp(
`Payment Approved
Name: ${name}
Amount: ₹${amount}
UID: ${uid}`
);

alert("Approved Successfully");

loadPayments();
};

loadPayments();

</script>

</body>
</html>
