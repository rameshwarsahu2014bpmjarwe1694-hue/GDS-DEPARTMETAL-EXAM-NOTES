<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
</head>
<body>

<h2>Pending Payments</h2>
<div id="paymentList">Loading...</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
query,
where,
doc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "YOUR_DOMAIN",
projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* LOAD PAYMENTS */
async function loadPayments(){

const q = query(collection(db,"payments"), where("status","==","pending"));
const snap = await getDocs(q);

let html = "";

snap.forEach(d => {

const p = d.data();

html += `
<div style="border:1px solid #ccc;padding:10px;margin:10px;">
<b>${p.name}</b><br>
Txn: ${p.txnId}<br>
Amount: ₹${p.amount}<br>

<button onclick="approve('${d.id}','${p.uid}','${p.name}','${p.amount}')">
Approve
</button>

</div>
`;
});

document.getElementById("paymentList").innerHTML = html;
}

/* APPROVE + FIREBASE + WHATSAPP */
window.approve = async function(paymentId, uid, name, amount){

await updateDoc(doc(db,"payments",paymentId),{
status:"approved",
approvedAt:Date.now()
});

await updateDoc(doc(db,"candidates",uid),{
isPaidMember:true
});

/* WHATSAPP ALERT */
fetch("https://api.callmebot.com/whatsapp.php?phone=ADMIN_NUMBER&text=" +
encodeURIComponent(
`Payment Approved:
Name:${name}
Amount:${amount}
UID:${uid}`
) +
"&apikey=YOUR_API_KEY");

alert("User Unlocked + WhatsApp Sent");

loadPayments();
}

loadPayments();

</script>

</body>
</html>
