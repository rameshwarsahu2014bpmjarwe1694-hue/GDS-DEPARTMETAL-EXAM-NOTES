<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
</head>
<body>

<h2>Pending Payments</h2>
<div id="paymentList">Loading...</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
query,
where,
doc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "YOUR_DOMAIN",
projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* WHATSAPP CONFIG */
const PHONE = "91XXXXXXXXXX";   // admin number
const API_KEY = "YOUR_API_KEY";

/* WHATSAPP FUNCTION */
function sendWhatsApp(message) {
  fetch(
    `https://api.callmebot.com/whatsapp.php?phone=${PHONE}&text=` +
    encodeURIComponent(message) +
    `&apikey=${API_KEY}`
  );
}

/* LOAD PAYMENTS */
async function loadPayments() {

const q = query(collection(db,"payments"), where("status","==","pending"));
const snap = await getDocs(q);

let html = "";

snap.forEach(d => {

const p = d.data();

html += `
<div style="border:1px solid #ccc;padding:10px;margin:10px;">
<b>${p.name || "User"}</b><br>
Amount: ₹${p.amount}<br>
Txn ID: ${p.txnId || "-"}<br>

<button onclick="approve('${d.id}','${p.uid}','${p.name}','${p.amount}')"
style="background:green;color:#fff;padding:8px;border:none;border-radius:6px;">
Approve
</button>

</div>
`;

});

document.getElementById("paymentList").innerHTML =
html || "No Pending Payments";
}

/* APPROVE FUNCTION */
window.approve = async function(paymentId, uid, name, amount) {

try {

/* 1. UPDATE PAYMENT */
await updateDoc(doc(db,"payments",paymentId),{
status:"approved",
approvedAt:Date.now()
});

/* 2. UPDATE USER */
await updateDoc(doc(db,"candidates",uid),{
isPaidMember:true
});

/* 3. WHATSAPP ALERT */
sendWhatsApp(
`Payment Approved ✅
Name: ${name}
Amount: ₹${amount}
UID: ${uid}`
);

alert("Approved + WhatsApp Sent");

loadPayments();

} catch (err) {
alert(err.message);
}

};

/* INIT */
loadPayments();

</script>

</body>
</html>
