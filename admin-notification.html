<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Notifications</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
body{background:#f4f6f9;padding:20px}
.wrap{
max-width:900px;margin:auto;background:#fff;padding:20px;
border-radius:12px;box-shadow:0 5px 15px rgba(0,0,0,.08)
}
h1{text-align:center;margin-bottom:20px}
.grid{display:grid;gap:12px;margin-bottom:18px}
input,textarea,select{
padding:12px;border:1px solid #ccc;border-radius:8px;
font-size:16px;outline:none
}
button{
padding:12px;border:none;border-radius:8px;
cursor:pointer;font-weight:bold
}
.save{background:#007bff;color:#fff}
.del{background:#dc3545;color:#fff;padding:8px 12px}
.card{
background:#fafafa;border:1px solid #ddd;
padding:15px;border-radius:10px;margin-bottom:12px
}
.row{
display:flex;justify-content:space-between;
gap:10px;flex-wrap:wrap
}
.badge{
display:inline-block;padding:4px 10px;border-radius:20px;
font-size:12px;font-weight:bold;background:#eaf2ff;color:#0056b3
}
.imp{
background:#ffe9e9;color:#b30000
}
.small{font-size:13px;color:#666;margin-top:6px}
</style>
</head>
<body>

<div class="wrap">
<h1>Admin Notifications</h1>

<div class="grid">
<input type="text" id="title" placeholder="Notification Title">

<textarea id="msg" rows="4" placeholder="Write message"></textarea>

<select id="type">
<option value="Normal">Normal</option>
<option value="Important">Important</option>
</select>

<button class="save" onclick="saveNotice()">Publish Notice</button>
</div>

<div id="list">Loading...</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,collection,addDoc,getDocs,
deleteDoc,doc,serverTimestamp,query,orderBy
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE CONFIG */
const firebaseConfig={
apiKey:"AIzaSyDjzmo0A4KhOkrqFQd0yCEek6bsPF-UVPQ",
authDomain:"gds-departmental-exam-studyhub.firebaseapp.com",
projectId:"gds-departmental-exam-studyhub",
storageBucket:"gds-departmental-exam-studyhub.firebasestorage.app",
messagingSenderId:"759916756080",
appId:"1:759916756080:web:7f2c0e66458bd007e888b5"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const list=document.getElementById("list");

window.saveNotice=async function(){

let title=document.getElementById("title").value.trim();
let msg=document.getElementById("msg").value.trim();
let type=document.getElementById("type").value;

if(title.length<3 || msg.length<3){
alert("Enter valid data");
return;
}

await addDoc(collection(db,"notifications"),{
title:safe(title),
msg:safe(msg),
type:type,
createdAt:serverTimestamp()
});

document.getElementById("title").value="";
document.getElementById("msg").value="";

loadData();
alert("Published");

};

async function loadData(){

const q=query(collection(db,"notifications"),orderBy("createdAt","desc"));
const snap=await getDocs(q);

list.innerHTML="";

if(snap.empty){
list.innerHTML="No notifications";
return;
}

snap.forEach(item=>{

let d=item.data();

list.innerHTML+=`
<div class="card">
<div class="row">
<div>
<span class="badge ${d.type==="Important"?"imp":""}">
${d.type}
</span>
<h3 style="margin-top:8px">${d.title}</h3>
<p class="small">${d.msg}</p>
</div>

<div>
<button class="del" onclick="deleteItem('${item.id}')">
Delete
</button>
</div>
</div>
</div>
`;

});

}

window.deleteItem=async function(id){
if(!confirm("Delete notice?")) return;
await deleteDoc(doc(db,"notifications",id));
loadData();
};

function safe(str){
return str.replace(/[&<>"']/g,m=>({
"&":"&amp;","<":"&lt;",">":"&gt;",
'"':"&quot;","'":"&#39;"
}[m]));
}

loadData();

</script>
</body>
</html>
