<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Syllabus Panel</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#f4f6f9;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

h1{
text-align:center;
margin-bottom:20px;
color:#222;
}

.input-box{
display:grid;
gap:12px;
margin-bottom:20px;
}

input,select,textarea{
padding:12px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
outline:none;
width:100%;
}

input:focus,select:focus,textarea:focus{
border-color:#007bff;
}

button{
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
font-weight:bold;
}

.save-btn{
background:#007bff;
color:#fff;
}

.save-btn:hover{
background:#0056b3;
}

.delete-btn{
background:#dc3545;
color:#fff;
padding:8px 12px;
font-size:14px;
}

.delete-btn:hover{
background:#b02a37;
}

.card{
background:#fafafa;
padding:15px;
border:1px solid #ddd;
border-radius:10px;
margin-bottom:12px;
}

.row{
display:flex;
justify-content:space-between;
gap:10px;
flex-wrap:wrap;
}

.small{
font-size:14px;
color:#666;
margin-top:5px;
word-break:break-word;
}

.secure{
text-align:center;
margin-top:15px;
font-size:13px;
color:green;
font-weight:bold;
}

.status{
text-align:center;
margin-top:10px;
font-size:14px;
font-weight:bold;
color:#333;
}
</style>
</head>
<body>

<div class="container">

<h1>Admin Syllabus Panel</h1>

<div class="input-box">

<input type="text" id="title" placeholder="Syllabus Title">

<select id="category">
<option value="">Select Category</option>
<option>MTS</option>
<option>Postman</option>
<option>PA/SA</option>
</select>

<input type="file" id="pdfFile" accept="application/pdf">

<textarea id="desc" rows="4" placeholder="Short Description"></textarea>

<button class="save-btn" onclick="saveSyllabus()">Save Syllabus</button>

<div id="statusMsg" class="status"></div>

</div>

<div id="list">Loading...</div>

<div class="secure">
Permanent Firestore Secure Storage Enabled
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
serverTimestamp,
query,
orderBy
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getStorage,
ref,
uploadBytes,
getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {
apiKey: "AIzaSyDjzmo0A4KhOkrqFQdOyCEek6bsPF-UVPQ",
authDomain: "gds-departmental-exam-studyhub.firebaseapp.com",
databaseURL: "https://gds-departmental-exam-studyhub-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "gds-departmental-exam-studyhub",
storageBucket: "gds-departmental-exam-studyhub.appspot.com",
messagingSenderId: "759916756080",
appId: "1:759916756080:web:7f2c0e66458bd007e888b5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

const list = document.getElementById("list");
const statusMsg = document.getElementById("statusMsg");

window.saveSyllabus = async function(){

const title = document.getElementById("title").value.trim();
const category = document.getElementById("category").value;
const desc = document.getElementById("desc").value.trim();
const file = document.getElementById("pdfFile").files[0];

if(title.length < 3){
alert("Enter valid title");
return;
}

if(category === ""){
alert("Select category");
return;
}

if(!file){
alert("Select PDF file");
return;
}

if(file.type !== "application/pdf"){
alert("Only PDF allowed");
return;
}

try{

statusMsg.innerText = "Uploading PDF...";
statusMsg.style.color = "#333";

const cleanName = file.name.replace(/[^a-zA-Z0-9._-]/g,"_");
const fileName = "syllabus/" + Date.now() + "_" + cleanName;

const storageRef = ref(storage,fileName);

await uploadBytes(storageRef,file);

statusMsg.innerText = "Generating Link...";

const pdfURL = await getDownloadURL(storageRef);

await addDoc(collection(db,"syllabus"),{
title: escapeHTML(title),
category: escapeHTML(category),
desc: escapeHTML(desc),
pdfLink: pdfURL,
createdAt: serverTimestamp()
});

document.getElementById("title").value = "";
document.getElementById("category").value = "";
document.getElementById("desc").value = "";
document.getElementById("pdfFile").value = "";

statusMsg.innerText = "Upload Successful";
statusMsg.style.color = "green";

alert("Syllabus Saved Permanently");

loadData();

}catch(error){

statusMsg.innerText = "Failed: " + error.message;
statusMsg.style.color = "red";

alert("Upload Failed: " + error.message);
console.log(error);

}

};

async function loadData(){

list.innerHTML = "Loading...";

try{

const q = query(collection(db,"syllabus"),orderBy("createdAt","desc"));

const snapshot = await getDocs(q);

list.innerHTML = "";

if(snapshot.empty){
list.innerHTML = "<p>No syllabus added.</p>";
return;
}

snapshot.forEach((item)=>{

const data = item.data();

list.innerHTML += `
<div class="card">
<div class="row">

<div>
<h3>${safe(data.title)}</h3>
<p>${safe(data.category)}</p>
<p class="small">${safe(data.desc || "")}</p>
<p class="small">${safe(data.pdfLink)}</p>
</div>

<div>
<button class="delete-btn" onclick="deleteItem('${item.id}')">Delete</button>
</div>

</div>
</div>
`;

});

}catch(error){
list.innerHTML = "Failed to load data";
console.log(error);
}

}

window.deleteItem = async function(id){

if(!confirm("Delete this syllabus?")) return;

await deleteDoc(doc(db,"syllabus",id));

loadData();

};

function escapeHTML(str){
return String(str).replace(/[&<>"']/g,function(m){
return ({
'&':'&amp;',
'<':'&lt;',
'>':'&gt;',
'"':'&quot;',
"'":'&#39;'
})[m];
});
}

function safe(str){
if(!str) return "";
return str;
}

loadData();

</script>

</body>
</html>
