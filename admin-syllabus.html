<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Syllabus Panel</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f4f6f9;padding:20px}
.container{
max-width:900px;margin:auto;background:#fff;padding:20px;
border-radius:12px;box-shadow:0 5px 15px rgba(0,0,0,.08)
}
h1{text-align:center;margin-bottom:20px}
.input-box{display:grid;gap:12px;margin-bottom:20px}
input,select,textarea{
padding:12px;border:1px solid #ccc;border-radius:8px;
font-size:16px;width:100%;outline:none
}
button{
padding:12px;border:none;border-radius:8px;
font-size:16px;font-weight:bold;cursor:pointer
}
.save-btn{background:#007bff;color:#fff}
.delete-btn{background:#dc3545;color:#fff}
.card{
background:#fafafa;padding:15px;border:1px solid #ddd;
border-radius:10px;margin-bottom:12px
}
.row{
display:flex;justify-content:space-between;
gap:10px;flex-wrap:wrap
}
.small{font-size:14px;color:#666;margin-top:5px}
.status{text-align:center;margin-top:10px;font-weight:bold}
</style>
</head>
<body>

<div class="container">

<h1>Admin Syllabus Panel</h1>

<div class="input-box">

<input type="text" id="title" placeholder="Syllabus Title">

<select id="category">
<option value="">Select Category</option>
<option>MTS</option>
<option>Postman</option>
<option>PA/SA</option>
</select>

<input type="text" id="fileName" placeholder="PDF File Name (Example.pdf)">

<textarea id="desc" rows="4" placeholder="Short Description"></textarea>

<button class="save-btn" onclick="saveSyllabus()">Save Syllabus</button>

<div id="statusMsg" class="status"></div>

</div>

<div id="list">Loading...</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
serverTimestamp,
query,
orderBy
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth,
signInWithEmailAndPassword,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyDjzmo0A4KhOkrqFQdOyCEek6bsPF-UVPQ",
authDomain: "gds-departmental-exam-studyhub.firebaseapp.com",
projectId: "gds-departmental-exam-studyhub",
storageBucket: "gds-departmental-exam-studyhub.appspot.com",
messagingSenderId: "759916756080",
appId: "1:759916756080:web:7f2c0e66458bd007e888b5"
};

const ADMIN_EMAIL = "rameshwarsahu2014bpmjarwe1694@gmail.com";
const ADMIN_PASS = "YOUR_ADMIN_PASSWORD";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const list = document.getElementById("list");
const statusMsg = document.getElementById("statusMsg");

/* AUTO LOGIN */
signInWithEmailAndPassword(auth, ADMIN_EMAIL, ADMIN_PASS)
.then(()=>loadData())
.catch(err=>{

statusMsg.style.color="red";
console.log(err);
});

/* SAVE */
window.saveSyllabus = async function(){

if(!auth.currentUser) return alert("Admin not logged in");

const title = val("title");
const category = val("category");
const fileName = val("fileName");
const desc = val("desc");

if(title.length < 3) return alert("Enter title");
if(category==="") return alert("Select category");
if(fileName.length < 4) return alert("Enter file name");

try{

statusMsg.innerText="Saving...";

await addDoc(collection(db,"syllabus"),{
title: esc(title),
category: esc(category),
fileName: esc(fileName),
desc: esc(desc),
createdAt: serverTimestamp()
});

clearForm();

statusMsg.innerText="Saved Permanently";
statusMsg.style.color="green";

loadData();

}catch(err){
statusMsg.innerText="Save Failed";
statusMsg.style.color="red";
console.log(err);
}

};

/* LOAD */
async function loadData(){

try{

const q=query(collection(db,"syllabus"),orderBy("createdAt","desc"));
const snap=await getDocs(q);

list.innerHTML="";

if(snap.empty){
list.innerHTML="<p>No syllabus added.</p>";
return;
}

snap.forEach(item=>{

const d=item.data();

list.innerHTML += `
<div class="card">
<div class="row">

<div>
<h3>${safe(d.title)}</h3>
<p>${safe(d.category)}</p>
<p class="small">${safe(d.desc)}</p>
<p class="small"><b>File:</b> ${safe(d.fileName)}</p>
</div>

<div>
<button class="delete-btn" onclick="deleteItem('${item.id}')">Delete</button>
</div>

</div>
</div>
`;

});

}catch(err){
list.innerHTML="Load Failed";
console.log(err);
}

}

/* DELETE */
window.deleteItem = async function(id){

if(!confirm("Delete this syllabus?")) return;

await deleteDoc(doc(db,"syllabus",id));
loadData();

};

function val(id){ return document.getElementById(id).value.trim(); }

function clearForm(){
["title","category","fileName","desc"].forEach(id=>{
document.getElementById(id).value="";
});
}

function esc(str){
return String(str).replace(/[&<>"']/g,m=>({
"&":"&amp;",
"<":"&lt;",
">":"&gt;",
'"':"&quot;",
"'":"&#39;"
}[m]));
}

function safe(str){ return str || ""; }

document.addEventListener("contextmenu",e=>e.preventDefault());

</script>
</body>
</html>
