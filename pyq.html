<!DOCTYPE html>
<html>
<head>
<title>PYQ</title>
</head>
<body>

<h2>PYQ Files</h2>
<div id="list">Loading...</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
doc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "YOUR_DOMAIN",
projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const uid = "USER_UID"; // login se replace karna

/* CHECK ACCESS */
async function checkAccess(){

const snap = await getDoc(doc(db,"candidates",uid));

return snap.data().isPaidMember;
}

/* LOAD PYQ */
async function loadPYQ(){

const access = await checkAccess();

const snap = await getDocs(collection(db,"pyqFiles"));

let html = "";

snap.forEach(d => {

const data = d.data();

html += `
<div style="border:1px solid #ddd;padding:10px;margin:10px;">
<b>${data.title}</b><br>

<button onclick="openPDF('${data.fileUrl}',${data.isPremium})">
Open PDF
</button>

</div>
`;
});

document.getElementById("list").innerHTML = html;
}

/* OPEN PDF */
window.openPDF = async function(fileUrl,isPremium){

const access = await checkAccess();

if(isPremium && !access){
alert("Payment Required");
return;
}

window.open(fileUrl,"_blank");
}

loadPYQ();

</script>

</body>
</html>
