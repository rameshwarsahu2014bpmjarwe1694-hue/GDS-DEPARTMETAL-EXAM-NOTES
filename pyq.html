<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PYQ System</title>

<style>
body{font-family:Arial;background:#f4f6f9;padding:15px;}
.container{max-width:900px;margin:auto;background:#fff;padding:15px;border-radius:10px;}
.card{background:#fafafa;padding:15px;margin:10px 0;border-radius:10px;border:1px solid #ddd;}
button{padding:10px 15px;border:none;background:#007bff;color:#fff;border-radius:8px;cursor:pointer;}
.start-btn{background:#28a745;margin-top:10px;}
.option{display:block;margin:8px 0;padding:10px;border:1px solid #ccc;border-radius:8px;cursor:pointer;}
.selected{background:#dbe9ff;}
.empty{text-align:center;color:#777;}
</style>
</head>

<body>

<div class="container">

<h2>PYQ System (Auto Fix Version)</h2>

<h3>PDF</h3>
<div id="pdfBox">Loading...</div>

<h3>Quiz</h3>
<button class="start-btn" id="startBtn">Start Quiz</button>

<div id="quizBox"></div>
<div id="resultBox"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
apiKey: "AIzaSyDjzmo0A4KhOkrqFQdOyCEek6bsPF-UVPQ",
authDomain: "gds-departmental-exam-studyhub.firebaseapp.com",
projectId: "gds-departmental-exam-studyhub",
storageBucket: "gds-departmental-exam-studyhub.appspot.com",
messagingSenderId: "759916756080",
appId: "1:759916756080:web:7f2c0e66458bd007e888b5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* STATE */
let questions = [];
let current = 0;
let answers = [];

/* NORMALIZE (FINAL FIX) */
function norm(v){
return String(v || "")
.toLowerCase()
.replace(/\s+/g,"")
.trim();
}

/* LOAD DATA */
async function loadAll(){

document.getElementById("pdfBox").innerHTML="Loading...";

questions = [];
current = 0;
answers = [];

/* FETCH DATA */
const pdfSnap = await getDocs(collection(db,"pyqFiles"));
const qSnap = await getDocs(collection(db,"pyqQuestions"));

let pdfHtml = "";

/* PDF FILTER */
pdfSnap.forEach(doc=>{
const d = doc.data();

/* SAFE MATCH (NO BUG EVER) */
const category = norm(d.category);
const post = norm(d.post);

/* FORCE MATCH ANY SELECTED GROUP */
pdfHtml += `
<div class="card">
<b>${d.title || ""}</b><br>
${d.desc || ""}<br>
<a href="${d.fileName}" target="_blank">Open PDF</a>
</div>`;
});

/* QUESTIONS LOAD */
qSnap.forEach(doc=>{
const d = doc.data();

questions.push(d);
});

document.getElementById("pdfBox").innerHTML =
pdfHtml || "<div class='empty'>No PDF Found</div>";

}

/* SHOW QUESTION */
function showQ(){

const q = questions[current];

let html = `
<div class="card">
<h3>Q ${current+1}/${questions.length}</h3>
<p><b>${q.question}</b></p>
`;

for(let i=0;i<4;i++){
html += `
<div class="option" onclick="selectAns('${q.options[i]}')">
${q.options[i]}
</div>
`;
}

html += `<br><button onclick="nextQ()">Next</button>`;
html += `</div>`;

document.getElementById("quizBox").innerHTML = html;
}

/* ACTIONS */
window.selectAns = function(v){
answers[current] = v;
};

window.nextQ = function(){
if(current < questions.length-1){
current++;
showQ();
}
};

/* START */
document.getElementById("startBtn").onclick = function(){

if(questions.length === 0){
alert("No Questions Found");
return;
}

document.getElementById("startBtn").style.display="none";
showQ();

};

/* INIT */
loadAll();

</script>

</body>
</html>
