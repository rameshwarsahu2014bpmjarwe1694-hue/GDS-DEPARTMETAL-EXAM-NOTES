<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PYQ Section</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#f4f4f4;padding:20px}
.wrap{max-width:1000px;margin:auto}
.box,.card{
background:#fff;padding:15px;border-radius:12px;
margin-bottom:14px
}
select{
width:100%;padding:12px;margin-top:10px;
border:1px solid #ccc;border-radius:10px
}
a{
display:inline-block;
padding:10px 14px;
background:#007bff;color:#fff;
text-decoration:none;border-radius:8px;
margin-top:10px;margin-right:8px
}
</style>
</head>
<body>

<div class="wrap">

<div class="box">

<select id="category" onchange="loadAll()">
<option>PYQ 2020</option>
<option>PYQ 2021</option>
<option>PYQ 2022</option>
<option>PYQ 2023</option>
<option>PYQ 2024</option>
<option>PYQ 2025</option>
<option>PYQ 2026</option>
<option>Model Paper</option>
<option>Practice Set</option>
</select>

<select id="post" onchange="loadAll()">
<option>MTS</option>
<option>POSTMAN</option>
<option>PA-SA</option>
</select>

</div>

<div id="pdfBox"></div>
<div id="questionBox"></div>

</div>

<script type="module" src="firebase.js"></script>

<script type="module">
import {
collection,getDocs,query,where
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

window.loadAll=async function(){

const category=document.getElementById("category").value;
const post=document.getElementById("post").value;

/* PDF */
let q1=query(
collection(window.db,"pyqFiles"),
where("category","==",category)
);

let snap1=await getDocs(q1);

let html1="";

snap1.forEach(doc=>{
let x=doc.data();

if(x.post && x.post!==post) return;

html1+=`
<div class="card">
<h3>${x.title}</h3>
<p>${x.description||""}</p>
<a href="${x.fileUrl}" target="_blank">📖 Open PDF</a>
<a href="${x.fileUrl}" download>⬇ Download</a>
</div>
`;
});

document.getElementById("pdfBox").innerHTML=html1 || "<div class='box'>No PDF Found</div>";

/* Questions */
let q2=query(
collection(window.db,"pyqQuestions"),
where("category","==",category)
);

let snap2=await getDocs(q2);

let html2="";
let i=1;

snap2.forEach(doc=>{
let x=doc.data();

if(x.post && x.post!==post) return;

html2+=`
<div class="card">
<b>${i}. ${x.question}</b><br><br>
A. ${x.options[0]}<br>
B. ${x.options[1]}<br>
C. ${x.options[2]}<br>
D. ${x.options[3]}<br><br>
<b>Answer:</b> ${x.answer}
</div>
`;
i++;
});

document.getElementById("questionBox").innerHTML=html2 || "<div class='box'>No Questions Found</div>";
};

loadAll();
</script>
</body>
</html>
