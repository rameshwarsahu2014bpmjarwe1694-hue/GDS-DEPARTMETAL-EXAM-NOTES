body{

.container{

h3{

.grid{

select{

.card{

a,button{

.start-btn,.nav-btn,.submit-btn{

.start-btn{
background:#28a745;
color:#fff;

.nav-btn{
background:#007bff;
color:#fff;
}

.submit-btn{
background:#dc3545;
color:#fff;

.option{

align-items:center;
gap:12px;
width:100%;

color:#111;

border:2px solid #dfe3e8;
border-radius:14px;
font-size:15px;
font-weight:600;
cursor:pointer;

}

.option::before{
content:"";
width:20px;
height:20px;
border:2px solid #9aa0a6;
border-radius:50%;
background:#fff;
}

.option:hover{
border-color:#0d6efd;
background:#f5f9ff;
}

.selected{
background:#eaf3ff !important;
border-color:#0d6efd !important;
color:#0d6efd !important;
}

.selected::before{
border-color:#0d6efd;
background:#0d6efd;
box-shadow:inset 0 0 0 4px #fff;
}

.empty{
padding:20px;
text-align:center;
font-weight:bold;
color:#666;
}
</style>
</head>

<h3>Quiz</h3>

<script type="module">
// 1. सही Firebase लिंक्स
import { initializeApp } from "https://gstatic.com";
import { getFirestore, collection, getDocs } from "https://gstatic.com";

const firebaseConfig = {
    apiKey: "AIzaSyDjzmo0A4KhOkrqFQdOyCEek6bsPF-UVPQ",
    authDomain: "gds-departmental-exam-studyhub.firebaseapp.com",
    projectId: "gds-departmental-exam-studyhub",
    storageBucket: "gds-departmental-exam-studyhub.appspot.com",
    messagingSenderId: "759916756080",
    appId: "1:759916756080:web:7f2c0e66458bd007e888b5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let questions = [];
let current = 0;
let answers = [];

async function loadAll() {
    const category = document.getElementById("pyqSelect").value;
    const post = document.getElementById("postSelect").value;
    if(!category || !post) return;

    questions = []; 
    try {
        const qSnap = await getDocs(collection(db, "pyqQuestions"));
        qSnap.forEach(doc => {
            const d = doc.data();
            // स्पेलिंग चेक: MTS, POSTMAN, PA-SA एकदम सेम होनी चाहिए
            if(d.category === category && d.post === post) questions.push(d);
        });
        console.log("Questions Loaded:", questions.length);
    } catch(e) { console.error("Firebase Error:", e); }
}

async function startQuiz() {
    if (questions.length === 0) {
        alert("इस कैटेगरी में प्रश्न नहीं मिले! कृपया Year और Post सही चुनें।");
        return;
    }
    current = 0;
    document.getElementById("startBtn").style.display = "none";
    document.getElementById("quizBox").style.display = "block";
    showQuestion();
}

function showQuestion() {
    const q = questions[current];
    document.getElementById("quizBox").innerHTML = `
        <div class="card">
            <h3>Question ${current + 1} of ${questions.length}</h3>
            <p><b>${q.question}</b></p>
            <div class="grid">
                <button class="option" onclick="selectOpt('a')">A. ${q.option_a || q.a || ''}</button>
                <button class="option" onclick="selectOpt('b')">B. ${q.option_b || q.b || ''}</button>
                <button class="option" onclick="selectOpt('c')">C. ${q.option_c || q.c || ''}</button>
                <button class="option" onclick="selectOpt('d')">D. ${q.option_d || q.d || ''}</button>
            </div>
            <button class="nav-btn" onclick="nextQ()" style="background:#007bff; color:white; padding:10px; border-radius:5px; margin-top:10px;">Next Question</button>
        </div>`;
}

async function requestAccess() {
    const email = document.getElementById('userEmail').value.trim();
    const txnId = document.getElementById('txnId').value.trim();
    if (!email || !txnId) { alert("ईमेल और Transaction ID भरें!"); return; }

    try {
        // यहाँ आपका सही Render URL एंडपॉइंट के साथ
        const res = await fetch('https://onrender.com', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, txnId })
        });
        if (res.ok) alert("✅ रिक्वेस्ट एडमिन को भेज दी गई!");
        else alert("❌ सर्वर एरर!");
    } catch (e) { alert("⚠️ सर्वर डाउन है!"); }
}

function viewSecurePDF() {
    const emailInput = document.getElementById('userEmail').value.trim();
    if (!emailInput) {
        alert("कृपया ईमेल डालें!");
        return;
    }
    // सही URL फॉर्मेट
    const url = `https://onrender.com{encodeURIComponent(emailInput)}`;
    window.open(url, '_blank');
}

// इवेंट लिसनर्स
document.getElementById("pyqSelect").addEventListener("change", loadAll);
document.getElementById("postSelect").addEventListener("change", loadAll);
document.getElementById("startBtn").addEventListener("click", startQuiz);

window.selectOpt = (opt) => { 
    answers[current] = opt; 
    alert("आपने चुना: " + opt.toUpperCase()); 
};

window.nextQ = () => { 
    if (current < questions.length - 1) { 
        current++; 
        showQuestion(); 
    } else { 
        alert("क्विज समाप्त!"); 
        location.reload(); 
    } 
};

window.requestAccess = requestAccess;
window.viewSecurePDF = viewSecurePDF;

</script>
