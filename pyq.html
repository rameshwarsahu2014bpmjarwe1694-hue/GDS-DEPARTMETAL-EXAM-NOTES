
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PYQ - Previous Year Questions</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f6f8;
}

.topbar{
background:#111;
color:#fff;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
padding:20px;
max-width:900px;
margin:auto;
}

.welcome{
background:#fff;
padding:16px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
margin-bottom:18px;
font-size:18px;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
}

.card{
background:#fff;
padding:18px;
border-radius:14px;
text-align:center;
font-weight:bold;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
text-decoration:none;
color:#111;
cursor:pointer;
}

.card:hover{
transform:translateY(-2px);
transition:0.2s;
}

.back{
display:block;
margin-top:22px;
background:#111;
color:#fff;
padding:12px;
text-align:center;
border-radius:10px;
text-decoration:none;
font-weight:bold;
}

@media(min-width:700px){
.grid{
grid-template-columns:repeat(3,1fr);
}
}
</style>
</head>

<body>

<div class="topbar">📄 Previous Year Questions</div>

<div class="container">

<div class="welcome" id="welcomeBox">
Loading...
</div>

<div class="grid">

<a href="pdf/pyq-2021.pdf" target="_blank" class="card">📘 PYQ 2021</a>

<a href="pdf/pyq-2022.pdf" target="_blank" class="card">📘 PYQ 2022</a>

<a href="pdf/pyq-2023.pdf" target="_blank" class="card">📘 PYQ 2023</a>

<a href="pdf/pyq-2024.pdf" target="_blank" class="card">📘 PYQ 2024</a>

<a href="pdf/model-paper.pdf" target="_blank" class="card">📝 Model Paper</a>

<a href="pdf/practice-set.pdf" target="_blank" class="card">🏆 Practice Set</a>

</div>

<a href="dashboard.html" class="back">⬅ Back to Dashboard</a>

</div>

<script type="module" src="firebase.js"></script>

<script type="module">

import {
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

function waitForFirebase(){
if(window.auth){
checkLogin();
}else{
setTimeout(waitForFirebase,300);
}
}

function checkLogin(){

onAuthStateChanged(window.auth,(user)=>{

if(!user){
alert("Please login first.");
window.location.href="login.html";
return;
}

let name = user.email.split("@")[0];

document.getElementById("welcomeBox").innerHTML =
"Welcome " + name + " 👋 ",

});

}

waitForFirebase();

</script>

</body>
</html>
