<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>PYQ Section - Fixed</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #f4f6f9; padding: 15px; }
        .container { max-width: 800px; margin: auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,.1); }
        h1 { text-align: center; margin-bottom: 20px; color: #333; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; margin-bottom: 10px; }
        .card { background: #fafafa; border: 1px solid #ddd; padding: 15px; border-radius: 10px; margin-top: 15px; }
        .option { display: block; width: 100%; text-align: left; padding: 12px; margin: 8px 0; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; background: #fff; font-weight: bold; }
        .option:hover { border-color: #007bff; background: #f0f7ff; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: #fff; margin-top: 10px; width: 100%; transition: 0.3s; }
        .btn-pay { background: #ff9800; text-decoration: none; display: inline-block; text-align: center; }
        .btn-request { background: #28a745; }
        .btn-open { background: #007bff; }
        .btn-start { background: #6f42c1; }
        .btn-nav { background: #333; width: auto; margin-right: 10px; padding: 8px 20px; }
        #pdfBox { text-align: center; font-weight: bold; color: #007bff; margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>Previous Year Questions</h1>

    <div class="grid">
        <select id="pyqSelect">
            <option value="" selected disabled>Select Year</option>
            <option value="PYQ 2020">PYQ 2020</option>
            <option value="PYQ 2021">PYQ 2021</option>
            <option value="PYQ 2022">PYQ 2022</option>
            <option value="PYQ 2023">PYQ 2023</option>
            <option value="PYQ 2024">PYQ 2024</option>
            <option value="Model Paper">Model Paper</option>
        </select>
        <select id="postSelect">
            <option value="" selected disabled>Select Post</option>
            <option value="MTS">MTS</option>
            <option value="POSTMAN">POSTMAN</option>
            <option value="PA-SA">PA-SA</option>
        </select>
    </div>

    <div id="pdfBox">Select Year and Post to load questions</div>

    <div class="card" style="text-align: center;">
        <h2>🔒 Content Locked</h2>
        <p style="margin: 10px 0;">Unlock PDF for ₹9</p>
        <a href="upi://pay?pa=7489956942@postbank&pn=Rameshwar_SAHU&am=9&cu=INR" class="btn btn-pay">Pay ₹9 via UPI</a>
        <div style="margin-top:15px;">
            <input type="email" id="userEmail" placeholder="Enter your Email">
            <input type="text" id="txnId" placeholder="Transaction ID (UTR)">
            <button class="btn btn-request" id="reqBtn">Request Access</button>
            <button class="btn btn-open" id="openBtn">Open PDF (Check Access)</button>
        </div>
    </div>

    <hr style="margin: 25px 0;">
    <h3>Quiz Section</h3>
    <button class="btn btn-start" id="startBtn">Start Quiz</button>
    <div id="quizBox" style="display:none;"></div>
</div>

<script type="module">
    // Firebase SDK standard CDN links
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDjzmo0A4KhOkrqFQdOyCEek6bsPF-UVPQ",
        authDomain: "gds-departmental-exam-studyhub.firebaseapp.com",
        projectId: "gds-departmental-exam-studyhub",
        storageBucket: "gds-departmental-exam-studyhub.appspot.com",
        messagingSenderId: "759916756080",
        appId: "1:759916756080:web:7f2c0e66458bd007e888b5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let questions = [];
    let current = 0;

    // Load Data Function
    async function loadAll() {
        const category = document.getElementById("pyqSelect").value;
        const post = document.getElementById("postSelect").value;
        if (!category || !post) return;

        document.getElementById("pdfBox").innerHTML = "Searching Data...";
        questions = [];

        try {
            // Optimized query for better performance
            const q = query(collection(db, "pyqQuestions"), 
                            where("category", "==", category), 
                            where("post", "==", post));
            
            const qSnap = await getDocs(q);
            qSnap.forEach(doc => {
                questions.push(doc.data());
            });

            if(questions.length > 0) {
                document.getElementById("pdfBox").innerHTML = `✅ ${questions.length} Questions Loaded!`;
            } else {
                document.getElementById("pdfBox").innerHTML = "❌ No Data Found.";
            }
        } catch (e) { 
            console.error(e); 
            document.getElementById("pdfBox").innerHTML = "Error loading data.";
        }
    }

    // Quiz Functions
    function startQuiz() {
        if (questions.length === 0) { alert("Please select Year/Post first!"); return; }
        current = 0;
        document.getElementById("startBtn").style.display = "none";
        document.getElementById("quizBox").style.display = "block";
        showQuestion();
    }

    function showQuestion() {
        const q = questions[current];
        const quizBox = document.getElementById("quizBox");
        quizBox.innerHTML = `
            <div class="card">
                <h3>Q${current + 1}: ${q.question}</h3>
                <button class="option" id="optA">A. ${q.option_a || q.a}</button>
                <button class="option" id="optB">B. ${q.option_b || q.b}</button>
                <button class="option" id="optC">C. ${q.option_c || q.c}</button>
                <button class="option" id="optD">D. ${q.option_d || q.d}</button>
                <div style="display:flex; gap:10px;">
                    <button class="btn btn-nav" id="nextBtn">Next Question</button>
                </div>
            </div>`;

        // Add event listeners to new elements
        document.getElementById("optA").onclick = () => alert("Selected A");
        document.getElementById("optB").onclick = () => alert("Selected B");
        document.getElementById("optC").onclick = () => alert("Selected C");
        document.getElementById("optD").onclick = () => alert("Selected D");
        document.getElementById("nextBtn").onclick = nextQ;
    }

    function nextQ() {
        if (current < questions.length - 1) { 
            current++; 
            showQuestion(); 
        } else { 
            alert("Quiz Finished!"); 
            location.reload(); 
        }
    }

    // Request Access
    async function requestAccess() {
        const email = document.getElementById('userEmail').value.trim();
        const txnId = document.getElementById('txnId').value.trim();
        if (!email || !txnId) { alert("Fill Email and Txn ID!"); return; }

        try {
            const res = await fetch('https://payment-backend-2-g6go.onrender.com/request-access', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, txnId })
            });
            if (res.ok) alert("✅ Request Sent to Admin!");
            else alert("❌ Server Error!");
        } catch (e) { alert("⚠️ Connection Error!"); }
    }

    function viewSecurePDF() {
        const email = document.getElementById('userEmail').value.trim();
        if (!email) { alert("Enter Email!"); return; }
        // Corrected URL syntax
        window.open(`https://payment-backend-2-g6go.onrender.com/view-pdf?email=${encodeURIComponent(email)}`, '_blank');
    }

    // Assigning events correctly for modules
    document.getElementById("pyqSelect").addEventListener("change", loadAll);
    document.getElementById("postSelect").addEventListener("change", loadAll);
    document.getElementById("startBtn").addEventListener("click", startQuiz);
    document.getElementById("reqBtn").addEventListener("click", requestAccess);
    document.getElementById("openBtn").addEventListener("click", viewSecurePDF);

</script>

</body>
</html>
