<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PYQ Section</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#f4f4f4}
.topbar{background:#000;color:#fff;padding:15px;text-align:center;font-size:20px;font-weight:bold}
.container{max-width:1000px;margin:auto;padding:20px}
.box{
background:#fff;padding:18px;border-radius:14px;
box-shadow:0 4px 10px rgba(0,0,0,.08);margin-bottom:18px
}
select{
width:100%;padding:12px;margin-top:10px;
border:1px solid #ccc;border-radius:10px
}
.card{
background:#fff;padding:15px;border-radius:12px;
margin-bottom:14px;box-shadow:0 4px 10px rgba(0,0,0,.08)
}
a{
display:inline-block;
padding:10px 14px;
background:#007bff;color:#fff;
text-decoration:none;border-radius:8px;
margin-top:10px;margin-right:8px
}
.back{
display:block;text-align:center;text-decoration:none;
background:#111;color:#fff;padding:12px;border-radius:10px;
font-weight:bold;margin-top:18px
}
</style>
</head>
<body>

<div class="topbar">📘 Previous Year Questions</div>

<div class="container">

<div class="box">

<select id="category" onchange="loadData()">
<option>PYQ 2020</option>
<option>PYQ 2021</option>
<option>PYQ 2022</option>
<option>PYQ 2023</option>
<option>PYQ 2024</option>
<option>PYQ 2025</option>
<option>PYQ 2026</option>
<option>Model Paper</option>
<option>Practice Set</option>
</select>

<select id="post" onchange="loadData()">
<option>MTS</option>
<option>POSTMAN</option>
<option>PA-SA</option>
</select>

</div>

<div id="list">Loading...</div>

<a href="dashboard.html" class="back">⬅ Back</a>

</div>

<script type="module" src="firebase.js"></script>

<script type="module">
import {
collection,getDocs,query,where
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

window.loadData=async function(){

const category=document.getElementById("category").value;
const post=document.getElementById("post").value;
const list=document.getElementById("list");

list.innerHTML="Loading...";

const q=query(
collection(window.db,"pyqFiles"),
where("category","==",category),
where("post","==",post)
);

const snap=await getDocs(q);

if(snap.empty){
list.innerHTML="<div class='box'>No PDF Found</div>";
return;
}

let html="";

snap.forEach(doc=>{
const x=doc.data();

html+=`
<div class="card">
<h3>${x.title}</h3>
<p>${x.description||""}</p>
<p><b>${x.fileName}</b></p>

<a href="${x.fileUrl}" target="_blank">📖 Open PDF</a>
<a href="${x.fileUrl}" download>⬇ Download</a>
</div>
`;
});

list.innerHTML=html;
};

loadData();
</script>

</body>
</html>
