<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PYQ Section</title>
<style>
/* ... (आपका पूरा पुराना CSS यहाँ रहेगा) ... */
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#f4f6f9;padding:15px;}
.container{max-width:1000px;margin:auto;background:#fff;padding:18px;border-radius:12px;box-shadow:0 5px 15px rgba(0,0,0,.08);}
h1{text-align:center;margin-bottom:18px;font-size:28px;}
h3{margin:18px 0 10px;}
.grid{display:grid;gap:12px;}
select{width:100%;padding:12px;border:1px solid #ccc;border-radius:8px;font-size:16px;}
.card{background:#fafafa;border:1px solid #ddd;border-radius:10px;padding:15px;margin-bottom:12px;}
.small{font-size:14px;color:#666;margin-top:6px;line-height:1.5;}
a,button{display:inline-block;padding:10px 14px;border:none;border-radius:8px;cursor:pointer;text-decoration:none;font-weight:bold;margin-top:10px;}
a{background:#007bff;color:#fff;}
.start-btn,.nav-btn,.submit-btn{margin-right:10px;padding:10px 16px;border-radius:10px;}
.start-btn{background:#28a745;color:#fff;}
.nav-btn{background:#007bff;color:#fff;}
.submit-btn{background:#dc3545;color:#fff;}
.option{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:#fff;color:#111;margin:10px 0;padding:14px 16px;border:2px solid #dfe3e8;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;transition:.18s;}
.option::before{content:"";width:20px;height:20px;border:2px solid #9aa0a6;border-radius:50%;background:#fff;}
.option:hover{border-color:#0d6efd;background:#f5f9ff;}
.selected{background:#eaf3ff !important;border-color:#0d6efd !important;color:#0d6efd !important;}
.selected::before{border-color:#0d6efd;background:#0d6efd;box-shadow:inset 0 0 0 4px #fff;}
.empty{padding:20px;text-align:center;font-weight:bold;color:#666;}
</style>
</head>
<body>

<div class="container">
<h1>Previous Year Questions</h1>

<!-- CONTENT BOX - यह तभी दिखेगा जब पेमेंट होगा -->
<div id="paymentGuard" style="display:none;">
    <div class="grid">
    <select id="pyqSelect">
    <option value="" selected disabled>Select PYQ Year</option>
    <option>PYQ 2020</option>
    <option>PYQ 2021</option>
    <option>PYQ 2022</option>
    <option>PYQ 2023</option>
    <option>PYQ 2024</option>
    <option>PYQ 2025</option>
    <option>PYQ 2026</option>
    <option>Model Paper</option>
    <option>Practice Set</option>
    </select>

    <select id="postSelect">
    <option value="" selected disabled>Select Post Category</option>
    <option>MTS</option>
    <option>POSTMAN</option>
    <option>PA-SA</option>
    </select>
    </div>

    <h3>PDF Files</h3>
    <div id="pdfBox">Select Year and Category...</div>

    <h3>Quiz</h3>
    <button class="start-btn" id="startBtn">Start Quiz</button>

    <div id="quizBox" style="display:none;"></div>
    <div id="resultBox" style="display:none;"></div>
</div>

<!-- RESTRICTED MESSAGE -->
<div id="restrictedMsg" style="display:none; text-align:center; padding:30px;">
    <h2 style="color:red;">Premium Content!</h2>
    <p>कृपया इस सेक्शन को देखने के लिए सब्सक्रिप्शन लें।</p>
    <a href="index.html" style="background:#333;">Home पर जाएँ</a>
</div>

</div>

<script type="module">
import { initializeApp } from "https://gstatic.com";
import { getAuth, onAuthStateChanged } from "https://gstatic.com";
import { getFirestore, collection, getDocs, doc, getDoc } from "https://gstatic.com";

const firebaseConfig = {
    apiKey: "AIzaSyDjzmo0A4KhOkrqFQdOyCEek6bsPF-UVPQ",
    authDomain: "://firebaseapp.com",
    projectId: "gds-departmental-exam-studyhub",
    storageBucket: "://appspot.com",
    messagingSenderId: "759916756080",
    appId: "1:759916756080:web:7f2c0e66458bd007e888b5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// --- OLD GLOBAL VARIABLES ---
let questions = [];
let current = 0;
let answers = [];

function val(id){ return document.getElementById(id).value.trim(); }
function safe(v){ return v || ""; }
function esc(v){ return String(v || "").replace(/'/g,"\\'"); }

// --- AUTH & PAYMENT CHECK ---
onAuthStateChanged(auth, async (user) => {
    if (user) {
        const docSnap = await getDoc(doc(db, "candidates", user.uid));
        if (docSnap.exists() && docSnap.data().status === "paid") {
            document.getElementById("paymentGuard").style.display = "block";
            document.getElementById("restrictedMsg").style.display = "none";
        } else {
            document.getElementById("paymentGuard").style.display = "none";
            document.getElementById("restrictedMsg").style.display = "block";
        }
    } else {
        alert("Please Login First");
        window.location.href = "login.html";
    }
});

/* OLD LOAD DATA FUNCTION */
async function loadAll(){
    document.getElementById("pdfBox").innerHTML="Loading...";
    document.getElementById("quizBox").style.display="none";
    document.getElementById("resultBox").style.display="none";
    document.getElementById("startBtn").style.display="inline-block";

    questions=[]; current=0; answers=[];
    const category=val("pyqSelect");
    const post=val("postSelect");

    /* PDF */
    const pdfSnap=await getDocs(collection(db,"pyqFiles"));
    let pdfHtml="";
    pdfSnap.forEach(doc=>{
        const d=doc.data();
        if(d.category!==category || d.post!==post) return;
        pdfHtml+=`<div class="card"><b>${safe(d.title)}</b><div class="small">${safe(d.desc)}</div><a href="${safe(d.fileName)}" target="_blank">Open PDF</a></div>`;
    });
    document.getElementById("pdfBox").innerHTML= pdfHtml || "<div class='empty'>No PDF Found</div>";

    /* QUESTIONS */
    const qSnap=await getDocs(collection(db,"pyqQuestions"));
    let temp=[];
    qSnap.forEach(doc=>{
        const d=doc.data();
        if(d.category===category && d.post===post) temp.push(d);
    });

    questions=temp.sort((a,b)=>{
        const na=parseInt(String(a.question).match(/^\d+/)?.[0] || 9999);
        const nb=parseInt(String(b.question).match(/^\d+/)?.[0] || 9999);
        return na-nb;
    }).map((item,index)=>{
        let cleanQ=String(item.question || "").replace(/^\d+[\).\-\s:]*/,"").trim();
        return{ ...item, question:cleanQ, serial:index+1 };
    });
}

/* OLD START QUIZ */
window.startQuiz = function(){
    if(questions.length===0){ alert("No Questions Found"); return; }
    document.getElementById("startBtn").style.display="none";
    document.getElementById("quizBox").style.display="block";
    showQuestion();
}

/* OLD SHOW QUESTION */
function showQuestion(){
    const q=questions[current];
    let html=`<div class="card"><h3>Question ${q.serial} / ${questions.length}</h3><p><b>${safe(q.question)}</b></p>`;
    for(let i=0;i<4;i++){
        const op=safe(q.options?.[i]);
        const active=answers[current]===op ? "selected":"";
        html+=`<button class="option ${active}" onclick="selectAns('${esc(op)}')">${String.fromCharCode(65+i)}. ${op}</button>`;
    }
    html+=`<br>${current>0 ? '<button class="nav-btn" onclick="prevQ()">Previous</button>':''} ${current<questions.length-1 ? '<button class="nav-btn" onclick="nextQ()">Next</button>':''} <button class="submit-btn" onclick="submitQuiz()">Submit</button></div>`;
    document.getElementById("quizBox").innerHTML=html;
}

// --- GLOBAL ACTIONS (OLD STYLE) ---
window.selectAns=function(v){ answers[current]=v; showQuestion(); };
window.nextQ=function(){ current++; showQuestion(); };
window.prevQ=function(){ current--; showQuestion(); };

window.submitQuiz=function(){
    let score=0; let review="";
    questions.forEach((q,i)=>{
        const user=answers[i] || "Not Answered";
        const ok=user===safe(q.answer);
        if(ok) score++;
        review+=`<div class="card" style="border-left:6px solid ${ok?'#28a745':'#dc3545'};"><b>Q${q.serial}. ${safe(q.question)}</b><div class="small">Correct: ${safe(q.answer)} | Yours: ${user}</div></div>`;
    });
    document.getElementById("quizBox").style.display="none";
    document.getElementById("resultBox").style.display="block";
    document.getElementById("resultBox").innerHTML=`<div class="card"><h2>Score: ${score}/${questions.length}</h2><button class="start-btn" onclick="location.reload()">Restart</button></div>${review}`;
};

// --- EVENTS ---
document.getElementById("pyqSelect").addEventListener("change",loadAll);
document.getElementById("postSelect").addEventListener("change",loadAll);
document.getElementById("startBtn").addEventListener("click", window.startQuiz);

</script>
</body>
</html>
