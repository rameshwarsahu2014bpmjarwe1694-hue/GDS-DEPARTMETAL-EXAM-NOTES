<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PYQ System</title>

<style>
body{font-family:Arial;background:#f4f6f9;padding:15px}
.container{max-width:900px;margin:auto;background:#fff;padding:20px;border-radius:12px}
.card{padding:15px;border:1px solid #ddd;border-radius:10px;margin:10px 0}
select,button{padding:10px;margin:5px}
button{background:green;color:#fff;border:none;border-radius:8px;cursor:pointer}
</style>
</head>

<body>

<div class="container">

<h2>📘 PYQ System</h2>

<select id="category">
<option value="">Select Year</option>
<option>PYQ 2020</option>
<option>PYQ 2021</option>
<option>PYQ 2022</option>
<option>PYQ 2023</option>
<option>PYQ 2024</option>
<option>PYQ 2025</option>
<option>PYQ 2026</option>
<option>Model Paper</option>
<option>Practice Set</option>
</select>

<select id="post">
<option value="">Select Post</option>
<option>MTS</option>
<option>POSTMAN</option>
<option>PA-SA</option>
</select>

<button onclick="loadData()">Load Data</button>

<hr>

<h3>📄 PDFs</h3>
<div id="pdfBox">Select filters</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDjzmo0A4KhOkrqFQdOyCEek6bsPF-UVPQ",
authDomain: "gds-departmental-exam-studyhub.firebaseapp.com",
projectId: "gds-departmental-exam-studyhub"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* SAFE VALUE */
function val(id){
return document.getElementById(id).value.trim();
}

/* IMPORTANT FIX: EXACT MATCH (NO NORMALIZATION) */
window.loadData = async function(){

const category = val("category");
const post = val("post");

if(!category || !post){
alert("Select category & post");
return;
}

let pdfHTML = "";

const pdfSnap = await getDocs(collection(db,"pyqFiles"));

pdfSnap.forEach(d=>{
let data = d.data();

/* EXACT MATCH (same as admin save) */
if(data.category !== category) return;
if(data.post !== post) return;

pdfHTML += `
<div class="card">
<b>📌 ${data.title}</b>
<div>📄 ${data.fileName}</div>
<div>📝 ${data.desc}</div>
</div>
`;
});

document.getElementById("pdfBox").innerHTML =
pdfHTML || "No PDF Found";

};

</script>

</body>
</html>
