<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>PYQ Hub - Official Exam Study</title>
    <style>
        :root { --primary: #007bff; --success: #28a745; --warning: #ff9800; --dark: #2c3e50; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background: #f0f2f5; padding: 15px; color: #333; line-height: 1.6; }
        .container { max-width: 600px; margin: auto; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        
        h1 { text-align: center; color: var(--dark); margin-bottom: 20px; font-size: 22px; border-bottom: 3px solid var(--primary); display: inline-block; width: 100%; padding-bottom: 10px; }
        
        .selector-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        select, input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; outline: none; font-size: 15px; }
        select:focus, input:focus { border-color: var(--primary); }

        .status-bar { text-align: center; font-size: 14px; font-weight: bold; margin-bottom: 15px; padding: 8px; border-radius: 5px; display: none; }
        
        .card { background: #fafafa; border: 1px solid #eee; padding: 15px; border-radius: 12px; margin-top: 15px; }
        .card h3 { font-size: 18px; margin-bottom: 10px; color: var(--dark); }

        .btn { padding: 13px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: #fff; width: 100%; font-size: 16px; transition: 0.3s; margin-top: 8px; }
        .btn-pay { background: var(--warning); text-decoration: none; display: block; text-align: center; }
        .btn-request { background: var(--success); }
        .btn-open { background: var(--primary); }
        .btn-start { background: #6f42c1; margin-top: 20px; }

        .option { display: block; width: 100%; text-align: left; padding: 12px; margin: 8px 0; border: 2px solid #ddd; border-radius: 8px; background: #fff; cursor: pointer; font-weight: 500; }
        .option:hover { background: #eef2f7; border-color: var(--primary); }
        
        .q-num { color: #e74c3c; font-weight: bold; font-size: 14px; display: block; margin-bottom: 5px; }
        .loading { color: #777; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1>Previous Year Questions</h1>

    <div class="selector-grid">
        <select id="yearSelect">
            <option value="" disabled selected>वर्ष चुनें</option>
            <option value="PYQ 2020">PYQ 2020</option>
            <option value="PYQ 2021">PYQ 2021</option>
            <option value="PYQ 2022">PYQ 2022</option>
            <option value="PYQ 2023">PYQ 2023</option>
            <option value="PYQ 2024">PYQ 2024</option>
        </select>
        <select id="postSelect">
            <option value="" disabled selected>पोस्ट चुनें</option>
            <option value="MTS">MTS</option>
            <option value="POSTMAN">POSTMAN</option>
            <option value="PA-SA">PA-SA</option>
        </select>
    </div>

    <div id="statusBox" class="status-bar"></div>

    <div class="card">
        <h3>🔒 Unlock PDF Section</h3>
        <p style="font-size: 13px; color: #666; margin-bottom: 10px;">PDF अनलॉक करने के लिए ₹9 का भुगतान करें और UTR दर्ज करें।</p>
        <a href="upi://pay?pa=7489956942@postbank&pn=Rameshwar_SAHU&am=9&cu=INR" class="btn btn-pay">Pay ₹9 via UPI</a>
        
        <input type="email" id="userEmail" placeholder="अपना रजिस्टर्ड ईमेल डालें" style="margin-top:15px;">
        <input type="text" id="txnId" placeholder="Transaction UTR / ID">
        
        <button class="btn btn-request" id="reqBtn">Request Access</button>
        <button class="btn btn-open" id="openPdfBtn">Open PDF (Check Access)</button>
    </div>

    <button class="btn btn-start" id="startQuizBtn">Start MCQ Practice</button>
    
    <div id="quizDisplay" style="display:none; margin-top:20px;">
        </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyDjzmo0A4KhOkrqFQdOyCEek6bsPF-UVPQ",
        authDomain: "gds-departmental-exam-studyhub.firebaseapp.com",
        projectId: "gds-departmental-exam-studyhub",
        storageBucket: "gds-departmental-exam-studyhub.appspot.com",
        messagingSenderId: "759916756080",
        appId: "1:759916756080:web:7f2c0e66458bd007e888b5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const BACKEND_URL = "https://payment-backend-2-g6go.onrender.com";

    let allQuestions = [];
    let currentIdx = 0;

    // 1. Data Loading Logic (With Sorting)
    async function fetchQuestions() {
        const year = document.getElementById("yearSelect").value;
        const post = document.getElementById("postSelect").value;
        const status = document.getElementById("statusBox");

        if (!year || !post) return;

        status.style.display = "block";
        status.style.background = "#e1f5fe";
        status.innerHTML = "<span class='loading'>डेटा लोड हो रहा है...</span>";

        try {
            // Firestore Query with Sorting
            const q = query(
                collection(db, "pyqQuestions"),
                where("category", "==", year),
                where("post", "==", post),
                orderBy("q_no", "asc") // Ensure 'q_no' is a NUMBER in Firestore
            );

            const querySnapshot = await getDocs(q);
            allQuestions = [];
            querySnapshot.forEach((doc) => {
                allQuestions.push(doc.data());
            });

            if (allQuestions.length > 0) {
                status.style.background = "#d4edda";
                status.innerHTML = `✅ ${allQuestions.length} सवाल क्रम में मिले!`;
            } else {
                status.style.background = "#fff3cd";
                status.innerHTML = "❌ इस कैटेगरी में कोई सवाल नहीं मिला।";
            }
        } catch (error) {
            console.error("Firestore Error:", error);
            status.innerHTML = "⚠️ Sorting Error: Firestore Index बनाना होगा या q_no चेक करें।";
        }
    }

    // 2. Quiz Rendering
    function renderQuiz() {
        if (allQuestions.length === 0) return alert("पहले साल और पोस्ट चुनें!");
        
        const quizDisplay = document.getElementById("quizDisplay");
        const q = allQuestions[currentIdx];

        quizDisplay.innerHTML = `
            <div class="card">
                <span class="q-num">प्रश्न संख्या: ${q.q_no || currentIdx + 1}</span>
                <p style="font-weight:bold; font-size:16px;">${q.question}</p>
                <button class="option" onclick="this.style.background='#d1ecf1'">A. ${q.option_a || q.a}</button>
                <button class="option" onclick="this.style.background='#d1ecf1'">B. ${q.option_b || q.b}</button>
                <button class="option" onclick="this.style.background='#d1ecf1'">C. ${q.option_c || q.c}</button>
                <button class="option" onclick="this.style.background='#d1ecf1'">D. ${q.option_d || q.d}</button>
                <button class="btn btn-open" id="nextQBtn" style="background:#333;">अगला सवाल →</button>
            </div>
        `;

        document.getElementById("nextQBtn").onclick = () => {
            if (currentIdx < allQuestions.length - 1) {
                currentIdx++;
                renderQuiz();
            } else {
                alert("अभ्यास पूर्ण हुआ!");
                location.reload();
            }
        };
    }

    // 3. Backend Functions
    async function requestAccess() {
        const email = document.getElementById("userEmail").value.trim();
        const txnId = document.getElementById("txnId").value.trim();

        if (!email || !txnId) return alert("ईमेल और UTR भरें!");

        try {
            const response = await fetch(`${BACKEND_URL}/request-access`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, txnId })
            });
            if (response.ok) alert("✅ रिक्वेस्ट भेज दी गई है! एडमिन अप्रूवल का इंतज़ार करें।");
            else alert("❌ सर्वर एरर! बाद में प्रयास करें।");
        } catch (err) {
            alert("⚠️ कनेक्शन फेल! Render सर्वर शुरू हो रहा हो सकता है, 1 मिनट बाद फिर दबाएं।");
        }
    }

    function openPdf() {
        const email = document.getElementById("userEmail").value.trim();
        if (!email) return alert("चेक करने के लिए ईमेल डालें!");

        // Aapke server.js ke route /get-pdf ke anusar
        const url = `${BACKEND_URL}/get-pdf?email=${encodeURIComponent(email)}`;
        window.open(url, "_blank");
    }

    // Event Bindings
    document.getElementById("yearSelect").onchange = fetchQuestions;
    document.getElementById("postSelect").onchange = fetchQuestions;
    document.getElementById("reqBtn").onclick = requestAccess;
    document.getElementById("openPdfBtn").onclick = openPdf;
    document.getElementById("startQuizBtn").onclick = () => {
        document.getElementById("quizDisplay").style.display = "block";
        document.getElementById("startQuizBtn").style.display = "none";
        renderQuiz();
    };

</script>
</body>
</html>
