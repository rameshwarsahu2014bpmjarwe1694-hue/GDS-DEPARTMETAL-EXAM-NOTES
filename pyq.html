<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PYQ Section</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

h1{
text-align:center;
margin-bottom:20px;
}

.grid{
display:grid;
gap:12px;
margin-bottom:20px;
}

select{
padding:12px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
width:100%;
}

.card{
background:#fafafa;
padding:15px;
border:1px solid #ddd;
border-radius:10px;
margin-bottom:12px;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
margin:5px;
}

.start-btn{background:#28a745;color:#fff;}
.nav-btn{background:#007bff;color:#fff;}
.submit-btn{background:#dc3545;color:#fff;}

.option{
display:block;
width:100%;
text-align:left;
margin:8px 0;
background:#eee;
color:#000;
}

.selected{
background:#007bff;
color:#fff;
}

.correct{
background:#28a745 !important;
color:#fff;
}

.wrong{
background:#dc3545 !important;
color:#fff;
}

.small{
font-size:14px;
color:#666;
margin-top:6px;
line-height:1.6;
}

.empty{
text-align:center;
padding:20px;
font-weight:bold;
color:#666;
}
</style>
</head>
<body>

<div class="container">

<h1>Previous Year Questions</h1>

<div class="grid">
<select id="category" onchange="loadAll()">
<option>PYQ 2020</option>
<option>PYQ 2021</option>
<option>PYQ 2022</option>
<option>PYQ 2023</option>
<option>PYQ 2024</option>
<option>PYQ 2025</option>
<option>PYQ 2026</option>
<option>Model Paper</option>
<option>Practice Set</option>
</select>

<select id="post" onchange="loadAll()">
<option>MTS</option>
<option>POSTMAN</option>
<option>PA-SA</option>
</select>
</div>

<h3>PDF Files</h3>
<div id="pdfBox">Loading...</div>

<h3 style="margin-top:20px">Quiz</h3>

<button class="start-btn" id="startBtn">Start Quiz</button>

<div id="quizBox" style="display:none;margin-top:15px;"></div>

<div id="resultBox" style="display:none;margin-top:15px;"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
apiKey: "AIzaSyDjzmo0A4KhOkrqFQdOyCEek6bsPF-UVPQ",
authDomain: "gds-departmental-exam-studyhub.firebaseapp.com",
projectId: "gds-departmental-exam-studyhub",
storageBucket: "gds-departmental-exam-studyhub.appspot.com",
messagingSenderId: "759916756080",
appId: "1:759916756080:web:7f2c0e66458bd007e888b5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let questions = [];
let current = 0;
let selectedAnswers = [];

/* LOAD DATA */
window.loadAll = async function(){

questions = [];
current = 0;
selectedAnswers = [];

document.getElementById("quizBox").style.display = "none";
document.getElementById("resultBox").style.display = "none";
document.getElementById("startBtn").style.display = "inline-block";

const category = val("category");
const post = val("post");

/* PDF */
const pdfSnap = await getDocs(collection(db,"pyqFiles"));

let pdfHtml = "";

pdfSnap.forEach(doc=>{
let d = doc.data();

if(d.category !== category) return;
if(d.post !== post) return;

pdfHtml += `
<div class="card">
<b>${safe(d.title)}</b>
<div class="small">${safe(d.desc)}</div>
<div class="small">${safe(d.fileName)}</div>
</div>
`;
});

document.getElementById("pdfBox").innerHTML =
pdfHtml || "<div class='empty'>No PDF Found</div>";

/* QUESTIONS */
const qSnap = await getDocs(collection(db,"pyqQuestions"));

qSnap.forEach(doc=>{
let d = doc.data();

if(d.category !== category) return;
if(d.post !== post) return;

questions.push(d);
});
};

/* START QUIZ */
window.startQuiz = function(){

if(questions.length===0){
alert("No Questions Found");
return;
}

document.getElementById("startBtn").style.display="none";
document.getElementById("quizBox").style.display="block";

showQuestion();
};

/* SHOW QUESTION */
function showQuestion(){

let q = questions[current];

let html = `
<div class="card">
<h3>Question ${current+1} / ${questions.length}</h3>
<p style="margin:15px 0;"><b>${safe(q.question)}</b></p>
`;

for(let i=0;i<4;i++){

let option = safe(q.options?.[i]);
let active = selectedAnswers[current]===option ? "selected" : "";

html += `
<button class="option ${active}" onclick="selectOption('${escapeQuote(option)}')">
${String.fromCharCode(65+i)}. ${option}
</button>
`;
}

html += `<br>`;

if(current>0){
html += `<button class="nav-btn" onclick="prevQuestion()">Previous</button>`;
}

if(current < questions.length-1){
html += `<button class="nav-btn" onclick="nextQuestion()">Next</button>`;
}else{
html += `<button class="submit-btn" onclick="submitQuiz()">Submit</button>`;
}

html += `</div>`;

document.getElementById("quizBox").innerHTML = html;
}

/* SELECT */
window.selectOption = function(value){
selectedAnswers[current] = value;
showQuestion();
};

/* NAV */
window.nextQuestion = function(){
if(current < questions.length-1){
current++;
showQuestion();
}
};

window.prevQuestion = function(){
if(current>0){
current--;
showQuestion();
}
};

/* SUBMIT */
window.submitQuiz = function(){

let score = 0;
let review = "";

for(let i=0;i<questions.length;i++){

let q = questions[i];
let user = selectedAnswers[i] || "Not Answered";
let ans = safe(q.answer);

let correct = user === ans;

if(correct) score++;

review += `
<div class="card">
<b>Q${i+1}. ${safe(q.question)}</b>

<div class="small">Your Answer:
<span style="color:${correct?'green':'red'}">${user}</span>
</div>

<div class="small">Correct Answer:
<span style="color:green">${ans}</span>
</div>
</div>
`;
}

document.getElementById("quizBox").style.display="none";
document.getElementById("resultBox").style.display="block";

document.getElementById("resultBox").innerHTML = `
<div class="card">
<h2>Result</h2>
<p><b>Score: ${score} / ${questions.length}</b></p>
</div>
${review}
`;
};

function val(id){
return document.getElementById(id).value.trim();
}

function safe(str){
return str || "";
}

function escapeQuote(str){
return (str || "").replace(/'/g,"\\'");
}

document.getElementById("startBtn").addEventListener("click", startQuiz);

loadAll();

</script>

</body>
</html>
