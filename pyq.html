<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PYQ Section</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#f4f6f9;padding:15px;}
.container{max-width:1000px;margin:auto;background:#fff;padding:18px;border-radius:12px;}
h1{text-align:center;margin-bottom:18px;}
.grid{display:grid;gap:12px;}
select{width:100%;padding:12px;border:1px solid #ccc;border-radius:8px;}
.card{background:#fafafa;border:1px solid #ddd;border-radius:10px;padding:15px;margin-bottom:12px;}
.small{font-size:14px;color:#666;margin-top:6px;}
a,button{display:inline-block;padding:10px 14px;border-radius:8px;cursor:pointer;margin-top:10px;}
a{background:#007bff;color:#fff;text-decoration:none;}
.start-btn{background:#28a745;color:#fff;}
.nav-btn{background:#007bff;color:#fff;margin-right:10px;}
.submit-btn{background:#dc3545;color:#fff;}
.option{display:flex;align-items:center;gap:12px;width:100%;background:#fff;margin:10px 0;padding:14px;border:2px solid #dfe3e8;border-radius:14px;cursor:pointer;}
.option::before{content:"";width:18px;height:18px;border:2px solid #999;border-radius:50%;}
.selected{border-color:#0d6efd;color:#0d6efd;background:#eaf3ff;}
.empty{text-align:center;color:#666;padding:20px;}
</style>
</head>

<body>

<div class="container">

<h1>Previous Year Questions</h1>

<div class="grid">
<select id="pyqSelect">
<option disabled selected>Select PYQ Year</option>
<option>PYQ 2020</option>
<option>PYQ 2021</option>
<option>PYQ 2022</option>
<option>PYQ 2023</option>
<option>PYQ 2024</option>
<option>PYQ 2025</option>
<option>PYQ 2026</option>
<option>Model Paper</option>
<option>Practice Set</option>
</select>

<select id="postSelect">
<option disabled selected>Select Post Category</option>
<option>MTS</option>
<option>POSTMAN</option>
<option>PA-SA</option>
</select>
</div>

<!-- PDF -->
<h3>PDF Files</h3>
<div id="pdfBox">Loading...</div>

<!-- QUIZ -->
<h3>Quiz</h3>
<button class="start-btn" id="startBtn">Start Quiz</button>
<div id="quizBox" style="display:none;"></div>
<div id="resultBox"></div>

<!-- PAYMENT MODAL -->
<div id="paymentModal" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;padding:20px;width:90%;max-width:400px;border:2px solid #000;z-index:999;">
<h3>Unlock PYQ</h3>
<p>Amount: ₹9</p>

<a id="upiLink" style="background:green;display:block;text-align:center;">Pay via UPI</a>

<input id="txnIdInput" placeholder="Transaction ID" style="width:100%;padding:8px;margin-top:10px;">
<button onclick="submitPaymentDetails()" style="width:100%;background:blue;color:#fff;margin-top:10px;">Submit</button>
<button onclick="closeModal()" style="width:100%;margin-top:5px;">Cancel</button>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDjzmo0A4KhOkrqFQdOyCEek6bsPF-UVPQ",
authDomain: "gds-departmental-exam-studyhub.firebaseapp.com",
projectId: "gds-departmental-exam-studyhub",
storageBucket: "gds-departmental-exam-studyhub.appspot.com",
messagingSenderId: "759916756080",
appId: "1:759916756080:web:7f2c0e66458bd007e888b5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let questions = [];
let current = 0;
let answers = [];

/* =========================
LOCK SYSTEM
========================= */
async function isUnlocked(pyqId){

const snap = await getDocs(collection(db,"payment_requests"));

let ok = false;

snap.forEach(d=>{
const x = d.data();
if(x.status==="approved" && x.pyqId===pyqId){
ok = true;
}
});

return ok;
}

/* =========================
LOAD PDF + QUESTIONS
========================= */
async function loadAll(){

const category = document.getElementById("pyqSelect").value;
const post = document.getElementById("postSelect").value;

if(!category || !post) return;

let pdfHtml="";

const pdfSnap = await getDocs(collection(db,"pyqFiles"));

pdfSnap.forEach(async doc=>{
const d = doc.data();

if(d.category!==category || d.post!==post) return;

const id = d.title;

/* locked UI */
let locked = `
<div class="card">
<b>🔒 ${id}</b>
<button onclick="openPaymentModal('${id}')">Unlock ₹9</button>
</div>
`;

/* unlocked check */
let unlocked = await isUnlocked(id);

if(unlocked){
pdfHtml += `
<div class="card">
<b>🔓 ${id}</b>
<a href="${d.fileName}" target="_blank">Open PDF</a>
</div>`;
}else{
pdfHtml += locked;
}

});

setTimeout(()=>{
document.getElementById("pdfBox").innerHTML = pdfHtml;
},1000);

/* QUESTIONS */
questions = [];

const qSnap = await getDocs(collection(db,"pyqQuestions"));

qSnap.forEach(doc=>{
const d = doc.data();
if(d.category===category && d.post===post){
questions.push(d);
}
});

current=0;
answers=[];
}

/* =========================
PAYMENT
========================= */
window.openPaymentModal = function(name){
document.getElementById("paymentModal").style.display="block";
document.getElementById("upiLink").href =
`upi://pay?pa=7489956942@ybl&pn=Rameshwar&am=9&cu=INR&tn=Unlock_${name}`;
window.selected = name;
};

window.submitPaymentDetails = async function(){

const txn = document.getElementById("txnIdInput").value;
if(!txn) return alert("Enter TXN");

await addDoc(collection(db,"payment_requests"),{
pyqId: window.selected,
transactionId: txn,
status:"pending",
timestamp:new Date()
});

alert("Submitted");
closeModal();
};

window.closeModal = ()=>document.getElementById("paymentModal").style.display="none";

/* =========================
QUIZ
========================= */
function startQuiz(){
if(!questions.length) return alert("No Questions");
document.getElementById("quizBox").style.display="block";
show();
}

function show(){
const q = questions[current];

let html = `<div class="card"><h3>Q${current+1}</h3><p><b>${q.question}</b></p>`;

(q.options||[]).forEach(op=>{
html += `<button class="option" onclick="select('${op}')">${op}</button>`;
});

html += `<button onclick="next()">Next</button></div>`;

document.getElementById("quizBox").innerHTML = html;
}

window.select = v=>answers[current]=v;
window.next = ()=>{current++;show();};

document.getElementById("startBtn").addEventListener("click",startQuiz);
document.getElementById("pyqSelect").addEventListener("change",loadAll);
document.getElementById("postSelect").addEventListener("change",loadAll);

loadAll();

</script>

</body>
</html>
