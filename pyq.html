<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PYQ Section</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f4f6f9;padding:20px}
.container{
max-width:1000px;margin:auto;background:#fff;
padding:20px;border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.08)
}
h1{text-align:center;margin-bottom:20px}
.filter-box{
display:grid;gap:12px;margin-bottom:20px
}
select{
padding:12px;border:1px solid #ccc;
border-radius:8px;font-size:16px;width:100%
}
.card{
background:#fafafa;padding:15px;
border:1px solid #ddd;border-radius:10px;
margin-bottom:12px
}
.q{
font-size:17px;font-weight:bold;
margin-bottom:10px
}
.opt{
margin:5px 0;
font-size:15px
}
.small{
font-size:14px;color:#666;
margin-top:8px
}
.empty{
text-align:center;
padding:20px;
font-weight:bold;
color:#666
}
</style>
</head>
<body>

<div class="container">

<h1>Previous Year Questions</h1>

<div class="filter-box">

<select id="category" onchange="loadPYQ()">
<option>PYQ 2020</option>
<option>PYQ 2021</option>
<option>PYQ 2022</option>
<option>PYQ 2023</option>
<option>PYQ 2024</option>
<option>PYQ 2025</option>
<option>PYQ 2026</option>
<option>Model Paper</option>
<option>Practice Set</option>
</select>

<select id="post" onchange="loadPYQ()">
<option>MTS</option>
<option>POSTMAN</option>
<option>PA-SA</option>
</select>

</div>

<div id="list">Loading...</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
query,
where,
orderBy
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDjzmo0A4KhOkrqFQdOyCEek6bsPF-UVPQ",
authDomain: "gds-departmental-exam-studyhub.firebaseapp.com",
projectId: "gds-departmental-exam-studyhub",
storageBucket: "gds-departmental-exam-studyhub.appspot.com",
messagingSenderId: "759916756080",
appId: "1:759916756080:web:7f2c0e66458bd007e888b5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const list = document.getElementById("list");

/* LOAD DATA */
window.loadPYQ = async function(){

const category = val("category");
const post = val("post");

try{

list.innerHTML="Loading...";

const q = query(
collection(db,"pyqQuestions"),
where("category","==",category),
where("post","==",post),
orderBy("createdAt","desc")
);

const snap = await getDocs(q);

list.innerHTML="";

if(snap.empty){
list.innerHTML="<div class='empty'>No Questions Found</div>";
return;
}

let i=1;

snap.forEach(item=>{

const d=item.data();

list.innerHTML += `
<div class="card">

<div class="q">
${i}. ${safe(d.question)}
</div>

<div class="opt">A. ${safe(d.options?.[0])}</div>
<div class="opt">B. ${safe(d.options?.[1])}</div>
<div class="opt">C. ${safe(d.options?.[2])}</div>
<div class="opt">D. ${safe(d.options?.[3])}</div>

<div class="small">
<b>Answer:</b> ${safe(d.answer)}
</div>

</div>
`;

i++;

});

}catch(err){

console.log(err);
list.innerHTML="<div class='empty'>Load Failed</div>";

}

};

function val(id){
return document.getElementById(id).value.trim();
}

function safe(str){
return str || "";
}

loadPYQ();

</script>
</body>
</html>
