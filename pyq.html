<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>PYQ Section - Final</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #f4f6f9; padding: 15px; }
        .container { max-width: 800px; margin: auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,.1); }
        h1 { text-align: center; margin-bottom: 20px; }
        .grid { display: grid; gap: 10px; margin-bottom: 20px; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; }
        .card { background: #fafafa; border: 1px solid #ddd; padding: 15px; border-radius: 10px; margin-top: 15px; }
        .option { display: block; width: 100%; text-align: left; padding: 12px; margin: 8px 0; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; background: #fff; font-weight: bold; }
        .option:hover { border-color: #007bff; }
        .selected { background: #e7f3ff !important; border-color: #007bff !important; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: #fff; margin-top: 10px; width: 100%; }
        .btn-pay { background: #ff9800; text-decoration: none; display: inline-block; text-align: center; }
        .btn-request { background: #28a745; }
        .btn-open { background: #007bff; }
        .btn-start { background: #6f42c1; }
        .btn-nav { background: #333; width: auto; margin-right: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Previous Year Questions</h1>

    <div class="grid">
        <select id="pyqSelect">
            <option value="" selected disabled>Select Year</option>
            <option>PYQ 2020</option><option>PYQ 2021</option><option>PYQ 2022</option>
            <option>PYQ 2023</option><option>PYQ 2024</option><option>Model Paper</option>
        </select>
        <select id="postSelect">
            <option value="" selected disabled>Select Post</option>
            <option>MTS</option><option>POSTMAN</option><option>PA-SA</option>
        </select>
    </div>

    <div id="pdfBox"></div>

    <div class="card" style="text-align: center;">
        <h2>🔒 Content Locked</h2>
        <p>Unlock PDF for ₹9</p>
        <a href="upi://pay?pa=7489956942@postbank&pn=Rameshwar_SAHU&am=9&cu=INR" class="btn btn-pay">Pay ₹9 via UPI</a>
        <div style="margin-top:15px;">
            <input type="email" id="userEmail" placeholder="Enter your Email">
            <input type="text" id="txnId" placeholder="Transaction ID (UTR)">
            <button class="btn btn-request" onclick="requestAccess()">Request Access</button>
            <button class="btn btn-open" onclick="viewSecurePDF()">Open PDF (Check Access)</button>
        </div>
    </div>

    <hr style="margin: 25px 0;">
    <h3>Quiz Section</h3>
    <button class="btn btn-start" id="startBtn">Start Quiz</button>
    <div id="quizBox" style="display:none;"></div>
</div>

<script type="module">
    import { initializeApp } from "https://gstatic.com";
    import { getFirestore, collection, getDocs } from "https://gstatic.com";

    const firebaseConfig = {
        apiKey: "AIzaSyDjzmo0A4KhOkrqFQdOyCEek6bsPF-UVPQ",
        authDomain: "://firebaseapp.com",
        projectId: "gds-departmental-exam-studyhub",
        storageBucket: "://appspot.com",
        messagingSenderId: "759916756080",
        appId: "1:759916756080:web:7f2c0e66458bd007e888b5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let questions = [];
    let current = 0;
    let answers = [];

    // डेटा लोड करने का फंक्शन
    async function loadAll() {
        const category = document.getElementById("pyqSelect").value;
        const post = document.getElementById("postSelect").value;
        if (!category || !post) return;

        document.getElementById("pdfBox").innerHTML = "Searching Data...";
        questions = [];

        try {
            const qSnap = await getDocs(collection(db, "pyqQuestions"));
            qSnap.forEach(doc => {
                const d = doc.data();
                if (d.category === category && d.post === post) questions.push(d);
            });
            document.getElementById("pdfBox").innerHTML = questions.length > 0 ? "Data Loaded Successfully!" : "No Data Found.";
        } catch (e) { console.error(e); }
    }

    // क्विज शुरू करना
    function startQuiz() {
        if (questions.length === 0) { alert("No Questions Found!"); return; }
        current = 0;
        document.getElementById("startBtn").style.display = "none";
        document.getElementById("quizBox").style.display = "block";
        showQuestion();
    }

    function showQuestion() {
        const q = questions[current];
        document.getElementById("quizBox").innerHTML = `
            <div class="card">
                <h3>Q${current + 1}: ${q.question}</h3>
                <button class="option" onclick="selectOpt('a')">A. ${q.option_a || q.a}</button>
                <button class="option" onclick="selectOpt('b')">B. ${q.option_b || q.b}</button>
                <button class="option" onclick="selectOpt('c')">C. ${q.option_c || q.c}</button>
                <button class="option" onclick="selectOpt('d')">D. ${q.option_d || q.d}</button>
                <button class="btn btn-nav" onclick="nextQ()">Next</button>
            </div>`;
    }

    // रिक्वेस्ट भेजने का फंक्शन (सही URL के साथ)
    window.requestAccess = async () => {
        const email = document.getElementById('userEmail').value.trim();
        const txnId = document.getElementById('txnId').value.trim();
        if (!email || !txnId) { alert("Fill Email and Txn ID!"); return; }

        try {
            const res = await fetch('https://payment-backend-2-g6go.onrender.com/request-access', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, txnId })
            });
            if (res.ok) alert("✅ Request Sent to Admin!");
            else alert("❌ Server Error!");
        } catch (e) { alert("⚠️ Connection Error!"); }
    };

    window.viewSecurePDF = () => {
        const email = document.getElementById('userEmail').value.trim();
        if (!email) { alert("Enter Email!"); return; }
        window.open(`https://onrender.com{encodeURIComponent(email)}`, '_blank');
    };

    // इवेंट्स
    document.getElementById("pyqSelect").addEventListener("change", loadAll);
    document.getElementById("postSelect").addEventListener("change", loadAll);
    document.getElementById("startBtn").addEventListener("click", startQuiz);

    window.selectOpt = (opt) => { alert("Selected: " + opt.toUpperCase()); };
    window.nextQ = () => { 
        if (current < questions.length - 1) { current++; showQuestion(); } 
        else { alert("Quiz Finished!"); location.reload(); }
    };
</script>

</body>
</html>
