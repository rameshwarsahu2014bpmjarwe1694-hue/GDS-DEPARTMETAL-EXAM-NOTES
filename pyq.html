<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PYQ Section</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

h1{
text-align:center;
margin-bottom:20px;
}

.grid{
display:grid;
gap:12px;
margin-bottom:20px;
}

select{
padding:12px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
width:100%;
}

.card{
background:#fafafa;
padding:15px;
border:1px solid #ddd;
border-radius:10px;
margin-bottom:12px;
}

a{
display:inline-block;
padding:10px 14px;
background:#007bff;
color:#fff;
text-decoration:none;
border-radius:8px;
margin-top:10px;
}

.small{
font-size:14px;
color:#666;
margin-top:6px;
line-height:1.6;
}

.empty{
text-align:center;
padding:20px;
font-weight:bold;
color:#666;
}

button{
padding:10px 15px;
background:#28a745;
color:#fff;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.quiz-option{
display:block;
width:100%;
text-align:left;
margin-bottom:10px;
background:#007bff;
}
</style>
</head>
<body>

<div class="container">

<h1>Previous Year Questions</h1>

<div class="grid">

<select id="category" onchange="loadAll()">
<option>PYQ 2020</option>
<option>PYQ 2021</option>
<option>PYQ 2022</option>
<option>PYQ 2023</option>
<option>PYQ 2024</option>
<option>PYQ 2025</option>
<option>PYQ 2026</option>
<option>Model Paper</option>
<option>Practice Set</option>
</select>

<select id="post" onchange="loadAll()">
<option>MTS</option>
<option>POSTMAN</option>
<option>PA-SA</option>
</select>

</div>

<h3>PDF Files</h3>
<div id="pdfBox">Loading...</div>

<h3 style="margin-top:20px">Questions</h3>

<button id="startQuizBtn">Start Quiz Mode</button>

<div id="normalQuestions" style="margin-top:15px;">Loading...</div>

<div id="quizBox" style="display:none;margin-top:15px;"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
apiKey: "AIzaSyDjzmo0A4KhOkrqFQdOyCEek6bsPF-UVPQ",
authDomain: "gds-departmental-exam-studyhub.firebaseapp.com",
projectId: "gds-departmental-exam-studyhub",
storageBucket: "gds-departmental-exam-studyhub.appspot.com",
messagingSenderId: "759916756080",
appId: "1:759916756080:web:7f2c0e66458bd007e888b5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let quizQuestions = [];
let currentQuiz = 0;
let score = 0;

/* LOAD ALL DATA */
window.loadAll = async function(){

const category = val("category");
const post = val("post");

/* PDF */
const pdfSnap = await getDocs(collection(db,"pyqFiles"));

let pdfHtml = "";

pdfSnap.forEach(doc=>{
let d = doc.data();

if(d.category !== category) return;
if(d.post !== post) return;

pdfHtml += `
<div class="card">
<b>${safe(d.title)}</b>

<div class="small">${safe(d.desc)}</div>
<div class="small">${safe(d.fileName)}</div>

<a href="${safe(d.fileName)}" target="_blank">Open PDF</a>
</div>
`;
});

document.getElementById("pdfBox").innerHTML =
pdfHtml || "<div class='empty'>No PDF Found</div>";

/* QUESTIONS */
const qSnap = await getDocs(collection(db,"pyqQuestions"));

let qHtml = "";
let i = 1;
quizQuestions = [];

qSnap.forEach(doc=>{

let d = doc.data();

if(d.category !== category) return;
if(d.post !== post) return;

quizQuestions.push(d);

qHtml += `
<div class="card">

<b>${i}. ${safe(d.question)}</b>

<div class="small">
A. ${safe(d.options?.[0])}<br>
B. ${safe(d.options?.[1])}<br>
C. ${safe(d.options?.[2])}<br>
D. ${safe(d.options?.[3])}
</div>

<div class="small">
<b>Answer:</b> ${safe(d.answer)}
</div>

</div>
`;

i++;
});

document.getElementById("normalQuestions").innerHTML =
qHtml || "<div class='empty'>No Questions Found</div>";

document.getElementById("quizBox").style.display = "none";
document.getElementById("startQuizBtn").style.display = "inline-block";
document.getElementById("normalQuestions").style.display = "block";
};

/* QUIZ START */
window.startQuiz = function(){

if(quizQuestions.length === 0){
alert("No Questions Found");
return;
}

currentQuiz = 0;
score = 0;

document.getElementById("startQuizBtn").style.display = "none";
document.getElementById("normalQuestions").style.display = "none";
document.getElementById("quizBox").style.display = "block";

showQuiz();
};

function showQuiz(){

if(currentQuiz >= quizQuestions.length){

document.getElementById("quizBox").innerHTML = `
<div class="card">
<h3>Quiz Finished</h3>
<p>Your Score: ${score} / ${quizQuestions.length}</p>
<button onclick="loadAll()">Back</button>
</div>
`;
return;
}

let q = quizQuestions[currentQuiz];

document.getElementById("quizBox").innerHTML = `
<div class="card">
<h3>Question ${currentQuiz+1}</h3>

<p style="margin:15px 0;"><b>${safe(q.question)}</b></p>

<button class="quiz-option" onclick="checkAnswer('${safe(q.options?.[0])}')">
A. ${safe(q.options?.[0])}
</button>

<button class="quiz-option" onclick="checkAnswer('${safe(q.options?.[1])}')">
B. ${safe(q.options?.[1])}
</button>

<button class="quiz-option" onclick="checkAnswer('${safe(q.options?.[2])}')">
C. ${safe(q.options?.[2])}
</button>

<button class="quiz-option" onclick="checkAnswer('${safe(q.options?.[3])}')">
D. ${safe(q.options?.[3])}
</button>

</div>
`;
}

window.checkAnswer = function(selected){

let q = quizQuestions[currentQuiz];

if(selected === q.answer){
score++;
alert("Correct Answer");
}else{
alert("Wrong Answer");
}

currentQuiz++;
showQuiz();
};

function val(id){
return document.getElementById(id).value.trim();
}

function safe(str){
return str || "";
}

/* BUTTON CLICK */
document.getElementById("startQuizBtn").addEventListener("click", startQuiz);

/* FIRST LOAD */
loadAll();

</script>

</body>
</html>
