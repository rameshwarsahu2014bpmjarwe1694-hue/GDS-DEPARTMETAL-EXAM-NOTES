<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PYQ Master System</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#f4f6f9;padding:15px;}
.container{max-width:1000px;margin:auto;background:#fff;padding:18px;border-radius:12px;}
h1{text-align:center;margin-bottom:18px;}
.grid{display:grid;gap:12px;}
select{width:100%;padding:12px;border:1px solid #ccc;border-radius:8px;}
.card{background:#fafafa;border:1px solid #ddd;border-radius:10px;padding:15px;margin-bottom:12px;}
button,a{padding:10px 14px;border:none;border-radius:8px;cursor:pointer;font-weight:bold;margin-top:10px;}
a{background:#007bff;color:#fff;text-decoration:none;display:inline-block;}
.start-btn{background:#28a745;color:#fff;}
.nav-btn{background:#007bff;color:#fff;margin-right:8px;}
.submit-btn{background:#dc3545;color:#fff;}
.option{display:flex;gap:10px;align-items:center;width:100%;background:#fff;margin:10px 0;padding:14px;border:2px solid #ddd;border-radius:12px;cursor:pointer;}
.option::before{content:"";width:18px;height:18px;border:2px solid #999;border-radius:50%;}
.selected{border-color:#0d6efd;background:#eaf3ff;}
.empty{text-align:center;color:#666;padding:20px;}
</style>
</head>

<body>

<div class="container">

<h1>PYQ Master System</h1>

<div class="grid">
<select id="pyqSelect">
<option disabled selected>Select PYQ Year</option>
<option>PYQ 2020</option>
<option>PYQ 2021</option>
<option>PYQ 2022</option>
<option>PYQ 2023</option>
<option>PYQ 2024</option>
<option>PYQ 2025</option>
<option>PYQ 2026</option>
<option>Model Paper</option>
<option>Practice Set</option>
</select>

<select id="postSelect">
<option disabled selected>Select Post Category</option>
<option>MTS</option>
<option>POSTMAN</option>
<option>PA-SA</option>
</select>
</div>

<h3>PDF Files</h3>
<div id="pdfBox">Select filters...</div>

<h3>Quiz</h3>
<button class="start-btn" id="startBtn">Start Quiz</button>

<div id="quizBox" style="display:none;"></div>
<div id="resultBox" style="display:none;"></div>

</div>

<!-- PAYMENT MODAL -->
<div id="paymentModal" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;padding:20px;width:90%;max-width:400px;border:2px solid #000;z-index:999;">

<h3>Unlock PYQ</h3>
<p>Amount: ₹9</p>

<a id="upiLink" href="#" style="background:green;display:block;text-align:center;color:#fff;padding:10px;text-decoration:none;">Pay via UPI</a>

<input id="txnIdInput" placeholder="Transaction ID" style="width:100%;padding:8px;margin-top:10px;">

<button onclick="submitPaymentDetails()" style="width:100%;background:blue;color:#fff;margin-top:10px;">Submit</button>
<button onclick="closeModal()" style="width:100%;margin-top:5px;">Cancel</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, query, where }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDjzmo0A4KhOkrqFQdOyCEek6bsPF-UVPQ",
authDomain: "gds-departmental-exam-studyhub.firebaseapp.com",
projectId: "gds-departmental-exam-studyhub",
storageBucket: "gds-departmental-exam-studyhub.appspot.com",
messagingSenderId: "759916756080",
appId: "1:759916756080:web:7f2c0e66458bd007e888b5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let questions = [];
let current = 0;
let answers = [];
let selected = "";

/* LOCK CHECK */
async function isUnlocked(pyqId){
const q = query(collection(db,"payment_requests"),
where("pyqId","==",pyqId),
where("status","==","approved"));
const snap = await getDocs(q);
return !snap.empty;
}

/* LOAD SYSTEM */
async function loadAll(){

const category = document.getElementById("pyqSelect").value;
const post = document.getElementById("postSelect").value;

if(!category || !post) return;

document.getElementById("pdfBox").innerHTML = "Loading...";

let pdfHtml = "";

const pdfSnap = await getDocs(collection(db,"pyqFiles"));
const paySnap = await getDocs(collection(db,"payment_requests"));

let approved = new Set();

paySnap.forEach(d=>{
const x = d.data();
if(x.status==="approved") approved.add(x.pyqId);
});

for(const doc of pdfSnap.docs){

const d = doc.data();
if(d.category!==category || d.post!==post) continue;

const id = d.title;
const unlocked = approved.has(id);

if(unlocked){
pdfHtml += `<div class="card"><b>🔓 ${id}</b><a href="${d.fileName}" target="_blank">Open PDF</a></div>`;
}else{
pdfHtml += `<div class="card"><b>🔒 ${id}</b><button onclick="openPaymentModal('${id}')">Unlock ₹9</button></div>`;
}

}

document.getElementById("pdfBox").innerHTML = pdfHtml || "<div class='empty'>No PDF Found</div>";

questions = [];

const qSnap = await getDocs(collection(db,"pyqQuestions"));

qSnap.forEach(doc=>{
const d = doc.data();
if(d.category===category && d.post===post){
questions.push(d);
}
});

current=0;
answers=[];
}

/* QUIZ */
window.showQuestion = function(){

const q = questions[current];
if(!q) return;

let html = `<div class="card"><h3>Q ${current+1}/${questions.length}</h3><p><b>${q.question}</b></p>`;

(q.options||[]).forEach(op=>{
const sel = answers[current]===op ? "selected":"";
html += `<button class="option ${sel}" onclick="selectAns('${op}')">${op}</button>`;
});

html += `<br>`;

if(current>0) html+=`<button class="nav-btn" onclick="prevQ()">Previous</button>`;
if(current<questions.length-1) html+=`<button class="nav-btn" onclick="nextQ()">Next</button>`;

html+=`<button class="submit-btn" onclick="submitQuiz()">Submit</button></div>`;

document.getElementById("quizBox").innerHTML = html;
};

window.selectAns = v=>{answers[current]=v;showQuestion();};
window.nextQ=()=>{if(current<questions.length-1){current++;showQuestion();}};
window.prevQ=()=>{if(current>0){current--;showQuestion();}};

window.submitQuiz=function(){

let score=0;
for(let i=0;i<questions.length;i++){
if(answers[i]===questions[i].answer) score++;
}

document.getElementById("quizBox").style.display="none";
document.getElementById("resultBox").style.display="block";

document.getElementById("resultBox").innerHTML=
`<div class="card"><h2>Result</h2>
<p>Total:${questions.length}</p>
<p>Correct:${score}</p>
<p>Wrong:${questions.length-score}</p>
<h3>${score}/${questions.length}</h3>
<button class="start-btn" onclick="location.reload()">Restart</button>
</div>`;
};

/* PAYMENT */
window.openPaymentModal=function(name){
document.getElementById("paymentModal").style.display="block";
document.getElementById("upiLink").href=
`upi://pay?pa=Jaanbpm97@ybl&pn=Rameshwar&am=9&cu=INR&tn=Unlock_${name}`;
selected=name;
};

window.submitPaymentDetails=async function(){
const txn=document.getElementById("txnIdInput").value;
if(!txn) return alert("Enter TXN");

await addDoc(collection(db,"payment_requests"),{
pyqId:selected,
transactionId:txn,
status:"pending",
timestamp:new Date()
});

alert("Submitted");
closeModal();
};

window.closeModal=()=>{document.getElementById("paymentModal").style.display="none";};

/* EVENTS */
document.getElementById("pyqSelect").addEventListener("change",loadAll);
document.getElementById("postSelect").addEventListener("change",loadAll);

document.getElementById("startBtn").addEventListener("click",()=>{
if(!questions.length) return alert("No Questions");
current=0;answers=[];
document.getElementById("quizBox").style.display="block";
document.getElementById("resultBox").style.display="none";
showQuestion();
});

</script>

</body>
</html>
