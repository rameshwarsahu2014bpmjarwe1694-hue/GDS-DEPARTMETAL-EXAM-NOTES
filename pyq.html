<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PYQ Section</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif
}

body{
background:#f4f6f9;
padding:20px
}

.container{
max-width:1000px;
margin:auto;
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.08)
}

h1{
text-align:center;
margin-bottom:20px
}

.grid{
display:grid;
gap:12px;
margin-bottom:20px
}

select{
padding:12px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
width:100%
}

.card{
background:#fafafa;
padding:15px;
border:1px solid #ddd;
border-radius:10px;
margin-bottom:12px
}

a{
display:inline-block;
padding:10px 14px;
background:#007bff;
color:#fff;
text-decoration:none;
border-radius:8px;
margin-top:10px
}

.small{
font-size:14px;
color:#666;
margin-top:6px
}

.empty{
text-align:center;
padding:20px;
font-weight:bold;
color:#666
}
</style>
</head>
<body>

<div class="container">

<h1>Previous Year Questions</h1>

<div class="grid">

<select id="category" onchange="loadAll()">
<option>PYQ 2020</option>
<option>PYQ 2021</option>
<option>PYQ 2022</option>
<option>PYQ 2023</option>
<option>PYQ 2024</option>
<option>PYQ 2025</option>
<option>PYQ 2026</option>
<option>Model Paper</option>
<option>Practice Set</option>
</select>

<select id="post" onchange="loadAll()">
<option>MTS</option>
<option>POSTMAN</option>
<option>PA-SA</option>
</select>

</div>

<h3>PDF Files</h3>
<div id="pdfBox">Loading...</div>

<h3 style="margin-top:20px">Questions</h3>
<div id="questionBox">Loading...</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* YOUR EXISTING FIREBASE CONFIG */
const firebaseConfig = {
apiKey: "AIzaSyDjzmo0A4KhOkrqFQdOyCEek6bsPF-UVPQ",
authDomain: "gds-departmental-exam-studyhub.firebaseapp.com",
projectId: "gds-departmental-exam-studyhub",
storageBucket: "gds-departmental-exam-studyhub.appspot.com",
messagingSenderId: "759916756080",
appId: "1:759916756080:web:7f2c0e66458bd007e888b5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* LOAD ALL DATA */
window.loadAll = async function(){

const category = val("category");
const post = val("post");

/* LOAD PDF FILES */
const pdfSnap = await getDocs(collection(db,"pyqFiles"));

let pdfHtml = "";

pdfSnap.forEach(item=>{

let d = item.data();

if(d.category !== category) return;
if(d.post !== post) return;

pdfHtml += `
<div class="card">
<b>${safe(d.title)}</b>

<div class="small">
${safe(d.desc)}
</div>

<div class="small">
${safe(d.fileName)}
</div>

<a href="${safe(d.fileName)}" target="_blank">
Open PDF
</a>
</div>
`;

});

document.getElementById("pdfBox").innerHTML =
pdfHtml || "<div class='empty'>No PDF Found</div>";

/* LOAD QUESTIONS */
const qSnap = await getDocs(collection(db,"pyqQuestions"));

let qHtml = "";
let i = 1;

qSnap.forEach(item=>{

let d = item.data();

if(d.category !== category) return;
if(d.post !== post) return;

qHtml += `
<div class="card">

<b>${i}. ${safe(d.question)}</b>

<div class="small">
A. ${safe(d.options?.[0])}<br>
B. ${safe(d.options?.[1])}<br>
C. ${safe(d.options?.[2])}<br>
D. ${safe(d.options?.[3])}
</div>

<div class="small">
<b>Answer:</b> ${safe(d.answer)}
</div>

</div>
`;

i++;

});

document.getElementById("questionBox").innerHTML =
qHtml || "<div class='empty'>No Questions Found</div>";

};

function val(id){
return document.getElementById(id).value.trim();
}

function safe(str){
return str || "";
}

loadAll();
</script>

</body>
</html>
