<!DOCTYPE html>
<html>
<head>
<title>PYQ System FIXED CORE</title>
<style>
body{font-family:Arial;background:#f5f6f7;padding:20px;}
.card{padding:15px;background:#fff;margin:10px 0;border-radius:10px;}
button{padding:10px 15px;background:#007bff;color:#fff;border:0;border-radius:8px;}
</style>
</head>
<body>

<h2>PYQ AUTO SYSTEM</h2>

<div id="sets"></div>
<div id="pdfs"></div>
<div id="quiz"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
apiKey:"X",
authDomain:"X",
projectId:"X"
});

const db = getFirestore(app);

let DATA = {};
let currentQuestions = [];

async function load(){

const snap = await getDocs(collection(db,"pyqSets"));

snap.forEach(d=>{
DATA[d.id] = d.data();
});

render();
}

function render(){

let html = "";

Object.keys(DATA).forEach(id=>{
html += `
<div class="card">
<h3>${id}</h3>
<button onclick="openSet('${id}')">Open</button>
</div>
`;
});

document.getElementById("sets").innerHTML = html;
}

window.openSet = function(id){

const data = DATA[id];

document.getElementById("pdfs").innerHTML =
(data.pdfs||[]).map(p=>`
<div class="card">
<a href="${p}" target="_blank">Open PDF</a>
</div>
`).join("");

currentQuestions = data.questions || [];

document.getElementById("quiz").innerHTML = `
<div class="card">
<button onclick="startQuiz()">Start Quiz</button>
</div>
`;
};

window.startQuiz = function(){

let q = currentQuestions[0];

document.getElementById("quiz").innerHTML = `
<div class="card">
<h3>${q.question}</h3>
</div>
`;

};

load();

</script>

</body>
</html>
