<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PYQ System</title>

<style>
body{font-family:Arial;background:#f4f6f9;padding:15px}
.container{max-width:900px;margin:auto;background:#fff;padding:20px;border-radius:12px}
.card{padding:15px;border:1px solid #ddd;border-radius:10px;margin:10px 0}
button{padding:10px;border:none;border-radius:8px;cursor:pointer;background:green;color:#fff}
select{padding:10px;margin:5px 0;width:100%}
</style>
</head>

<body>

<div class="container">

<h2>📘 PYQ System</h2>

<select id="category">
<option value="">Select Category</option>
<option>PYQ 2020</option>
<option>PYQ 2021</option>
<option>PYQ 2022</option>
<option>PYQ 2023</option>
<option>PYQ 2024</option>
<option>PYQ 2025</option>
<option>PYQ 2026</option>
<option>Model Paper</option>
<option>Practice Set</option>
</select>

<select id="post">
<option value="">Select Post</option>
<option>MTS</option>
<option>POSTMAN</option>
<option>PA-SA</option>
</select>

<button id="loadBtn">Load Data</button>

<hr>

<h3>📄 PDFs</h3>
<div id="pdfBox">No Data</div>

<h3>❓ Questions</h3>
<div id="quizBox">No Data</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDjzmo0A4KhOkrqFQdOyCEek6bsPF-UVPQ",
authDomain: "gds-departmental-exam-studyhub.firebaseapp.com",
projectId: "gds-departmental-exam-studyhub"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* helpers */
function val(id){
return document.getElementById(id).value.trim();
}

/* MAIN LOAD FUNCTION */
async function loadData(){

console.log("LOAD CLICKED");

const category = val("category");
const post = val("post");

if(!category || !post){
alert("Select category & post");
return;
}

/* ===== PDF LOAD ===== */
let pdfHTML = "";
const pdfSnap = await getDocs(collection(db,"pyqFiles"));

pdfSnap.forEach(d=>{
let data = d.data();

if(data.category !== category) return;
if(data.post !== post) return;

pdfHTML += `
<div class="card">
<b>📌 ${data.title}</b><br>
<div>📄 ${data.fileName}</div>
<div>📝 ${data.desc}</div>
</div>
`;
});

document.getElementById("pdfBox").innerHTML =
pdfHTML || "No PDF Found";


/* ===== QUESTION LOAD ===== */
let qHTML = "";
const qSnap = await getDocs(collection(db,"pyqQuestions"));

qSnap.forEach(d=>{
let data = d.data();

if(data.category !== category) return;
if(data.post !== post) return;

qHTML += `
<div class="card">
<b>${data.question}</b><br><br>
A. ${data.options[0]}<br>
B. ${data.options[1]}<br>
C. ${data.options[2]}<br>
D. ${data.options[3]}<br><br>
<b>Ans: ${data.answer}</b>
</div>
`;
});

document.getElementById("quizBox").innerHTML =
qHTML || "No Questions Found";

}

/* BUTTON FIX */
document.getElementById("loadBtn")
.addEventListener("click", loadData);

</script>

</body>
</html>
