Same Pattern as admin-syllabus.html
PDF + Questions + Bulk + Delete
========================= -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin PYQ Panel</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f4f6f9;padding:20px}
.container{
max-width:1000px;margin:auto;background:#fff;
padding:20px;border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.08)
}
h1{text-align:center;margin-bottom:20px}
.grid{display:grid;gap:12px;margin-bottom:20px}
input,select,textarea{
padding:12px;border:1px solid #ccc;
border-radius:8px;font-size:16px;width:100%
}
textarea{min-height:110px}
button{
padding:12px;border:none;border-radius:8px;
font-size:16px;font-weight:bold;cursor:pointer
}
.save-btn{background:#007bff;color:#fff}
.delete-btn{background:#dc3545;color:#fff}
.card{
background:#fafafa;padding:15px;
border:1px solid #ddd;border-radius:10px;
margin-bottom:12px
}
.row{
display:flex;justify-content:space-between;
gap:10px;flex-wrap:wrap
}
.small{font-size:14px;color:#666;margin-top:6px}
.status{text-align:center;margin:10px 0;font-weight:bold}
hr{margin:20px 0;border:none;border-top:1px solid #ddd}
</style>
</head>
<body>

<div class="container">

<h1>Admin PYQ Panel</h1>

<div class="grid">

<select id="category">
<option value="">Select Category</option>
<option>PYQ 2020</option>
<option>PYQ 2021</option>
<option>PYQ 2022</option>
<option>PYQ 2023</option>
<option>PYQ 2024</option>
<option>PYQ 2025</option>
<option>PYQ 2026</option>
<option>Model Paper</option>
<option>Practice Set</option>
</select>

<select id="post">
<option value="">Select Post</option>
<option>MTS</option>
<option>POSTMAN</option>
<option>PA-SA</option>
</select>

</div>

<!-- PDF SECTION -->
<h3>Save PDF</h3>

<div class="grid">
<input type="text" id="title" placeholder="PDF Title">
<input type="text" id="fileName" placeholder="Full PDF URL or File Name">
<textarea id="desc" placeholder="Description"></textarea>
<button class="save-btn" onclick="savePdf()">Save PDF</button>
</div>

<hr>

<!-- SINGLE QUESTION -->
<h3>Add Question</h3>

<div class="grid">
<textarea id="question" placeholder="Question"></textarea>
<input type="text" id="a" placeholder="Option A">
<input type="text" id="b" placeholder="Option B">
<input type="text" id="c" placeholder="Option C">
<input type="text" id="d" placeholder="Option D">

<select id="ans">
<option value="">Select Answer</option>
<option>A</option>
<option>B</option>
<option>C</option>
<option>D</option>
</select>

<button class="save-btn" onclick="saveQuestion()">Save Question</button>
</div>

<hr>

<!-- BULK -->
<h3>Bulk Import</h3>

<div class="grid">
<textarea id="bulk" placeholder="Question
A) Option A
B) Option B
C) Option C
D) Option D
Answer: A"></textarea>

<button class="save-btn" onclick="bulkSave()">Bulk Save</button>
</div>

<div id="statusMsg" class="status"></div>

<hr>

<h3>Saved PDFs</h3>
<div id="pdfList">Loading...</div>

<hr>

<h3>Saved Questions</h3>
<div id="questionList">Loading...</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
serverTimestamp,
query,
orderBy
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"YOUR_API_KEY",
authDomain:"YOUR_AUTH_DOMAIN",
projectId:"YOUR_PROJECT_ID",
storageBucket:"YOUR_STORAGE_BUCKET",
messagingSenderId:"YOUR_SENDER_ID",
appId:"YOUR_APP_ID"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const statusMsg=document.getElementById("statusMsg");

/* SAVE PDF */
window.savePdf=async function(){

const category=val("category");
const post=val("post");
const title=val("title");
const fileName=val("fileName");
const desc=val("desc");

if(category===""||post===""||title===""||fileName===""){
alert("Fill all PDF fields");
return;
}

await addDoc(collection(db,"pyqFiles"),{
category,post,title,fileName,desc,
createdAt:serverTimestamp()
});

status("PDF Saved");
clearPdf();
loadAll();
};

/* SAVE QUESTION */
window.saveQuestion=async function(){

const category=val("category");
const post=val("post");
const question=val("question");
const a=val("a");
const b=val("b");
const c=val("c");
const d=val("d");
const ans=val("ans");

if(category===""||post===""||question===""||a===""||b===""||c===""||d===""||ans===""){
alert("Fill all question fields");
return;
}

let answer=a;
if(ans==="B") answer=b;
if(ans==="C") answer=c;
if(ans==="D") answer=d;

await addDoc(collection(db,"pyqQuestions"),{
category,post,question,
options:[a,b,c,d],
answer,
createdAt:serverTimestamp()
});

status("Question Saved");
clearQ();
loadAll();
};

/* BULK SAVE */
window.bulkSave=async function(){

const category=val("category");
const post=val("post");
const bulk=val("bulk");

if(category===""||post===""||bulk===""){
alert("Select category/post and paste text");
return;
}

let blocks=bulk.split(/\n\s*\n/);

for(let block of blocks){

let lines=block.split("\n").map(x=>x.trim()).filter(Boolean);

if(lines.length>=6){

let q=lines[0];
let a=lines[1].replace(/^A\)/i,"").trim();
let b=lines[2].replace(/^B\)/i,"").trim();
let c=lines[3].replace(/^C\)/i,"").trim();
let d=lines[4].replace(/^D\)/i,"").trim();
let ans=lines[5].toUpperCase();

let answer=a;
if(ans.includes("B")) answer=b;
if(ans.includes("C")) answer=c;
if(ans.includes("D")) answer=d;

await addDoc(collection(db,"pyqQuestions"),{
category,post,question:q,
options:[a,b,c,d],
answer,
createdAt:serverTimestamp()
});

}

}

status("Bulk Questions Saved");
document.getElementById("bulk").value="";
loadAll();
};

/* LOAD ALL */
async function loadAll(){

/* PDF LIST */
const pdfSnap=await getDocs(query(
collection(db,"pyqFiles"),
orderBy("createdAt","desc")
));

let pdfHtml="";

pdfSnap.forEach(item=>{
let d=item.data();

pdfHtml+=`
<div class="card">
<div class="row">
<div>
<b>${d.title}</b>
<div class="small">${d.category} | ${d.post}</div>
<div class="small">${d.fileName}</div>
<div class="small">${d.desc||""}</div>
</div>
<div>
<button class="delete-btn" onclick="deletePdf('${item.id}')">Delete</button>
</div>
</div>
</div>
`;
});

document.getElementById("pdfList").innerHTML=pdfHtml||"No PDF Saved";

/* QUESTION LIST */
const qSnap=await getDocs(query(
collection(db,"pyqQuestions"),
orderBy("createdAt","desc")
));

let qHtml="";
let i=1;

qSnap.forEach(item=>{
let d=item.data();

qHtml+=`
<div class="card">
<div class="row">
<div>
<b>${i}. ${d.question}</b>
<div class="small">${d.category} | ${d.post}</div>
<div class="small">
A. ${d.options[0]}<br>
B. ${d.options[1]}<br>
C. ${d.options[2]}<br>
D. ${d.options[3]}
</div>
<div class="small"><b>Answer:</b> ${d.answer}</div>
</div>

<div>
<button class="delete-btn" onclick="deleteQ('${item.id}')">Delete</button>
</div>
</div>
</div>
`;

i++;
});

document.getElementById("questionList").innerHTML=qHtml||"No Questions Saved";
}

/* DELETE */
window.deletePdf=async function(id){
await deleteDoc(doc(db,"pyqFiles",id));
loadAll();
};

window.deleteQ=async function(id){
await deleteDoc(doc(db,"pyqQuestions",id));
loadAll();
};

function val(id){
return document.getElementById(id).value.trim();
}

function clearPdf(){
["title","fileName","desc"].forEach(id=>{
document.getElementById(id).value="";
});
}

function clearQ(){
["question","a","b","c","d","ans"].forEach(id=>{
document.getElementById(id).value="";
});
}

function status(t){
statusMsg.innerText=t;
}

loadAll();
</script>
</body>
</html>
