<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin PYQ Firebase Manager</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}
body{
background:#f4f4f4;
}
.topbar{
background:#000;
color:#fff;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}
.container{
max-width:1000px;
margin:auto;
padding:20px;
}
.box{
background:#fff;
padding:18px;
border-radius:14px;
box-shadow:0 4px 10px rgba(0,0,0,.08);
margin-bottom:18px;
}
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
margin-bottom:18px;
}
.card{
background:#fff;
padding:18px 10px;
border-radius:14px;
text-align:center;
font-weight:bold;
font-size:16px;
box-shadow:0 4px 10px rgba(0,0,0,.08);
cursor:pointer;
}
input,textarea,select{
width:100%;
padding:11px;
margin-top:8px;
border:1px solid #ccc;
border-radius:10px;
font-size:15px;
}
textarea{
min-height:100px;
resize:vertical;
}
button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
margin-top:12px;
}
.save{background:#007bff;color:#fff;}
.bulk{background:green;color:#fff;}
.back{
display:block;
text-align:center;
text-decoration:none;
background:#111;
color:#fff;
padding:12px;
border-radius:10px;
font-weight:bold;
margin-top:18px;
}
.list{
margin-top:15px;
}
.item{
background:#f8f8f8;
padding:10px;
border-radius:10px;
margin-bottom:10px;
border-left:4px solid #007bff;
}
.hide{
display:none;
}
@media(min-width:700px){
.grid{
grid-template-columns:repeat(3,1fr);
}
}
</style>
</head>

<body>

<div class="topbar">📄 Admin PYQ Firebase Manager</div>

<div class="container">

<div class="box">
<b>Welcome Admin 🔐 Permanent Cloud Save</b>
</div>

<div class="grid">
<div class="card" onclick="choose('PYQ 2021')">📘 PYQ 2021</div>
<div class="card" onclick="choose('PYQ 2022')">📘 PYQ 2022</div>
<div class="card" onclick="choose('PYQ 2023')">📘 PYQ 2023</div>
<div class="card" onclick="choose('PYQ 2024')">📘 PYQ 2024</div>
<div class="card" onclick="choose('Model Paper')">📝 Model Paper</div>
<div class="card" onclick="choose('Practice Set')">🏆 Practice Set</div>
</div>

<div class="box hide" id="panel">

<h3 id="title">Add Questions</h3>

<label>Question</label>
<textarea id="question"></textarea>

<label>Option A</label>
<input id="opt1">

<label>Option B</label>
<input id="opt2">

<label>Option C</label>
<input id="opt3">

<label>Option D</label>
<input id="opt4">

<label>Correct Answer</label>
<select id="answer">
<option value="A">Option A</option>
<option value="B">Option B</option>
<option value="C">Option C</option>
<option value="D">Option D</option>
</select>

<button class="save" onclick="saveSingle()">Save Single Question</button>

<hr style="margin:18px 0">

<h3>Bulk Paste Questions</h3>

<textarea id="bulkBox"></textarea>

<button class="bulk" onclick="bulkImport()">Bulk Import</button>

<div class="list" id="listBox"></div>

</div>

<a href="admin-pannel.html" class="back">⬅ Back to Admin Panel</a>

</div>

<script type="module" src="firebase.js"></script>

<script type="module">
import {
getDatabase,
ref,
push,
onValue
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

const db = getDatabase(window.app);

let current = "";

/* ---------- CATEGORY ---------- */
window.choose = function(cat){

current = cat;

document.getElementById("panel").classList.remove("hide");

document.getElementById("title").innerText =
cat + " - Add Questions";

showList();

window.scrollTo({
top:500,
behavior:"smooth"
});

};

/* ---------- SAVE SINGLE ---------- */
window.saveSingle = async function(){

if(current===""){
alert("Select category first");
return;
}

let q = val("question");
let a = val("opt1");
let b = val("opt2");
let c = val("opt3");
let d = val("opt4");
let ans = val("answer");

if(q===""||a===""||b===""||c===""||d===""){
alert("Fill all fields");
return;
}

let correct=a;
if(ans==="B") correct=b;
if(ans==="C") correct=c;
if(ans==="D") correct=d;

await push(ref(db,"pyqQuestions"),{
category:current,
question:q,
options:[a,b,c,d],
answer:correct,
time:Date.now()
});

clearSingle();
alert("Saved Permanently");

};

/* ---------- BULK IMPORT ---------- */
window.bulkImport = async function(){

if(current===""){
alert("Select category first");
return;
}

let text = val("bulkBox");

if(text===""){
alert("Paste questions first");
return;
}

let blocks = text.split(/\n\s*\n/);

let count=0;

for(let block of blocks){

let lines = block.split("\n").map(x=>x.trim()).filter(Boolean);

if(lines.length>=6){

let q=lines[0];
let a=clean(lines[1]);
let b=clean(lines[2]);
let c=clean(lines[3]);
let d=clean(lines[4]);

let ansLine=lines[5].toUpperCase();

let correct=a;
if(ansLine.includes("B")) correct=b;
if(ansLine.includes("C")) correct=c;
if(ansLine.includes("D")) correct=d;

await push(ref(db,"pyqQuestions"),{
category:current,
question:q,
options:[a,b,c,d],
answer:correct,
time:Date.now()
});

count++;

}

}

document.getElementById("bulkBox").value="";
alert(count + " Questions Saved Permanently");

};

/* ---------- SHOW ---------- */
function showList(){

onValue(ref(db,"pyqQuestions"),(snap)=>{

let data=snap.val() || {};
let html="<br>";

let i=0;

for(let key in data){

let x=data[key];

if(x.category===current){

i++;

html += `
<div class="item">
<b>${i}. ${x.question}</b><br>
A. ${x.options[0]}<br>
B. ${x.options[1]}<br>
C. ${x.options[2]}<br>
D. ${x.options[3]}<br>
<b>Answer:</b> ${x.answer}
</div>
`;

}

}

if(i===0){
html="<br><b>No Questions Added</b>";
}

document.getElementById("listBox").innerHTML=html;

});

}

/* ---------- HELPERS ---------- */
function val(id){
return document.getElementById(id).value.trim();
}

function clearSingle(){
["question","opt1","opt2","opt3","opt4"].forEach(id=>{
document.getElementById(id).value="";
});
}

function clean(t){
return t.replace(/^A\)|^B\)|^C\)|^D\)/i,"").trim();
}
</script>

</body>
</html>
