<!DOCTYPE html>

<head>

<title>Admin PYQ Panel</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f4f6f9;padding:20px}
.container{
max-width:1000px;
margin:auto;
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.08)
}
h1{text-align:center;margin-bottom:20px}
h3{margin:15px 0 10px}
.grid{display:grid;gap:12px}
input,select,textarea{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
outline:none
}
textarea{min-height:110px}
button{
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
font-weight:bold;
cursor:pointer
}
.save-btn{background:#007bff;color:#fff}
.delete-btn{background:#dc3545;color:#fff}
.card{
background:#fafafa;
padding:15px;
border:1px solid #ddd;
border-radius:10px;
margin-bottom:12px
}
.row{
display:flex;
justify-content:space-between;
gap:10px;
flex-wrap:wrap
}
.small{font-size:14px;color:#666;margin-top:5px}
.status{text-align:center;font-weight:bold;margin:12px 0}
hr{margin:20px 0;border:none;border-top:1px solid #ddd}
</style>
</head>
<body>

<div class="container">

<h1>Admin PYQ Panel</h1>

<!-- 🔥 YEAR + CIRCLE + POST -->
<div class="grid">

<select id="category" onchange="updateCircles()">
<option value="">Select Year</option>

<option value="2020">2020</option>
<option value="2021">2021</option>
<option value="2022">2022</option>
<option value="2023">2023</option>
<option value="2024">2024</option>
<option value="2025">2025</option>
<option value="2026">2026</option>

<option value="Model Paper">Model Paper</option>
<option value="Practice Set">Practice Set</option>

</select>

<label for="circle">Select Circle:</label>
<select id="circle" name="circle">
    <option value="">-- Select Circle --</option>
    <option value="chhattisgarh">Chhattisgarh Circle</option>
    <option value="mp">MP Circle</option>
    <option value="jammu_kashmir">J & K Circle</option>
    <option value="bihar">Bihar Circle</option>
    <option value="rajasthan">Rajasthan Circle</option>
    <option value="jharkhand">Jharkhand Circle</option>
</select>
<select id="post">
<option value="">Select Post</option>
<option>MTS</option>
<option>POSTMAN</option>
<option>PA-SA</option>
</select>

</div>

<div id="statusMsg" class="status">Loading...</div>

<hr>

<h3>PDF OCR to Bulk Text</h3>
<div class="grid">
<input type="file" id="pdfFile" accept=".pdf,image/*">
<button class="save-btn" onclick="extractPdf()">Extract Questions</button>
</div>

<h3>Save PDF</h3>
<div class="grid">
<input type="text" id="title" placeholder="PDF Title">
<input type="text" id="fileName" placeholder="File Name/URL">
<textarea id="desc" placeholder="Description"></textarea>
<button class="save-btn" onclick="savePdf()">Save PDF</button>
</div>

<hr>

<h3>Add Question</h3>
<div class="grid">
<textarea id="question"></textarea>
<input id="a" placeholder="Option A">
<input id="b" placeholder="Option B">
<input id="c" placeholder="Option C">
<input id="d" placeholder="Option D">

<select id="ans">
<option value="">Select Answer</option>
<option>A</option><option>B</option>
<option>C</option><option>D</option>
</select>

<button class="save-btn" onclick="saveQuestion()">Save Question</button>
</div>

<hr>

<h3>Bulk Import</h3>
<div class="grid">
<textarea id="bulk"></textarea>
<button class="save-btn" onclick="bulkSave()">Bulk Save</button>
</div>

<hr>

<h3>Saved PDFs</h3>
<div id="pdfList">Loading...</div>

<hr>

<h3>Saved Questions</h3>
<div id="questionList">Loading...</div>

</div>

<script type="module">

/* STATUS */
function status(t,color="green"){

window.savePdf = async function () {
status("Saving...", "blue");

await addDoc(collection(db, "pyqFiles"), {
title: document.getElementById("title").value,
fileName: document.getElementById("fileName").value,
desc: document.getElementById("desc").value,
category: document.getElementById("category").value,
circle: document.getElementById("circle").value,
post: document.getElementById("post").value,

});

status("PDF Saved Successfully");

loadPdfs();
};

window.deletePdf = async function(id){

if(!confirm("Delete this PDF?")) return;

await deleteDoc(doc(db,"pyqFiles",id));

alert("Deleted Successfully");

loadPdfs();
};

window.loadPdfs = async function () {

const snap = await getDocs(collection(db,"pyqFiles"));

let html = "";

snap.forEach(docSnap => {
let d = docSnap.data();

html += `
<div class="card">
<div><b>${d.title}</b></div>
<div class="small">${d.desc || ""}</div>
<div class="small">${d.fileName || ""}</div>

<button class="delete-btn" onclick="deletePdf('${docSnap.id}')">
Delete
</button>

</div>
`;
});

document.getElementById("pdfList").innerHTML = html;
};

// =====================
// SAVE QUESTION
// =====================
window.saveQuestion = async function () {

const q = document.getElementById("question").value.trim();
const a = document.getElementById("a").value.trim();
const b = document.getElementById("b").value.trim();
const c = document.getElementById("c").value.trim();
const d = document.getElementById("d").value.trim();
const ans = document.getElementById("ans").value;

const category = document.getElementById("category").value;
const circle = document.getElementById("circle").value;
const post = document.getElementById("post").value;

if(!q || !a || !b || !c || !d || !ans){
return alert("Fill all fields");
}

await addDoc(collection(db,"pyqQuestions"),{
question: q,
options: [a,b,c,d],
answer: ans,
category,
circle,
post,
time: serverTimestamp()
});

status("Question Saved ✅");
};


// =====================
// LOAD ALL QUESTIONS
// =====================
window.loadAll = async function () {

const qSnap = await getDocs(collection(db,"pyqQuestions"));

let html = "";

qSnap.forEach(docSnap => {
let d = docSnap.data();

html += `
<div class="card">

<div><b>${d.question}</b></div>

<div class="small">
A. ${d.options?.[0] || ""}<br>
B. ${d.options?.[1] || ""}<br>
C. ${d.options?.[2] || ""}<br>
D. ${d.options?.[3] || ""}
</div>

<div class="small">Answer: ${d.answer || ""}</div>

<button class="delete-btn" onclick="deleteQuestion('${docSnap.id}')">
Delete
</button>

</div>
`;
});

document.getElementById("questionList").innerHTML = html;

};


// =====================
// DELETE QUESTION (FIXED)
// =====================
window.deleteQuestion = async function(id){

if(!confirm("Delete this question?")) return;

await deleteDoc(doc(db,"pyqQuestions",id));

alert("Deleted Successfully");

loadAll();
};

window.bulkSave = async function () {

const text = document.getElementById("bulk").value.trim();
if(!text) return alert("Paste questions first");

const category = document.getElementById("category").value;
const circle = document.getElementById("circle").value;
const post = document.getElementById("post").value;

const blocks = text.split("\n\n");

let count = 0;

for(const block of blocks){

const lines = block.split("\n").map(l => l.trim()).filter(Boolean);

if(lines.length < 5) continue;

let q = lines[0];
let a="", b="", c="", d="", ans="";

for(let i=1;i<lines.length;i++){
let l = lines[i];

// ANSWER
if(/^answer/i.test(l)){
ans = l.split(":")[1]?.trim() || "";
continue;
}

// OPTIONS FIXED CLEAN
if(/^A[\)\.\-:]?/i.test(l)) a = l.replace(/^A[\)\.\-:]?/i,"").trim();
else if(/^B[\)\.\-:]?/i.test(l)) b = l.replace(/^B[\)\.\-:]?/i,"").trim();
else if(/^C[\)\.\-:]?/i.test(l)) c = l.replace(/^C[\)\.\-:]?/i,"").trim();
else if(/^D[\)\.\-:]?/i.test(l)) d = l.replace(/^D[\)\.\-:]?/i,"").trim();
}

if(!q || !a || !b || !c || !d) continue;

await addDoc(collection(db,"pyqQuestions"),{
question:q,
options:[a,b,c,d],
answer:ans,
category,
circle,
post,
time:serverTimestamp()
});

count++;
}

alert(count + " Questions Uploaded");
status(count + " Questions Saved");

loadAll();
};

};

};
