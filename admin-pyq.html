STRICT FINAL UPDATED admin-pyq.html
PDF Upload + Single Question + Bulk Import
GitHub Upload + Firestore Save
========================= -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin PYQ Manager</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#f4f4f4;padding:20px}
.wrap{max-width:1000px;margin:auto}
.box{background:#fff;padding:18px;border-radius:14px;margin-bottom:18px}
input,select,textarea,button{
width:100%;padding:12px;margin-top:10px;
border:1px solid #ccc;border-radius:10px
}
button{background:#007bff;color:#fff;font-weight:bold;border:none}
textarea{min-height:100px}
.item{
background:#f8f8f8;padding:12px;border-radius:12px;
margin-top:10px;border-left:4px solid #007bff
}
</style>
</head>
<body>

<div class="wrap">

<div class="box">
<h2>📄 Admin PYQ Manager</h2>

<select id="category">
<option>PYQ 2020</option>
<option>PYQ 2021</option>
<option>PYQ 2022</option>
<option>PYQ 2023</option>
<option>PYQ 2024</option>
<option>PYQ 2025</option>
<option>PYQ 2026</option>
<option>Model Paper</option>
<option>Practice Set</option>
</select>

<select id="post">
<option>MTS</option>
<option>POSTMAN</option>
<option>PA-SA</option>
</select>
</div>

<div class="box">
<h3>Upload PDF</h3>

<input type="file" id="pdfFile" accept="application/pdf">
<input type="text" id="title" placeholder="Title">
<textarea id="desc" placeholder="Description"></textarea>

<button onclick="uploadPdf()">Upload PDF + Save</button>
</div>

<div class="box">
<h3>Add Single Question</h3>

<textarea id="question" placeholder="Question"></textarea>
<input type="text" id="a" placeholder="Option A">
<input type="text" id="b" placeholder="Option B">
<input type="text" id="c" placeholder="Option C">
<input type="text" id="d" placeholder="Option D">

<select id="ans">
<option>A</option>
<option>B</option>
<option>C</option>
<option>D</option>
</select>

<button onclick="saveSingle()">Save Question</button>
</div>

<div class="box">
<h3>Bulk Import</h3>

<textarea id="bulk" placeholder="Question&#10;A) Opt1&#10;B) Opt2&#10;C) Opt3&#10;D) Opt4&#10;Answer: A"></textarea>

<button onclick="bulkImport()">Bulk Save</button>
</div>

<div class="box">
<div id="msg"></div>
</div>

</div>

<script type="module" src="firebase.js"></script>

<script type="module">
import {
collection,addDoc
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

function vals(){
return {
category:document.getElementById("category").value,
post:document.getElementById("post").value
};
}

/* PDF Upload */
window.uploadPdf=async function(){

const file=document.getElementById("pdfFile").files[0];
const title=document.getElementById("title").value.trim();
const desc=document.getElementById("desc").value.trim();

if(!file||!title) return alert("Fill fields");

const token=prompt("Enter GitHub PAT");
if(!token) return;

const {category,post}=vals();

document.getElementById("msg").innerText="Uploading...";

const fileName=Date.now()+"_"+file.name;
const path="pdfs/"+fileName;

const buffer=await file.arrayBuffer();
const bytes=new Uint8Array(buffer);

let binary="";
bytes.forEach(b=>binary+=String.fromCharCode(b));

const base64=btoa(binary);

const api=`https://api.github.com/repos/rameshwarsahu2014bpmjarwe1694-hue/GDS-DEPARTMETAL-EXAM-NOTES/contents/${path}`;

await fetch(api,{
method:"PUT",
headers:{
Authorization:"token "+token,
"Content-Type":"application/json"
},
body:JSON.stringify({
message:"Upload "+fileName,
content:base64
})
});

const fileUrl=`https://rameshwarsahu2014bpmjarwe1694-hue.github.io/GDS-DEPARTMETAL-EXAM-NOTES/${path}`;

await addDoc(collection(window.db,"pyqFiles"),{
category,post,title,description:desc,fileName,fileUrl,createdAt:Date.now()
});

document.getElementById("msg").innerText="PDF Uploaded + Saved";
};

/* Single Question */
window.saveSingle=async function(){

const {category,post}=vals();

let q=document.getElementById("question").value.trim();
let a=document.getElementById("a").value.trim();
let b=document.getElementById("b").value.trim();
let c=document.getElementById("c").value.trim();
let d=document.getElementById("d").value.trim();
let ans=document.getElementById("ans").value;

let correct=a;
if(ans==="B") correct=b;
if(ans==="C") correct=c;
if(ans==="D") correct=d;

await addDoc(collection(window.db,"pyqQuestions"),{
category,post,
question:q,
options:[a,b,c,d],
answer:correct,
createdAt:Date.now()
});

document.getElementById("msg").innerText="Question Saved";
};

/* Bulk */
window.bulkImport=async function(){

const {category,post}=vals();

let text=document.getElementById("bulk").value.trim();

if(!text) return;

let blocks=text.split(/\n\s*\n/);

for(let block of blocks){

let lines=block.split("\n").map(x=>x.trim()).filter(Boolean);

if(lines.length>=6){

let q=lines[0];
let a=lines[1].replace(/^A\)/i,"").trim();
let b=lines[2].replace(/^B\)/i,"").trim();
let c=lines[3].replace(/^C\)/i,"").trim();
let d=lines[4].replace(/^D\)/i,"").trim();
let ans=lines[5].toUpperCase();

let correct=a;
if(ans.includes("B")) correct=b;
if(ans.includes("C")) correct=c;
if(ans.includes("D")) correct=d;

await addDoc(collection(window.db,"pyqQuestions"),{
category,post,
question:q,
options:[a,b,c,d],
answer:correct,
createdAt:Date.now()
});
}
}

document.getElementById("msg").innerText="Bulk Questions Saved";
};
</script>
</body>
</html>
