<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin PYQ Manager</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f4f4;
}

.topbar{
background:#000;
color:#fff;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.welcome{
background:#fff;
padding:14px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,.08);
margin-bottom:18px;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
margin-bottom:20px;
}

.card{
background:#fff;
padding:18px 10px;
border-radius:14px;
text-align:center;
font-weight:bold;
font-size:16px;
box-shadow:0 4px 10px rgba(0,0,0,.08);
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:translateY(-3px);
}

.formbox{
background:#fff;
padding:18px;
border-radius:14px;
box-shadow:0 4px 10px rgba(0,0,0,.08);
display:none;
}

label{
display:block;
margin-top:12px;
font-weight:bold;
}

input,textarea,select{
width:100%;
padding:11px;
margin-top:6px;
border:1px solid #ccc;
border-radius:10px;
font-size:15px;
}

textarea{
resize:vertical;
min-height:90px;
}

button{
margin-top:16px;
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.save{
background:#007bff;
color:#fff;
width:100%;
}

.back{
margin-top:20px;
display:block;
background:#111;
color:#fff;
padding:13px;
text-align:center;
border-radius:10px;
text-decoration:none;
font-weight:bold;
}

.list{
margin-top:18px;
}

.item{
background:#f8f8f8;
padding:12px;
border-radius:10px;
margin-bottom:10px;
border-left:4px solid #007bff;
}

@media(min-width:700px){
.grid{
grid-template-columns:repeat(3,1fr);
}
}
</style>
</head>

<body>

<div class="topbar">📄 Admin PYQ Manager</div>

<div class="container">

<div class="welcome" id="welcomeBox">
Welcome Admin 🔐 Manage Previous Year Questions
</div>

<div class="grid">
<div class="card" onclick="selectCategory('PYQ 2021')">📘 PYQ 2021</div>
<div class="card" onclick="selectCategory('PYQ 2022')">📘 PYQ 2022</div>
<div class="card" onclick="selectCategory('PYQ 2023')">📘 PYQ 2023</div>
<div class="card" onclick="selectCategory('PYQ 2024')">📘 PYQ 2024</div>
<div class="card" onclick="selectCategory('Model Paper')">📝 Model Paper</div>
<div class="card" onclick="selectCategory('Practice Set')">🏆 Practice Set</div>
</div>

<div class="formbox" id="formBox">

<h3 id="title">Add PYQ</h3>

<label>Question</label>
<textarea id="question"></textarea>

<label>Option A</label>
<input type="text" id="opt1">

<label>Option B</label>
<input type="text" id="opt2">

<label>Option C</label>
<input type="text" id="opt3">

<label>Option D</label>
<input type="text" id="opt4">

<label>Correct Answer</label>
<select id="answer">
<option value="A">Option A</option>
<option value="B">Option B</option>
<option value="C">Option C</option>
<option value="D">Option D</option>
</select>

<button class="save" onclick="savePYQ()">Save Question</button>

<div class="list" id="listBox"></div>

</div>

<a href="admin-pannel.html" class="back">⬅ Back to Admin Panel</a>

</div>

<!-- Firebase -->
<script type="module" src="firebase.js"></script>
<script defer src="script.js"></script>

<script type="module">
import {
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

/* ---------- SECURITY ---------- */
document.addEventListener("contextmenu",e=>e.preventDefault());

document.addEventListener("keydown",function(e){
if(
e.key==="F12" ||
(e.ctrlKey && e.shiftKey && ["I","J","C"].includes(e.key.toUpperCase())) ||
(e.ctrlKey && e.key.toUpperCase()==="U")
){
e.preventDefault();
}
});

/* ---------- ADMIN AUTH ---------- */
function waitForFirebase(){
if(window.auth){
checkAdmin();
}else{
setTimeout(waitForFirebase,300);
}
}

function checkAdmin(){

onAuthStateChanged(window.auth,(user)=>{

if(!user){
alert("Please login first.");
location.href="admin.html";
return;
}

if(user.email !== "rameshwarsahu2014bpmjarwe1694@gmail.com"){
alert("Unauthorized Access");
location.href="login.html";
return;
}

let name = user.email.split("@")[0];

document.getElementById("welcomeBox").innerText =
"Welcome " + name + " 🔐 Manage Previous Year Questions";

});

}

waitForFirebase();

/* ---------- STORAGE ---------- */
let allPYQ =
JSON.parse(localStorage.getItem("pyqQuestions")) || [];

let currentCategory = "";

/* ---------- SELECT CATEGORY ---------- */
window.selectCategory = function(cat){

currentCategory = cat;

document.getElementById("formBox").style.display="block";

document.getElementById("title").innerText =
cat + " - Add Questions";

showList();

window.scrollTo({
top:500,
behavior:"smooth"
});

}

/* ---------- SAVE ---------- */
window.savePYQ = function(){

let q = val("question");
let a = val("opt1");
let b = val("opt2");
let c = val("opt3");
let d = val("opt4");
let ans = val("answer");

if(currentCategory===""){
alert("Select category first.");
return;
}

if(q===""||a===""||b===""||c===""||d===""){
alert("Fill all fields.");
return;
}

let correct = a;

if(ans==="B") correct=b;
if(ans==="C") correct=c;
if(ans==="D") correct=d;

allPYQ.push({
category:currentCategory,
question:q,
options:[a,b,c,d],
answer:correct
});

localStorage.setItem(
"pyqQuestions",
JSON.stringify(allPYQ)
);

clearInputs();
showList();

alert("Question Saved");

}

/* ---------- SHOW ---------- */
function showList(){

let box = document.getElementById("listBox");

let data = allPYQ.filter(x => x.category===currentCategory);

if(data.length===0){
box.innerHTML="<br><b>No Questions Added</b>";
return;
}

let html="<br><b>Total: "+data.length+"</b><br><br>";

data.forEach(function(x,i){

html += `
<div class="item">
<b>${i+1}. ${x.question}</b><br>
A. ${x.options[0]}<br>
B. ${x.options[1]}<br>
C. ${x.options[2]}<br>
D. ${x.options[3]}<br>
<b>Answer:</b> ${x.answer}
</div>
`;

});

box.innerHTML = html;

}

/* ---------- HELPERS ---------- */
function val(id){
return document.getElementById(id).value.trim();
}

function clearInputs(){
["question","opt1","opt2","opt3","opt4"].forEach(id=>{
document.getElementById(id).value="";
});
}
</script>

</body>
</html>
