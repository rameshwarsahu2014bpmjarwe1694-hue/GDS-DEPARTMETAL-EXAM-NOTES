<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin PYQ Panel</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f4f6f9;padding:20px}
.container{
max-width:1000px;
margin:auto;
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.08)
}
h1{text-align:center;margin-bottom:20px}
h3{margin:15px 0 10px}
.grid{display:grid;gap:12px}
input,select,textarea{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
outline:none
}
textarea{min-height:110px}
button{
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
font-weight:bold;
cursor:pointer
}
.save-btn{background:#007bff;color:#fff}
.delete-btn{background:#dc3545;color:#fff}
.card{
background:#fafafa;
padding:15px;
border:1px solid #ddd;
border-radius:10px;
margin-bottom:12px
}
.row{
display:flex;
justify-content:space-between;
gap:10px;
flex-wrap:wrap
}
.small{font-size:14px;color:#666;margin-top:5px}
.status{text-align:center;font-weight:bold;margin:12px 0}
hr{margin:20px 0;border:none;border-top:1px solid #ddd}
</style>
</head>
<body>

<div class="container">

<h1>Admin PYQ Panel</h1>

<!-- 🔥 YEAR + CIRCLE + POST -->
<div class="grid">

<select id="category" onchange="updateCircles()">
<option value="">Select Year</option>

<option value="2020">2020</option>
<option value="2021">2021</option>
<option value="2022">2022</option>
<option value="2023">2023</option>
<option value="2024">2024</option>
<option value="2025">2025</option>
<option value="2026">2026</option>

<option value="Model Paper">Model Paper</option>
<option value="Practice Set">Practice Set</option>

</select>

<label for="circle">Select Circle:</label>
<select id="circle" name="circle">
    <option value="">-- Select Circle --</option>
    <option value="chhattisgarh">Chhattisgarh Circle</option>
    <option value="mp">MP Circle</option>
    <option value="jammu_kashmir">J & K Circle</option>
    <option value="bihar">Bihar Circle</option>
    <option value="rajasthan">Rajasthan Circle</option>
    <option value="jharkhand">Jharkhand Circle</option>
</select>
<select id="post">
<option value="">Select Post</option>
<option>MTS</option>
<option>POSTMAN</option>
<option>PA-SA</option>
</select>

</div>

<div id="statusMsg" class="status">Loading...</div>

<hr>

<h3>PDF OCR to Bulk Text</h3>
<div class="grid">
<input type="file" id="pdfFile" accept=".pdf,image/*">
<button class="save-btn" onclick="extractPdf()">Extract Questions</button>
</div>

<h3>Save PDF</h3>
<div class="grid">
<input type="text" id="title" placeholder="PDF Title">
<input type="text" id="fileName" placeholder="File Name/URL">
<textarea id="desc" placeholder="Description"></textarea>
<button class="save-btn" onclick="savePdf()">Save PDF</button>
</div>

<hr>

<h3>Add Question</h3>
<div class="grid">
<textarea id="question"></textarea>
<input id="a" placeholder="Option A">
<input id="b" placeholder="Option B">
<input id="c" placeholder="Option C">
<input id="d" placeholder="Option D">

<select id="ans">
<option value="">Select Answer</option>
<option>A</option><option>B</option>
<option>C</option><option>D</option>
</select>

<button class="save-btn" onclick="saveQuestion()">Save Question</button>
</div>

<hr>

<h3>Bulk Import</h3>
<div class="grid">
<textarea id="bulk"></textarea>
<button class="save-btn" onclick="bulkSave()">Bulk Save</button>
</div>

<hr>

<h3>Saved PDFs</h3>
<div id="pdfList">Loading...</div>

<hr>

<h3>Saved Questions</h3>
<div id="questionList">Loading...</div>

</div>

</body>
