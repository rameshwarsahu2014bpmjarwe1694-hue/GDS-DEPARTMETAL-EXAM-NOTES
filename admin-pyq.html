<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin PYQ Panel</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f4f6f9;padding:20px}
.container{
max-width:1000px;margin:auto;background:#fff;
padding:20px;border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.08)
}
h1{text-align:center;margin-bottom:20px}
.grid{display:grid;gap:12px;margin-bottom:20px}
input,select,textarea{
padding:12px;border:1px solid #ccc;
border-radius:8px;font-size:16px;width:100%
}
textarea{min-height:100px}
button{
padding:12px;border:none;border-radius:8px;
font-size:16px;font-weight:bold;cursor:pointer
}
.save-btn{background:#007bff;color:#fff}
.del-btn{background:#dc3545;color:#fff}
.card{
background:#fafafa;padding:15px;
border:1px solid #ddd;border-radius:10px;
margin-bottom:12px
}
.row{
display:flex;justify-content:space-between;
gap:10px;flex-wrap:wrap
}
.small{font-size:14px;color:#666;margin-top:6px}
.status{text-align:center;font-weight:bold;margin-bottom:15px}
</style>
</head>
<body>

<div class="container">

<h1>Admin PYQ Panel</h1>

<div class="grid">

<select id="category">
<option value="">Select Year</option>
<option>PYQ 2020</option>
<option>PYQ 2021</option>
<option>PYQ 2022</option>
<option>PYQ 2023</option>
<option>PYQ 2024</option>
<option>PYQ 2025</option>
<option>PYQ 2026</option>
<option>Model Paper</option>
<option>Practice Set</option>
</select>

<select id="post">
<option value="">Select Post</option>
<option>MTS</option>
<option>POSTMAN</option>
<option>PA-SA</option>
</select>

<textarea id="question" placeholder="Question"></textarea>

<input type="text" id="a" placeholder="Option A">
<input type="text" id="b" placeholder="Option B">
<input type="text" id="c" placeholder="Option C">
<input type="text" id="d" placeholder="Option D">

<select id="ans">
<option value="">Select Answer</option>
<option>A</option>
<option>B</option>
<option>C</option>
<option>D</option>
</select>

<button class="save-btn" onclick="savePYQ()">Save Question</button>

<div id="statusMsg" class="status"></div>

</div>

<div id="list">Loading...</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
serverTimestamp,
query,
orderBy
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyDjzmo0A4KhOkrqFQdOyCEek6bsPF-UVPQ",
authDomain: "gds-departmental-exam-studyhub.firebaseapp.com",
projectId: "gds-departmental-exam-studyhub",
storageBucket: "gds-departmental-exam-studyhub.appspot.com",
messagingSenderId: "759916756080",
appId: "1:759916756080:web:7f2c0e66458bd007e888b5"
};

const ADMIN_EMAIL="rameshwarsahu2014bpmjarwe1694@gmail.com";
const ADMIN_PASS="YOUR_ADMIN_PASSWORD";

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);

const list=document.getElementById("list");
const statusMsg=document.getElementById("statusMsg");

/* AUTO LOGIN */
signInWithEmailAndPassword(auth,ADMIN_EMAIL,ADMIN_PASS)
.then(()=>loadData())
.catch(err=>{
statusMsg.innerText="Admin Login Failed";
statusMsg.style.color="red";
console.log(err);
});

/* SAVE */
window.savePYQ=async function(){

if(!auth.currentUser) return alert("Admin not logged in");

const category=val("category");
const post=val("post");
const question=val("question");
const a=val("a");
const b=val("b");
const c=val("c");
const d=val("d");
const ans=val("ans");

if(category==="") return alert("Select year");
if(post==="") return alert("Select post");
if(question.length<3) return alert("Enter question");
if(a===""||b===""||c===""||d==="") return alert("Fill all options");
if(ans==="") return alert("Select answer");

let correct=a;
if(ans==="B") correct=b;
if(ans==="C") correct=c;
if(ans==="D") correct=d;

try{

statusMsg.innerText="Saving...";

await addDoc(collection(db,"pyqQuestions"),{
category:esc(category),
post:esc(post),
question:esc(question),
options:[esc(a),esc(b),esc(c),esc(d)],
answer:esc(correct),
createdAt:serverTimestamp()
});

clearForm();

statusMsg.innerText="Saved Permanently";
statusMsg.style.color="green";

loadData();

}catch(err){
statusMsg.innerText="Save Failed";
statusMsg.style.color="red";
console.log(err);
}

};

/* LOAD */
async function loadData(){

try{

const q=query(collection(db,"pyqQuestions"),orderBy("createdAt","desc"));
const snap=await getDocs(q);

list.innerHTML="";

if(snap.empty){
list.innerHTML="<p>No questions added.</p>";
return;
}

let i=1;

snap.forEach(item=>{

const d=item.data();

list.innerHTML+=`
<div class="card">
<div class="row">
<div>
<h3>${i}. ${safe(d.question)}</h3>
<p>${safe(d.category)} | ${safe(d.post)}</p>
<p class="small">
A. ${safe(d.options?.[0])}<br>
B. ${safe(d.options?.[1])}<br>
C. ${safe(d.options?.[2])}<br>
D. ${safe(d.options?.[3])}
</p>
<p class="small"><b>Answer:</b> ${safe(d.answer)}</p>
</div>

<div>
<button class="del-btn" onclick="deleteItem('${item.id}')">Delete</button>
</div>
</div>
</div>
`;
i++;

});

}catch(err){
list.innerHTML="Load Failed";
console.log(err);
}

}

/* DELETE */
window.deleteItem=async function(id){

if(!confirm("Delete this question?")) return;

await deleteDoc(doc(db,"pyqQuestions",id));
loadData();

};

function val(id){
return document.getElementById(id).value.trim();
}

function clearForm(){
["category","post","question","a","b","c","d","ans"].forEach(id=>{
document.getElementById(id).value="";
});
}

function esc(str){
return String(str).replace(/[&<>"']/g,m=>({
"&":"&amp;",
"<":"&lt;",
">":"&gt;",
'"':"&quot;",
"'":"&#39;"
}[m]));
}

function safe(str){ return str || ""; }

</script>
</body>
</html>
