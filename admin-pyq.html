<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin PYQ Panel</title>
<style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
    body{background:#f4f6f9;padding:20px}
    .container{max-width:1000px;margin:auto;background:#fff;padding:20px;border-radius:12px;box-shadow:0 5px 15px rgba(0,0,0,.08)}
    h1{text-align:center;margin-bottom:20px}
    .grid{display:grid;gap:12px}
    input,select,textarea{width:100%;padding:12px;border:1px solid #ccc;border-radius:8px;font-size:16px;outline:none}
    button{padding:12px;border:none;border-radius:8px;font-size:16px;font-weight:bold;cursor:pointer}
    .save-btn{background:#007bff;color:#fff}
    .status{text-align:center;font-weight:bold;margin:12px 0}
    .card{background:#fafafa;padding:15px;border:1px solid #ddd;border-radius:10px;margin-bottom:12px}
</style>
</head>
<body>
<div class="container">
    <h1>Admin PYQ Panel</h1>
    <div id="loginArea" class="grid" style="margin-bottom:20px;">
        <input type="password" id="adminPass" placeholder="Enter Admin Password">
        <button class="save-btn" onclick="manualLogin()">Login</button>
    </div>
    <div id="statusMsg" class="status">Waiting for Login...</div>
    <hr style="margin:20px 0">
    <div class="grid">
        <select id="category">
            <option value="">Select Category</option>
            <option>PYQ 2024</option><option>PYQ 2025</option><option>Model Paper</option>
        </select>
        <select id="post">
            <option value="">Select Post</option>
            <option>MTS</option><option>POSTMAN</option><option>PA-SA</option>
        </select>
        <textarea id="bulk" placeholder="Question... A) Opt... B) Opt... Answer: B"></textarea>
        <button class="save-btn" onclick="bulkSave()">Bulk Save All</button>
    </div>
    <hr style="margin:20px 0">
    <div id="questionList">Loading...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyDjzmo0A4KhOkrqFQdOyCEek6bsPF-UVPQ",
    authDomain: "gds-departmental-exam-studyhub.firebaseapp.com",
    projectId: "gds-departmental-exam-studyhub",
    storageBucket: "gds-departmental-exam-studyhub.appspot.com",
    messagingSenderId: "759916756080",
    appId: "1:759916756080:web:7f2c0e66458bd007e888b5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const ADMIN_EMAIL = "rameshwarsahu2014bpmjarwe1694@gmail.com";

window.manualLogin = function() {
    const p = document.getElementById("adminPass").value;
    signInWithEmailAndPassword(auth, ADMIN_EMAIL, p)
    .then(() => {
        document.getElementById("statusMsg").innerText = "Logged In ✅";
        document.getElementById("loginArea").style.display = "none";
        loadAll();
    }).catch(err => alert("Login Failed: " + err.message));
};

window.bulkSave = async function() {
    if(!auth.currentUser) return alert("Login First");
    const cat = document.getElementById("category").value;
    const post = document.getElementById("post").value;
    const bulkTxt = document.getElementById("bulk").value.trim();

    if(!cat || !post || !bulkTxt) return alert("All fields are required!");

    try {
        document.getElementById("statusMsg").innerText = "Uploading... ⏳";
        // Blocks splitting by empty lines
        const blocks = bulkTxt.split(/\n\s*\n/);
        let count = 0;

        for (let block of blocks) {
            let lines = block.split('\n').map(l => l.trim()).filter(Boolean);
            
            if (lines.length >= 6) {
                const q = lines;
                const a = lines;
                const b = lines;
                const c = lines;
                const d = lines;
                
                // Answer detection logic
                const ansLine = lines[lines.length - 1].toUpperCase();
                const match = ansLine.match(/[A-D]/);
                const letter = match ? match : "A";

                let correct = a;
                if(letter === "B") correct = b;
                else if(letter === "C") correct = c;
                else if(letter === "D") correct = d;

                // CRITICAL FIX: Creating a clean array of strings
                const cleanOptions = [String(a), String(b), String(c), String(d)];

                await addDoc(collection(db, "pyqQuestions"), {
                    category: String(cat),
                    post: String(post),
                    question: String(q),
                    options: cleanOptions, 
                    answer: String(correct),
                    createdAt: serverTimestamp()
                });
                count++;
            }
        }
        document.getElementById("statusMsg").innerText = count + " Questions Saved ✅";
        document.getElementById("bulk").value = "";
        loadAll();
    } catch(e) { 
        alert("Upload Error: " + e.message);
        console.error("Firebase Error Details:", e);
    }
};

async function loadAll(){
    try {
        const qSnap = await getDocs(query(collection(db,"pyqQuestions"), orderBy("createdAt","desc")));
        let qHtml = "";
        qSnap.forEach(d => {
            const data = d.data();
            qHtml += `<div class="card"><b>${data.question}</b><br><small>Ans: ${data.answer}</small></div>`;
        });
        document.getElementById("questionList").innerHTML = qHtml || "No Data Found";
    } catch(err) { console.log("Load Error:", err); }
}
</script>
</body>
</html>
