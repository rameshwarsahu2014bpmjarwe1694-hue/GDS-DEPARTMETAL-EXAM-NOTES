<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin PYQ Manager</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f4f4f4}
.topbar{background:#000;color:#fff;padding:15px;text-align:center;font-size:20px;font-weight:bold}
.container{max-width:1000px;margin:auto;padding:20px}
.box{background:#fff;padding:18px;border-radius:14px;box-shadow:0 4px 10px rgba(0,0,0,.08);margin-bottom:18px}
input,select,textarea{
width:100%;padding:12px;margin-top:10px;
border:1px solid #ccc;border-radius:10px;font-size:15px
}
textarea{min-height:100px}
button{
width:100%;padding:12px;margin-top:12px;
border:none;border-radius:10px;
background:#007bff;color:#fff;
font-weight:bold;cursor:pointer
}
.list{margin-top:15px}
.item{
background:#f8f8f8;padding:12px;border-radius:12px;
margin-bottom:10px;border-left:4px solid #007bff
}
.back{
display:block;text-align:center;text-decoration:none;
background:#111;color:#fff;padding:12px;border-radius:10px;
font-weight:bold;margin-top:18px
}
.status{margin-top:10px;font-weight:bold}
</style>
</head>
<body>

<div class="topbar">📄 Admin PYQ Manager</div>

<div class="container">

<div class="box">

<select id="category">
<option>PYQ 2020</option>
<option>PYQ 2021</option>
<option>PYQ 2022</option>
<option>PYQ 2023</option>
<option>PYQ 2024</option>
<option>PYQ 2025</option>
<option>PYQ 2026</option>
<option>Model Paper</option>
<option>Practice Set</option>
</select>

<select id="post">
<option>MTS</option>
<option>POSTMAN</option>
<option>PA-SA</option>
</select>

<input type="file" id="pdfFile" accept="application/pdf">

<input type="text" id="title" placeholder="File Title">

<textarea id="desc" placeholder="Description"></textarea>

<button onclick="uploadNow()">Upload PDF + Save</button>

<div class="status" id="msg"></div>

</div>

<div class="box">
<h3>Saved Files</h3>
<div id="listBox">Loading...</div>
</div>

<a href="admin-panel.html" class="back">⬅ Back</a>

</div>

<script type="module" src="firebase.js"></script>

<script type="module">
import {
collection,addDoc,getDocs,query,orderBy
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

window.uploadNow = async function(){

const file=document.getElementById("pdfFile").files[0];
const title=document.getElementById("title").value.trim();
const desc=document.getElementById("desc").value.trim();
const category=document.getElementById("category").value;
const post=document.getElementById("post").value;
const msg=document.getElementById("msg");

if(!file) return alert("Choose PDF");
if(!title) return alert("Enter Title");

const token=prompt("Enter GitHub PAT Token");
if(!token) return;

msg.innerText="Uploading...";

const fileName=Date.now()+"_"+file.name;
const path="pdfs/"+fileName;

const buffer=await file.arrayBuffer();
const bytes=new Uint8Array(buffer);

let binary="";
bytes.forEach(b=>binary+=String.fromCharCode(b));

const base64=btoa(binary);

const api=`https://api.github.com/repos/rameshwarsahu2014bpmjarwe1694-hue/GDS-DEPARTMETAL-EXAM-NOTES/contents/${path}`;

const res=await fetch(api,{
method:"PUT",
headers:{
Authorization:"token "+token,
"Content-Type":"application/json"
},
body:JSON.stringify({
message:"Upload "+fileName,
content:base64
})
});

const data=await res.json();

if(!res.ok){
msg.innerText="Upload Failed";
console.log(data);
return;
}

const fileUrl=`https://rameshwarsahu2014bpmjarwe1694-hue.github.io/GDS-DEPARTMETAL-EXAM-NOTES/${path}`;

await addDoc(collection(window.db,"pyqFiles"),{
category,
post,
title,
description:desc,
fileName,
fileUrl,
createdAt:Date.now()
});

msg.innerText="Uploaded + Saved Successfully";

document.getElementById("pdfFile").value="";
document.getElementById("title").value="";
document.getElementById("desc").value="";

loadList();
};

async function loadList(){

const box=document.getElementById("listBox");

const q=query(
collection(window.db,"pyqFiles"),
orderBy("createdAt","desc")
);

const snap=await getDocs(q);

if(snap.empty){
box.innerHTML="No files saved";
return;
}

let html="";

snap.forEach(doc=>{
const x=doc.data();

html+=`
<div class="item">
<b>${x.title}</b><br>
${x.category} | ${x.post}<br>
${x.fileName}
</div>
`;
});

box.innerHTML=html;
}

loadList();
</script>

</body>
</html>
