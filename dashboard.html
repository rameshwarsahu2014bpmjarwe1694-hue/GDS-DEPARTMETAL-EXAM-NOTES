<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candidate Dashboard</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
}

.topbar{
background:#b30000;
color:#fff;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
padding:20px;
max-width:1000px;
margin:auto;
}

.welcome{
background:#fff;
padding:18px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
margin-bottom:20px;
font-size:18px;
font-weight:bold;
}

/* Only Sub Card Improved */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
margin-top:10px;
}

.card{
background:linear-gradient(135deg,#ffffff,#f8f8f8);
padding:18px 12px;
border-radius:16px;
text-align:center;
font-weight:bold;
font-size:16px;
box-shadow:0 6px 14px rgba(0,0,0,0.10);
text-decoration:none;
color:#111;
display:flex;
align-items:center;
justify-content:center;
min-height:70px;
transition:0.3s;
}

.card:hover{
transform:translateY(-3px);
}

@media(min-width:700px){
.grid{
grid-template-columns:repeat(3,1fr);
}
}

.logout{
margin-top:25px;
display:block;
background:#111;
color:#fff;
padding:12px;
text-align:center;
border-radius:10px;
text-decoration:none;
font-weight:bold;
}
</style>
</head>

<body>

<div class="topbar">Candidate Dashboard</div>

<div class="container">

<div class="welcome">
Welcome Candidate 👋
</div>

<div class="grid">
<a href="syllabus.html" class="card">📘 Syllabus</a>
<a href="index.html" class="card">📚 Notes</a>
<a href="start-quiz.html" class="card">📝 Mock Test</a>
<a href="index.html" class="card">📄 PYQ</a>
<a href="index.html" class="card">🏆 Result</a>
</div>

<a href="#" onclick="logoutUser()" class="logout">Logout</a>

</div>

<script>
function logoutUser() {
    localStorage.removeItem("isLogin");
    localStorage.removeItem("userEmail");
    localStorage.removeItem("userName");

    alert("Logout Successful");

    window.location.href = "login.html";
}
</script>

</body>
</html>
