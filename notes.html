<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Notes</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}
body{
background:#f4f6f9;
padding:15px;
}
.container{
max-width:1000px;
margin:auto;
}
.topbar{
background:#b30000;
color:#fff;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
border-radius:12px;
margin-bottom:18px;
}
.box{
background:#fff;
padding:18px;
border-radius:14px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
margin-bottom:15px;
}
input,textarea,select{
width:100%;
padding:12px;
margin-top:8px;
border:1px solid #ccc;
border-radius:10px;
font-size:15px;
}
textarea{
min-height:130px;
resize:vertical;
}
button{
padding:12px 18px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
margin-top:12px;
}
.save{
background:#007bff;
color:#fff;
width:100%;
}
.note{
background:#fff;
padding:16px;
border-radius:14px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
margin-bottom:14px;
}
.note h3{
margin-bottom:8px;
color:#111;
}
.note small{
color:#666;
display:block;
margin-bottom:8px;
}
.note p{
white-space:pre-wrap;
line-height:1.6;
}
</style>
</head>

<body>

<div class="container">

<div class="topbar">📚 Notes</div>

<!-- ADMIN ADD BOX -->
<div class="box" id="adminBox" style="display:none;">

<h3>Add New Note</h3>

<label>Subject</label>
<select id="subject">
<option>Post Office Guide 1</option>
<option>Post Office Guide 2</option>
<option>PO Manual Volume 5</option>
<option>GK</option>
<option>Maths</option>
</select>

<label>Title</label>
<input type="text" id="title">

<label>Content</label>
<textarea id="content"></textarea>

<button class="save" onclick="saveNote()">Save Permanently</button>

</div>

<!-- NOTES LIST -->
<div id="notesList"></div>

</div>

<script type="module" src="firebase.js"></script>

<script type="module">
import {
collection,
addDoc,
getDocs,
query,
orderBy
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const ADMIN_EMAIL = "rameshwarsahu2014bpmjarwe1694@gmail.com";

/* ---------- CHECK ADMIN ---------- */
setTimeout(()=>{
let user = window.auth.currentUser;

if(user && user.email===ADMIN_EMAIL){
document.getElementById("adminBox").style.display="block";
}
},1200);

/* ---------- SAVE NOTE ---------- */
window.saveNote = async function(){

let subject = val("subject");
let title = val("title");
let content = val("content");

if(title==="" || content===""){
alert("Fill all fields");
return;
}

await addDoc(collection(window.db,"notes"),{
subject:subject,
title:title,
content:content,
createdAt:Date.now()
});

document.getElementById("title").value="";
document.getElementById("content").value="";

alert("Saved Permanently");

loadNotes();

};

/* ---------- LOAD NOTES ---------- */
async function loadNotes(){

let box = document.getElementById("notesList");

box.innerHTML = "<div class='box'>Loading Notes...</div>";

let q = query(
collection(window.db,"notes"),
orderBy("createdAt","desc")
);

let snap = await getDocs(q);

if(snap.empty){
box.innerHTML = "<div class='box'>No Notes Available</div>";
return;
}

let html = "";

snap.forEach(doc=>{

let x = doc.data();

html += `
<div class="note">
<h3>${x.title}</h3>
<small>${x.subject}</small>
<p>${escapeHtml(x.content)}</p>
</div>
`;

});

box.innerHTML = html;

}

/* ---------- HELPERS ---------- */
function val(id){
return document.getElementById(id).value.trim();
}

function escapeHtml(text){
return text
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;");
}

/* ---------- START ---------- */
loadNotes();

</script>

</body>
</html>
