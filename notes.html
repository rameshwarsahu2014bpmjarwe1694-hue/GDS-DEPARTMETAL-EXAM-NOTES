<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Notes</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#f4f6f9;
padding:15px;
}

.container{
max-width:1000px;
margin:auto;
}

.topbar{
background:#b30000;
color:#fff;
padding:16px;
text-align:center;
font-size:24px;
font-weight:700;
border-radius:14px;
margin-bottom:16px;
}

.tools{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:16px;
}

input,select{
width:100%;
padding:13px;
border:1px solid #ccc;
border-radius:12px;
font-size:15px;
outline:none;
background:#fff;
}

#notesList{
display:grid;
gap:14px;
}

.note{
background:#fff;
padding:18px;
border-radius:16px;
box-shadow:0 5px 14px rgba(0,0,0,.08);
}

.note h3{
font-size:20px;
margin-bottom:8px;
color:#111;
}

.meta{
font-size:14px;
color:#666;
margin-bottom:10px;
}

.desc{
line-height:1.6;
white-space:pre-wrap;
color:#222;
margin-top:8px;
}

.btn{
display:inline-block;
margin-top:10px;
padding:10px 14px;
background:#111;
color:#fff;
text-decoration:none;
border-radius:10px;
font-size:14px;
}

.preview{
width:100%;
max-height:260px;
object-fit:contain;
border-radius:12px;
margin-top:10px;
border:1px solid #eee;
background:#fafafa;
}

.empty{
background:#fff;
padding:18px;
border-radius:14px;
text-align:center;
color:#666;
}

@media(max-width:700px){
.tools{
grid-template-columns:1fr;
}
.topbar{
font-size:21px;
}
}
</style>
</head>

<body>

<div class="container">

<div class="topbar">📚 Notes</div>

<div class="tools">
<input type="text" id="searchInput" placeholder="Search notes...">

<select id="catFilter">
<option value="ALL">All Categories</option>
<option value="MTS">MTS</option>
<option value="POSTMAN">POSTMAN</option>
<option value="PA/SA">PA/SA</option>
</select>
</div>

<div id="notesList">
<div class="empty">Loading notes...</div>
</div>

</div>

<script type="module" src="firebase.js"></script>

<script type="module">

import {
collection,
getDocs,
query,
orderBy
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

let allNotes = [];

function safe(v){
return String(v || "")
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/"/g,"&quot;")
.replace(/'/g,"&#039;");
}

function waitFirebase(){
if(window.db){
loadNotes();
}else{
setTimeout(waitFirebase,300);
}
}

async function loadNotes(){

const box = document.getElementById("notesList");

try{

const q = query(
collection(window.db,"notes"),
orderBy("createdAt","desc")
);

const snap = await getDocs(q);

allNotes = [];

snap.forEach((doc)=>{
allNotes.push({
id:doc.id,
...doc.data()
});
});

renderNotes(allNotes);

}catch(error){

box.innerHTML =
`<div class="empty">Failed to load notes</div>`;

}

}

function renderNotes(arr){

const box = document.getElementById("notesList");

if(arr.length===0){
box.innerHTML =
`<div class="empty">No notes found</div>`;
return;
}

let html = "";

arr.forEach((x)=>{

const title = safe(x.title);
const cat = safe(x.category || x.subject || "-");
const desc = safe(x.description || x.content || "");
const fileURL = x.fileURL || "";
const fileType = x.fileType || "";

html += `
<div class="note">

<h3>${title}</h3>

<div class="meta">📘 ${cat}</div>

${desc ? `<div class="desc">${desc}</div>` : ""}

${fileURL && fileType.startsWith("image")
? `<img src="${fileURL}" class="preview">`
: ""}

${fileURL
? `<a href="${fileURL}" target="_blank" class="btn">Open File</a>`
: ""}

</div>
`;

});

box.innerHTML = html;

}

function applyFilter(){

const q = document
.getElementById("searchInput")
.value
.toLowerCase()
.trim();

const cat = document
.getElementById("catFilter")
.value;

const filtered = allNotes.filter((x)=>{

const title = (x.title || "").toLowerCase();
const desc = (x.description || x.content || "").toLowerCase();
const category = (x.category || x.subject || "");

const matchText =
title.includes(q) || desc.includes(q);

const matchCat =
(cat==="ALL") || (category===cat);

return matchText && matchCat;

});

renderNotes(filtered);

}

document
.getElementById("searchInput")
.addEventListener("input",applyFilter);

document
.getElementById("catFilter")
.addEventListener("change",applyFilter);

waitFirebase();

</script>

</body>
</html>
