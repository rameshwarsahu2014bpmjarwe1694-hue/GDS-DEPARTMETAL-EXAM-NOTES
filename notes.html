<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Notes</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#f4f6f9;
padding:15px;
}

.container{
max-width:1000px;
margin:auto;
}

.topbar{
background:#b30000;
color:#fff;
padding:16px;
text-align:center;
font-size:24px;
font-weight:700;
border-radius:14px;
margin-bottom:16px;
}

/* Tools layout updated for 3 items */
.tools{
display:grid;
grid-template-columns: 1.5fr 1fr 1fr;
gap:12px;
margin-bottom:16px;
}

input,select{
width:100%;
padding:13px;
border:1px solid #ccc;
border-radius:12px;
font-size:15px;
outline:none;
background:#fff;
}

#notesList{
display:grid;
gap:14px;
}

.note{
background:#fff;
padding:18px;
border-radius:16px;
box-shadow:0 5px 14px rgba(0,0,0,.08);
}

.note h3{
font-size:20px;
margin-bottom:8px;
color:#111;
}

.meta{
font-size:14px;
color:#666;
margin-bottom:10px;
display: flex;
gap: 10px;
}

.tag{
background: #eee;
padding: 4px 8px;
border-radius: 6px;
}

.desc{
line-height:1.6;
white-space:pre-wrap;
color:#222;
margin-top:8px;
}

.btn{
display:inline-block;
margin-top:10px;
padding:10px 14px;
background:#111;
color:#fff;
text-decoration:none;
border-radius:10px;
font-size:14px;
cursor: pointer;
border: none;
}

.preview{
width:100%;
max-height:260px;
object-fit:contain;
border-radius:12px;
margin-top:10px;
border:1px solid #eee;
background:#fafafa;
}

.empty{
background:#fff;
padding:18px;
border-radius:14px;
text-align:center;
color:#666;
}

@media(max-width:700px){
.tools{
grid-template-columns:1fr;
}
.topbar{
font-size:21px;
}
}
</style>
</head>

<body>

<div class="container">

<div class="topbar">📚 Notes</div>

<div class="tools">
<input type="text" id="searchInput" placeholder="Search notes...">

<select id="postFilter">
<option value="ALL">All Posts</option>
<option value="MTS">MTS</option>
<option value="POSTMAN">POSTMAN</option>
<option value="PA/SA">PA/SA</option>
</select>

<select id="subFilter">
<option value="ALL">All Subjects</option>
<option value="GK">GK</option>
<option value="Maths">Maths</option>
<option value="Reasoning">Reasoning</option>
<option value="PO GUIDE 1">PO Guide 1</option>
<option value="PO GUIDE 2">PO Guide 2</option>
<option value="POSTAL MANUAL 5">Postal Manual Vol 5</option>
<option value="POSTAL MANUAL 6">Postal Manual Vol 6</option>
<option value="POSTAL MANUAL 7">Postal Manual Vol 7</option>
</select>
</div>

<div id="notesList">
<div class="empty">Loading notes...</div>
</div>

</div>

<script type="module" src="firebase.js"></script>

<script type="module">

import {
collection,
getDocs,
query,
orderBy
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

let allNotes = [];
let currentUserEmail = "";
const BACKEND_URL = "https://payment-backend-2-g6go.onrender.com";

// SECURE ACCESS LOGIC
window.handleSecureAccess = async (category, title) => {
    if (!currentUserEmail) {
        alert("Please login first!");
        return;
    }

    const secureUrl = `${BACKEND_URL}/get-pdf?email=${encodeURIComponent(currentUserEmail)}&year=Notes&post=${encodeURIComponent(category)}`;

    try {
        const res = await fetch(secureUrl, {
            headers: { 'x-source-auth': 'RSH-GDS-SECURE-ACCESS' }
        });

        if (res.status === 200) {
            window.open(secureUrl, '_blank');
        } else if (res.status === 403) {
            if (confirm(`इस PDF (${title}) को अनलॉक करने के लिए ₹20 का पेमेंट करना होगा। क्या आप आगे बढ़ना चाहते हैं?`)) {
                const payRes = await fetch(`${BACKEND_URL}/initiate-payment`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: currentUserEmail,
                        amount: 20,
                        year: "Notes",
                        post: category
                    })
                });
                const data = await payRes.json();
                if (data.url) window.location.href = data.url;
                else alert("Payment link error!");
            }
        } else {
            alert("File not found or Server error.");
        }
    } catch (err) {
        alert("Connection error!");
    }
};

const auth = getAuth();
onAuthStateChanged(auth, (user) => {
    if (user) {
        currentUserEmail = user.email;
    } else {
        window.location.href = "login.html";
    }
});

function safe(v){
return String(v || "")
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/"/g,"&quot;")
.replace(/'/g,"&#039;");
}

function waitFirebase(){
if(window.db){
loadNotes();
}else{
setTimeout(waitFirebase,300);
}
}

async function loadNotes(){
const box = document.getElementById("notesList");
try{
const q = query(collection(window.db,"notes"), orderBy("createdAt","desc"));
const snap = await getDocs(q);
allNotes = [];
snap.forEach((doc)=>{
allNotes.push({ id:doc.id, ...doc.data() });
});
renderNotes(allNotes);
}catch(error){
box.innerHTML = `<div class="empty">Failed to load notes</div>`;
}
}

function renderNotes(arr){
const box = document.getElementById("notesList");
if(arr.length===0){
box.innerHTML = `<div class="empty">No notes found</div>`;
return;
}
let html = "";
arr.forEach((x)=>{
const title = safe(x.title);
const postTag = safe(x.category || "-");
const subTag = safe(x.subject || "-");
const desc = safe(x.description || x.content || "");
const fileURL = x.fileURL || "";
const fileType = x.fileType || "";

html += `
<div class="note">
    <h3>${title}</h3>
    <div class="meta">
        <span class="tag">📮 ${postTag}</span>
        <span class="tag">📖 ${subTag}</span>
    </div>
    ${desc ? `<div class="desc">${desc}</div>` : ""}
    ${fileURL && fileType.startsWith("image") ? `<img src="${fileURL}" class="preview">` : ""}
    ${fileURL ? `<button onclick="handleSecureAccess('${postTag}', '${title}')" class="btn">Open File</button>` : ""}
</div>`;
});
box.innerHTML = html;
}

function applyFilter(){
const q = document.getElementById("searchInput").value.toLowerCase().trim();
const post = document.getElementById("postFilter").value;
const sub = document.getElementById("subFilter").value;

const filtered = allNotes.filter((x)=>{
const title = (x.title || "").toLowerCase();
const desc = (x.description || x.content || "").toLowerCase();
const notePost = (x.category || "");
const noteSub = (x.subject || "");

const matchText = title.includes(q) || desc.includes(q);
const matchPost = (post === "ALL") || (notePost === post);
const matchSub = (sub === "ALL") || (noteSub === sub);

return matchText && matchPost && matchSub;
});
renderNotes(filtered);
}

document.getElementById("searchInput").addEventListener("input",applyFilter);
document.getElementById("postFilter").addEventListener("change",applyFilter);
document.getElementById("subFilter").addEventListener("change",applyFilter);

waitFirebase();
</script>
</body>
</html>
