<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Quiz - Firebase</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}
body{
background:#f2f2f2;
padding:15px;
}
.topbar{
background:#000;
color:#fff;
padding:14px;
text-align:center;
font-size:22px;
font-weight:bold;
border-radius:8px;
margin-bottom:20px;
}
.container{
max-width:650px;
margin:auto;
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}
h2{
text-align:center;
margin-bottom:15px;
}
.info{
font-size:14px;
line-height:24px;
margin-bottom:15px;
color:#444;
}
.countBox{
text-align:center;
font-weight:bold;
margin-bottom:12px;
}
textarea{
width:100%;
height:320px;
padding:12px;
font-size:16px;
border:1px solid #ccc;
border-radius:8px;
resize:none;
}
button{
width:100%;
padding:14px;
font-size:16px;
font-weight:bold;
border:none;
border-radius:8px;
margin-top:10px;
cursor:pointer;
}
.saveBtn{
background:#000;
color:#fff;
}
.clearBtn{
background:#666;
color:#fff;
}
.backBtn{
background:#d40000;
color:#fff;
}
#msg{
text-align:center;
margin-top:15px;
font-weight:bold;
}
</style>
</head>
<body>

<div class="topbar">📝 Add Quiz Questions</div>

<div class="container">

<h2>Bulk Quiz Upload</h2>

<div class="info">
Format:<br>
Question|Option A|Option B|Option C|Option D|Answer<br><br>

Example:<br>
भारत की राजधानी क्या है?|दिल्ली|मुंबई|कोलकाता|चेन्नई|A
</div>

<div class="countBox" id="count">Saved Questions: 0</div>

<textarea id="bulkData" placeholder="Paste Hindi / English / Mixed Questions Here..."></textarea>

<button class="saveBtn" onclick="saveBulkQuiz()">Save All Questions</button>

<button class="clearBtn" onclick="clearAllQuiz()">Delete All Questions</button>

<a href="admin-panel.html">
<button class="backBtn">← Back to Admin Panel</button>
</a>

<p id="msg"></p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
set,
get,
remove
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyDjzmo0A4KhOkrqFQdOyCEek6bsPF-UVPQ",
authDomain: "gds-departmental-exam-studyhub.firebaseapp.com",
databaseURL: "https://gds-departmental-exam-studyhub-default-rtdb.asia-southeast1.firebasedatabase.app/",
projectId: "gds-departmental-exam-studyhub",
storageBucket: "gds-departmental-exam-studyhub.firebasestorage.app",
messagingSenderId: "759916756080",
appId: "1:759916756080:web:7f2c0e66458bd007e888b5"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.saveBulkQuiz = async function(){

let data = document.getElementById("bulkData").value.trim();

if(data==""){
msg("Please paste questions first!","red");
return;
}

let lines = data.split(/\r?\n/);

let quiz = [];

lines.forEach(line=>{

line=line.trim();

if(line=="") return;

line=line.replace(/\s*\|\s*/g,"|");

if(line.split("|").length<6){
line=line.replace(/\s*,\s*/g,"|");
}

let parts=line.split("|");

if(parts.length>=6){

quiz.push({
question: parts[0].trim(),
a: parts[1].trim(),
b: parts[2].trim(),
c: parts[3].trim(),
d: parts[4].trim(),
answer: parts[5].trim().toUpperCase().replace(/[^ABCD]/g,"")
});

}

});

await set(ref(db,"quizQuestions"),quiz);

msg(quiz.length+" Questions Saved Successfully!","green");

document.getElementById("bulkData").value="";

showCount();

}

window.clearAllQuiz = async function(){

if(confirm("Delete all questions?")){

await remove(ref(db,"quizQuestions"));

msg("All Questions Deleted!","red");

showCount();

}

}

async function showCount(){

const snap = await get(ref(db,"quizQuestions"));

if(snap.exists()){

let total = snap.val().length;

document.getElementById("count").innerHTML =
"Saved Questions: "+total;

}else{

document.getElementById("count").innerHTML =
"Saved Questions: 0";

}

}

function msg(text,color){

document.getElementById("msg").innerHTML=text;
document.getElementById("msg").style.color=color;

}

showCount();

</script>

</body>
</html>
