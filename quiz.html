<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Quiz</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#f2f2f2;
padding:20px;
}

.topbar{
background:#000;
color:#fff;
text-align:center;
padding:14px;
font-size:20px;
font-weight:bold;
margin-bottom:20px;
border-radius:8px;
}

.container{
max-width:600px;
margin:auto;
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:15px;
}

.info{
font-size:14px;
color:#444;
margin-bottom:10px;
line-height:22px;
}

textarea{
width:100%;
height:320px;
padding:12px;
font-size:16px;
border:1px solid #ccc;
border-radius:8px;
resize:none;
margin-bottom:15px;
}

button{
width:100%;
padding:14px;
font-size:16px;
font-weight:bold;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

.saveBtn{
background:#000;
color:#fff;
}

.clearBtn{
background:#666;
color:#fff;
}

.backBtn{
background:#d40000;
color:#fff;
}

#msg{
text-align:center;
margin-top:15px;
font-weight:bold;
font-size:16px;
}

.countBox{
text-align:center;
margin-bottom:10px;
font-weight:bold;
color:#000;
}
</style>
</head>

<body>

<div class="topbar">📝 Add Quiz</div>

<div class="container">

<h2>Create Bulk MCQ Quiz</h2>

<div class="info">
Format:<br>
Question | Option A | Option B | Option C | Option D | Correct Answer<br><br>

Example:<br>
What is capital of India?|Delhi|Mumbai|Kolkata|Chennai|A
</div>

<div class="countBox" id="count">Saved Questions: 0</div>

<textarea id="bulkData" placeholder="Paste many questions here..."></textarea>

<button class="saveBtn" onclick="saveBulkQuiz()">Save All Questions</button>

<button class="clearBtn" onclick="clearAllQuiz()">Clear All Questions</button>

<a href="admin-panel.html">
<button class="backBtn">← Back to Admin Panel</button>
</a>

<p id="msg"></p>

</div>

<script>
showCount();

function saveBulkQuiz(){

let data = document.getElementById("bulkData").value.trim();

if(data==""){
document.getElementById("msg").innerHTML="Please paste questions first!";
document.getElementById("msg").style.color="red";
return;
}

let lines = data.split("\n");
let quiz = [];

lines.forEach(line => {

let parts = line.split("|");

if(parts.length==6){

quiz.push({
question: parts[0].trim(),
a: parts[1].trim(),
b: parts[2].trim(),
c: parts[3].trim(),
d: parts[4].trim(),
answer: parts[5].trim().toUpperCase()
});

}

});

localStorage.setItem("quizQuestions", JSON.stringify(quiz));

document.getElementById("msg").innerHTML =
quiz.length + " Questions Saved Successfully!";

document.getElementById("msg").style.color="green";

document.getElementById("bulkData").value="";

showCount();

}

function clearAllQuiz(){

if(confirm("Delete all saved quiz questions?")){

localStorage.removeItem("quizQuestions");

document.getElementById("msg").innerHTML="All Questions Deleted!";
document.getElementById("msg").style.color="red";

showCount();

}

}

function showCount(){

let old = JSON.parse(localStorage.getItem("quizQuestions")) || [];

document.getElementById("count").innerHTML =
"Saved Questions: " + old.length;

}
</script>

</body>
</html>
