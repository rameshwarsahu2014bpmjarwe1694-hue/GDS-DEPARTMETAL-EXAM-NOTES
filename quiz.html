<script>
function bulkAddQuestions() {

  const textarea = document.getElementById("bulkQuestions");

  if (!textarea) {
    alert("Bulk textarea not found");
    return;
  }

  let raw = textarea.value.trim();

  if (raw === "") {
    alert("Paste questions first");
    return;
  }

  let lines = raw.split(/\r?\n/);
  let imported = [];
  let current = null;

  function clean(t) {
    return t.replace(/\s+/g, " ").trim();
  }

  function createQuestion(q) {
    saveQuestion();

    current = {
      question: clean(q),
      options: [],
      answer: 0
    };
  }

  function saveQuestion() {
    if (!current) return;

    current.question = clean(current.question);

    // remove empty options
    current.options = current.options.filter(x => clean(x) !== "");

    // minimum 2 options
    if (current.question !== "" && current.options.length >= 2) {

      // make 4 options compulsory
      while (current.options.length < 4) {
        current.options.push("Option " + (current.options.length + 1));
      }

      // max 4 options
      current.options = current.options.slice(0, 4);

      // safe answer
      if (current.answer < 0 || current.answer > 3) {
        current.answer = 0;
      }

      imported.push(current);
    }

    current = null;
  }

  for (let i = 0; i < lines.length; i++) {

    let line = clean(lines[i]);

    if (line === "") continue;

    // ======================
    // NEW QUESTION DETECT
    // ======================
    if (
      /^(Q\s*\d+|Q\d+|Q\.|Question\s*\d+|\d+\.)/i.test(line)
    ) {

      line = line.replace(
        /^(Q\s*\d+|Q\d+|Q\.|Question\s*\d+|\d+\.)\s*/i,
        ""
      );

      createQuestion(line);
      continue;
    }

    // first line question if no question yet
    if (!current) {
      createQuestion(line);
      continue;
    }

    // ======================
    // OPTION DETECT A-D
    // ======================
    if (
      /^[A-Da-d][\)\.\:\-\s]+/.test(line) ||
      /^\([A-Da-d]\)/.test(line)
    ) {

      line = line.replace(/^[A-Da-d][\)\.\:\-\s]+/, "");
      line = line.replace(/^\([A-Da-d]\)\s*/, "");

      current.options.push(clean(line));
      continue;
    }

    // ======================
    // OPTION DETECT 1-4
    // ======================
    if (/^[1-4][\)\.\:\-\s]+/.test(line)) {

      line = line.replace(/^[1-4][\)\.\:\-\s]+/, "");

      current.options.push(clean(line));
      continue;
    }

    // ======================
    // ANSWER DETECT
    // ======================
    if (
      /^(Answer|Ans|उत्तर|सही उत्तर|Correct)/i.test(line)
    ) {

      let ans = line.replace(
        /^(Answer|Ans|उत्तर|सही उत्तर|Correct)\s*[:\-]?\s*/i,
        ""
      ).trim().toUpperCase();

      if (ans === "A" || ans === "1") current.answer = 0;
      else if (ans === "B" || ans === "2") current.answer = 1;
      else if (ans === "C" || ans === "3") current.answer = 2;
      else if (ans === "D" || ans === "4") current.answer = 3;

      continue;
    }

    // ======================
    // EXTRA TEXT JOIN
    // ======================

    if (current.options.length > 0) {
      current.options[current.options.length - 1] += " " + line;
    } else {
      current.question += " " + line;
    }

  }

  saveQuestion();

  if (imported.length === 0) {
    alert("No valid questions found");
    return;
  }

  // ======================
  // SAVE TO LOCAL STORAGE
  // ======================

  let oldQuestions = [];

  try {
    oldQuestions = JSON.parse(
      localStorage.getItem("quizQuestions")
    ) || [];
  } catch (e) {
    oldQuestions = [];
  }

  let finalQuestions = oldQuestions.concat(imported);

  localStorage.setItem(
    "quizQuestions",
    JSON.stringify(finalQuestions)
  );

  alert(imported.length + " Questions Added Successfully");

  textarea.value = "";
}
</script>
