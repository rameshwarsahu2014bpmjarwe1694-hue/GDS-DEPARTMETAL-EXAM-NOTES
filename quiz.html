<!-- Top bar -->
<div class="top-bar">
  <button class="back-btn" onclick="goBack()">⬅ Back</button>
  <h2>Mock Test</h2>
</div>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}
body{
background:#f5f7fa;
padding:15px;
}
.top-bar{
display:flex;
align-items:center;
gap:10px;
margin-bottom:15px;
}
.back-btn{
background:#007bff;
color:#fff;
border:none;
padding:10px 14px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}
.container{
max-width:800px;
margin:auto;
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,.08);
}
.question{
font-size:18px;
font-weight:bold;
margin-bottom:15px;
}
.option{
display:block;
padding:12px;
margin:8px 0;
border:1px solid #ddd;
border-radius:8px;
cursor:pointer;
}
.option:hover{
background:#f0f7ff;
}
.submit-btn{
margin-top:15px;
padding:12px;
width:100%;
background:green;
color:#fff;
border:none;
border-radius:8px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}
#result{
margin-top:15px;
font-weight:bold;
text-align:center;
}
</style>

<div class="container">
<div class="question" id="question">Loading...</div>
<div id="options"></div>
<button class="submit-btn" onclick="submitQuiz()">Submit</button>
<div id="result"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
addDoc,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* Firebase Config */
const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_PROJECT.firebaseapp.com",
projectId: "YOUR_PROJECT_ID",
storageBucket: "YOUR_PROJECT.appspot.com",
messagingSenderId: "YOUR_ID",
appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentUser=null;
let questions=[];
let score=0;
let selectedAnswers={};

onAuthStateChanged(auth,(user)=>{
if(user){
currentUser=user;
loadQuestions();
}else{
window.location.href="login.html";
}
});

async function loadQuestions(){
const snap = await getDocs(collection(db,"quizQuestions"));
questions=[];

snap.forEach(doc=>{
questions.push({
id:doc.id,
...doc.data()
});
});

renderQuestions();
}

function renderQuestions(){
let html="";
questions.forEach((q,index)=>{
html += `
<div class="question">${index+1}. ${escapeHTML(q.question)}</div>
<div>
<label class="option">
<input type="radio" name="q${index}" value="A"> ${escapeHTML(q.a)}
</label>
<label class="option">
<input type="radio" name="q${index}" value="B"> ${escapeHTML(q.b)}
</label>
<label class="option">
<input type="radio" name="q${index}" value="C"> ${escapeHTML(q.c)}
</label>
<label class="option">
<input type="radio" name="q${index}" value="D"> ${escapeHTML(q.d)}
</label>
</div>
`;
});
document.getElementById("question").innerHTML="";
document.getElementById("options").innerHTML=html;
}

async function submitQuiz(){
score=0;

questions.forEach((q,index)=>{
const ans=document.querySelector(`input[name="q${index}"]:checked`);
if(ans && ans.value===q.correct){
score++;
}
});

document.getElementById("result").innerHTML=
"Your Score: "+score+" / "+questions.length;

await addDoc(collection(db,"results"),{
uid: currentUser.uid,
email: currentUser.email,
score: score,
total: questions.length,
createdAt: serverTimestamp()
});
}

/* Secure Back Button */
window.goBack=function(){
if(confirm("Exit mock test and go back?")){
if(history.length>1){
history.back();
}else{
window.location.href="candidate-dashboard.html";
}
}
}

/* XSS Protection */
function escapeHTML(str){
if(!str) return "";
return str
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/"/g,"&quot;")
.replace(/'/g,"&#039;");
}
</script>
