<script>
function bulkAddQuestions() {
  let textarea = document.getElementById("bulkQuestions");

  if (!textarea) {
    alert("bulkQuestions textarea not found");
    return;
  }

  let text = textarea.value.trim();

  if (text === "") {
    alert("Paste questions first");
    return;
  }

  let lines = text.split(/\r?\n/);
  let questions = [];
  let current = null;

  function saveCurrent() {
    if (
      current &&
      current.question &&
      current.options.length >= 2
    ) {
      if (current.answer === "" || current.answer === null) {
        current.answer = 0;
      }

      questions.push(current);
    }
  }

  function newQuestion(qText) {
    saveCurrent();

    current = {
      question: qText.trim(),
      options: [],
      answer: ""
    };
  }

  for (let i = 0; i < lines.length; i++) {
    let line = lines[i].trim();

    if (line === "") continue;

    // Question detect
    if (
      /^(Q\s*\d*[\.\):-]?|Question\s*\d*[\.\):-]?|\d+[\.\)])/i.test(line)
    ) {
      line = line.replace(
        /^(Q\s*\d*[\.\):-]?|Question\s*\d*[\.\):-]?|\d+[\.\)])\s*/i,
        ""
      );

      newQuestion(line);
      continue;
    }

    // If first line without number
    if (!current) {
      newQuestion(line);
      continue;
    }

    // Option detect
    if (
      /^[A-Da-d][\.\):-\s]+/.test(line) ||
      /^\([A-Da-d]\)\s*/.test(line)
    ) {
      line = line.replace(/^[A-Da-d][\.\):-\s]+/, "");
      line = line.replace(/^\([A-Da-d]\)\s*/, "");

      current.options.push(line.trim());
      continue;
    }

    // Answer detect
    if (/^(Answer|Ans|उत्तर| सही उत्तर)/i.test(line)) {
      let ans = line
        .replace(/^(Answer|Ans|उत्तर| सही उत्तर)\s*[:\-]?\s*/i, "")
        .trim()
        .toUpperCase();

      if (ans === "A" || ans === "1") current.answer = 0;
      else if (ans === "B" || ans === "2") current.answer = 1;
      else if (ans === "C" || ans === "3") current.answer = 2;
      else if (ans === "D" || ans === "4") current.answer = 3;

      continue;
    }

    // If options started then treat as continued option
    if (current.options.length > 0 && current.options.length < 4) {
      current.options[current.options.length - 1] += " " + line;
    } else {
      // otherwise question continuation
      current.question += " " + line;
    }
  }

  saveCurrent();

  if (questions.length === 0) {
    alert("No valid questions found");
    return;
  }

  let oldData =
    JSON.parse(localStorage.getItem("quizQuestions")) || [];

  let finalData = oldData.concat(questions);

  localStorage.setItem(
    "quizQuestions",
    JSON.stringify(finalData)
  );

  alert(questions.length + " Questions Added Successfully");

  textarea.value = "";
}
</script>
