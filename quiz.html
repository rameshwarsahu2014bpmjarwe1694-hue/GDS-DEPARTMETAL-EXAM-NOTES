<script>
function bulkAddQuestions(){

let text = document.getElementById("bulkQuestions").value.trim();

if(!text){
alert("Paste questions first");
return;
}

let lines = text.split(/\n+/);
let questions = [];

let current = null;

function saveCurrent(){
if(current && current.question && current.options.length >=2){
questions.push(current);
}
}

lines.forEach(line=>{

line = line.trim();

if(line=="") return;

// New Question Detect
if(
/^(Q\.?\d*|Question\s*\d*|\d+\.)/i.test(line)
){
saveCurrent();

line = line.replace(/^(Q\.?\d*|Question\s*\d*|\d+\.)\s*/i,"");

current = {
question: line,
options: [],
answer: ""
};
return;
}

// If no question yet
if(!current){
current = {
question: line,
options: [],
answer: ""
};
return;
}

// Option Detect
if(
/^(A|B|C|D|a|b|c|d)[\.\)\-:\s]/.test(line)
){
line = line.replace(/^(A|B|C|D|a|b|c|d)[\.\)\-:\s]*/,"");
current.options.push(line);
return;
}

// Answer Detect
if(
/^(Answer|Ans|उत्तर)\s*[:\-]?\s*/i.test(line)
){
let ans = line.replace(/^(Answer|Ans|उत्तर)\s*[:\-]?\s*/i,"").trim().toUpperCase();

if(ans=="A") current.answer=0;
if(ans=="B") current.answer=1;
if(ans=="C") current.answer=2;
if(ans=="D") current.answer=3;

return;
}

// Agar option complete ho gaya aur extra text hai to question me add karo
if(current.options.length==0){
current.question += " " + line;
}

});

saveCurrent();

if(questions.length==0){
alert("No valid questions found");
return;
}

// Save old data
let old = JSON.parse(localStorage.getItem("quizQuestions")) || [];

let finalData = old.concat(questions);

localStorage.setItem("quizQuestions", JSON.stringify(finalData));

alert(questions.length + " Questions Added Successfully");

document.getElementById("bulkQuestions").value="";

}
</script>
