<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mock Test Pro</title>

<style>
body{font-family:Arial;background:#f5f7fa;margin:0;padding:15px}
.wrap{max-width:900px;margin:auto;background:#fff;padding:20px;border-radius:12px}
.card{padding:12px;margin:8px;background:#eee;border-radius:10px;cursor:pointer}
.opt{display:block;padding:10px;margin:8px 0;border:1px solid #ddd;border-radius:8px;cursor:pointer}
.correct{background:#d4edda}
.wrong{background:#f8d7da}
.hide{display:none}
.top{display:flex;justify-content:space-between;margin-bottom:10px}
.btn{padding:8px 12px;border:none;border-radius:6px;cursor:pointer}
.timer{background:red;color:#fff}
</style>
</head>

<body>

<div class="top">
<button class="btn" onclick="goBack()">Back</button>
<div class="btn timer" id="timer">30:00</div>
</div>

<div class="wrap">

<div id="status">Loading...</div>

<div id="subjects" class="hide">
<h3>Select Subject</h3>

<div class="card" onclick="startQuiz('GK')">GK</div>
<div class="card" onclick="startQuiz('Maths')">Maths</div>
<div class="card" onclick="startQuiz('Reasoning')">Reasoning</div>

</div>

<div id="quiz" class="hide">
<div id="qno"></div>
<div id="question"></div>
<div id="options"></div>

<button onclick="prev()">Prev</button>
<button onclick="next()">Next</button>
<button onclick="submit()">Submit</button>

<div id="result"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore, collection, getDocs, query, where, addDoc, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import {
getAuth, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* FIREBASE */
const firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "YOUR_DOMAIN",
projectId: "YOUR_PROJECT",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* ===== SINGLE STATE ONLY ===== */
let user = null;
let subject = "";
let questions = [];
let index = 0;
let answers = {};
let time = 1800;
let timer = null;
let submitted = false;

/* AUTH (FIXED - NO DOUBLE CALL) */
onAuthStateChanged(auth, (u) => {
if(!u){
document.getElementById("status").innerText="Login required";
return;
}

user = u;
document.getElementById("status").innerText="Logged in";
document.getElementById("subjects").classList.remove("hide");
});

/* START QUIZ (FAST FIRESTORE QUERY) */
window.startQuiz = async (sub) => {
subject = sub;
document.getElementById("status").innerText="Loading...";

try {
const q = query(collection(db,"quizQuestions"), where("subject","==",sub));
const snap = await getDocs(q);

questions = snap.docs.map(d => d.data());

if(questions.length === 0){
document.getElementById("status").innerText="No questions found";
return;
}

index = 0;
answers = {};
submitted = false;
time = 1800;

document.getElementById("subjects").classList.add("hide");
document.getElementById("quiz").classList.remove("hide");

startTimer();
render();

} catch(e){
console.log(e);
document.getElementById("status").innerText="Error loading quiz";
}
};

/* TIMER */
function startTimer(){
clearInterval(timer);

timer = setInterval(()=>{
time--;

let m = Math.floor(time/60);
let s = time%60;

document.getElementById("timer").innerText =
String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");

if(time<=0){
clearInterval(timer);
submit();
}

},1000);
}

/* RENDER SAFE */
function render(){
let q = questions[index];
if(!q) return;

document.getElementById("qno").innerText =
`Q ${index+1}/${questions.length}`;

document.getElementById("question").innerText = q.question;

document.getElementById("options").innerHTML =
q.options.map(op => `
<label class="opt ${submitted ? (op===q.answer?'correct':answers[index]===op?'wrong':'') : ''}">
<input type="radio" name="opt"
${answers[index]===op?'checked':''}
${submitted?'disabled':''}
onchange="selectAns('${op.replace(/'/g,"\\'")}')">
${op}
</label>
`).join("");
}

/* ANSWER SAVE */
window.selectAns = (val) => {
answers[index] = val;
};

/* NAV */
window.next = () => {
if(index < questions.length-1){
index++;
render();
}
};

window.prev = () => {
if(index > 0){
index--;
render();
}
};

/* SUBMIT */
window.submit = async () => {
if(submitted) return;

submitted = true;
clearInterval(timer);

let score = 0;
questions.forEach((q,i)=>{
if(answers[i] === q.answer) score++;
});

render();

document.getElementById("result").innerText =
`Score: ${score}/${questions.length}`;

if(user){
await addDoc(collection(db,"results"),{
uid:user.uid,
subject,
score,
total:questions.length,
createdAt:serverTimestamp()
});
}
};

/* BACK */
window.goBack = () => {
history.back();
};
</script>

</body>
</html>
