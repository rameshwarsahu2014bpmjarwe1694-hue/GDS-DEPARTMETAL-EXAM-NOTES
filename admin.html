
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#000,#333,#b30000);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#fff;
padding:30px;
border-radius:15px;
width:90%;
max-width:380px;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
text-align:center;
}

h2{
color:#b30000;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#000;
color:#fff;
border:none;
border-radius:8px;
font-size:17px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#222;
}

a{
display:block;
margin-top:12px;
text-decoration:none;
color:#0044cc;
font-weight:bold;
}
</style>
</head>
<body>

<div class="box">
<h2>Admin Login</h2>

<input type="email" id="adminEmail" placeholder="Admin Email">
<input type="password" id="adminPassword" placeholder="Password">

<button onclick="adminLogin()">Login</button>

<a href="index.html">⬅ Back Home</a>
</div>

<script type="module" src="firebase.js"></script>
<script defer src="script.js"></script>
</body>
</html>
