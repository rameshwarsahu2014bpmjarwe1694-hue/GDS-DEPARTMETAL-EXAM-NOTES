<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mock Test</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f2f2f2;
padding:15px;
}

.topbar{
background:#000;
color:#fff;
padding:14px;
text-align:center;
font-size:22px;
font-weight:bold;
border-radius:8px;
margin-bottom:20px;
}

.container{
max-width:650px;
margin:auto;
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

.timer{
text-align:right;
font-size:18px;
font-weight:bold;
color:red;
margin-bottom:10px;
}

#qno{
font-size:18px;
font-weight:bold;
margin-bottom:10px;
}

#question{
font-size:21px;
font-weight:bold;
line-height:30px;
margin-bottom:20px;
}

.option{
display:block;
width:100%;
padding:14px;
margin-bottom:10px;
border:none;
border-radius:8px;
background:#eee;
font-size:16px;
text-align:left;
cursor:pointer;
}

.option:hover{
background:#ddd;
}

.nextBtn{
width:100%;
padding:14px;
background:#000;
color:#fff;
border:none;
border-radius:8px;
font-size:17px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.result{
text-align:center;
font-size:24px;
font-weight:bold;
line-height:42px;
}

.backBtn{
background:#d40000;
margin-top:15px;
}
</style>
</head>

<body>

<div class="topbar">📝 Mock Test</div>

<div class="container" id="quizBox">

<div class="timer" id="timer">Checking Login...</div>

<div id="qno"></div>

<div id="question">Loading...</div>

<button class="option" id="btnA" onclick="selectAns('A')"></button>
<button class="option" id="btnB" onclick="selectAns('B')"></button>
<button class="option" id="btnC" onclick="selectAns('C')"></button>
<button class="option" id="btnD" onclick="selectAns('D')"></button>

<button class="nextBtn" onclick="nextQuestion()">Next Question</button>

</div>

<script type="module" src="firebase.js"></script>

<script type="module">

import { onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

import {
initializeApp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
get
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_AUTH_DOMAIN",
databaseURL: "YOUR_DATABASE_URL",
projectId: "YOUR_PROJECT_ID",
storageBucket: "YOUR_BUCKET",
messagingSenderId: "YOUR_MSG_ID",
appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let userEmail = "";
let quiz = [];
let current = 0;
let score = 0;
let selected = "";

let totalSeconds = 0;
let remainingSeconds = 0;
let timerInterval;
let submitted = false;

function waitForFirebase(){

if(window.auth){
checkLogin();
}else{
setTimeout(waitForFirebase,300);
}

}

function checkLogin(){

onAuthStateChanged(window.auth,(user)=>{

if(!user){
alert("Please login first");
window.location.href="login.html";
return;
}

userEmail = user.email;
loadQuestions();

});

}

window.selectAns = function(ans){

selected = ans;

resetBtns();

document.getElementById("btn"+ans).style.background="#90ee90";

}

window.nextQuestion = function(){

if(submitted) return;

if(selected==""){
alert("Please select an option");
return;
}

if(selected == quiz[current].answer){
score++;
}

current++;

if(current < quiz.length){
loadQuestion();
}else{
showResult();
}

}

function loadQuestion(){

let q = quiz[current];

document.getElementById("qno").innerHTML =
"Question " + (current+1) + " / " + quiz.length;

document.getElementById("question").innerHTML = q.question;

document.getElementById("btnA").innerHTML = "A) " + q.a;
document.getElementById("btnB").innerHTML = "B) " + q.b;
document.getElementById("btnC").innerHTML = "C) " + q.c;
document.getElementById("btnD").innerHTML = "D) " + q.d;

selected = "";
resetBtns();

}

function resetBtns(){

btnA.style.background="#eee";
btnB.style.background="#eee";
btnC.style.background="#eee";
btnD.style.background="#eee";

}

function startTimer(){

timerInterval = setInterval(function(){

remainingSeconds--;

let min = Math.floor(remainingSeconds/60);
let sec = remainingSeconds%60;

if(min<10) min="0"+min;
if(sec<10) sec="0"+sec;

document.getElementById("timer").innerHTML =
"Time: " + min + ":" + sec;

if(remainingSeconds <= 0){
showResult();
}

},1000);

}

function saveScore(){

let history =
JSON.parse(localStorage.getItem("quizHistory")) || [];

history.push({
email:userEmail,
date:new Date().toLocaleString(),
score:score,
total:quiz.length,
wrong:(quiz.length-score)
});

localStorage.setItem(
"quizHistory",
JSON.stringify(history)
);

}

function showResult(){

if(submitted) return;

submitted = true;

clearInterval(timerInterval);

saveScore();

document.getElementById("quizBox").innerHTML =

"<div class='result'>🎉 Quiz Completed<br><br>Total Questions: "+quiz.length+

"<br>Correct Answers: "+score+

"<br>Wrong Answers: "+(quiz.length-score)+

"<br>Score: "+score+" / "+quiz.length+

"<br><a href='dashboard.html'><button class='nextBtn backBtn'>Back</button></a></div>";

}

async function loadQuestions(){

try{

const snap = await get(ref(db,"quizQuestions"));

if(snap.exists()){

quiz = snap.val();

let minutes = Math.ceil(quiz.length * 1.2);

totalSeconds = minutes * 60;

remainingSeconds = totalSeconds;

loadQuestion();

startTimer();

}else{

document.getElementById("quizBox").innerHTML =
"<div class='result'>No Questions Found!</div>";

}

}catch(error){

document.getElementById("quizBox").innerHTML =
"<div class='result'>Failed to Load Questions</div>";

}

}

document.addEventListener("contextmenu",e=>e.preventDefault());

document.addEventListener("keydown",function(e){

if(e.key==="F12" ||
(e.ctrlKey && e.shiftKey && e.key==="I") ||
(e.ctrlKey && e.key==="u")){
e.preventDefault();
}

});

document.addEventListener("visibilitychange",function(){

if(document.hidden && !submitted){
alert("Tab switching detected!");
}

});

waitForFirebase();

</script>

</body>
</html>
