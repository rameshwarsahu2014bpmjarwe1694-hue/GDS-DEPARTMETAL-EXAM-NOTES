<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mock Test Final</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fa;
padding:15px;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
margin-bottom:15px;
}

.btn{
border:none;
padding:10px 14px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
color:#fff;
}

.back{background:#111;}
.timer{background:#dc3545;}

.wrap{
max-width:900px;
margin:auto;
background:#fff;
padding:20px;
border-radius:14px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

@media(min-width:700px){
.grid{
grid-template-columns:repeat(3,1fr);
}
}
/* OLD .card ko replace karo */
/* FINAL .card */
/* old .card pura replace karo */

.card{
min-height:92px;
padding:16px;
border-radius:22px;

display:flex;
justify-content:center;
align-items:center;
text-align:center;
gap:8px;

font-size:15px;
font-weight:900;
line-height:1.4;
letter-spacing:.4px;
text-transform:uppercase;

/* TEXT FINAL VISIBLE */
color:#111111 !important;
-webkit-text-fill-color:#111111 !important;
text-shadow:none !important;

cursor:pointer;
position:relative;
overflow:hidden;

background:linear-gradient(145deg,
rgba(255,255,255,.95),
rgba(245,245,245,.88));

backdrop-filter:blur(18px);
-webkit-backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.55);

box-shadow:
0 14px 28px rgba(0,0,0,.20),
inset 0 1px 0 rgba(255,255,255,.95);

transition:.22s ease;
}

/* top premium gradient line */
.card::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:4px;
background:linear-gradient(90deg,
#00e5ff,#00ff95,#ffd54f,#ff6ec7);
}

/* hover */
.card:hover{
transform:translateY(-5px) scale(1.03);
box-shadow:
0 18px 34px rgba(0,0,0,.24);
}

/* press */
.card:active{
transform:translateY(2px) scale(.98);
}

/* icon visible */
.card span,
.card i{
color:#1565c0 !important;
font-size:18px;
}

/* mobile */
@media(max-width:600px){
.card{
font-size:13px;
min-height:82px;
padding:14px;
border-radius:18px;
}
}
.err{
background:#ffe8e8;
color:#c00000;
padding:12px;
border-radius:10px;
margin-top:12px;
font-weight:bold;
}

.ok{
background:#e8fff0;
color:green;
padding:12px;
border-radius:10px;
margin-top:12px;
font-weight:bold;
}

.q{
font-size:19px;
font-weight:bold;
margin-bottom:15px;
line-height:1.5;
}

.opt{
display:block;
padding:12px;
margin:10px 0;
border:1px solid #ddd;
border-radius:10px;
cursor:pointer;
}

.opt:hover{
background:#f0f7ff;
}

.correct{
background:#d4edda !important;
border-color:green !important;
}

.wrong{
background:#f8d7da !important;
border-color:red !important;
}

.nav{
display:flex;
gap:10px;
margin-top:15px;
}

.nav button{
flex:1;
padding:12px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
color:#fff;
}

.prev{background:#6c757d;}
.next{background:#007bff;}
.submit{background:green;}

.result{
font-size:22px;
font-weight:bold;
text-align:center;
margin-top:18px;
}

.small{
margin-bottom:12px;
font-weight:bold;
color:#555;
}
</style>
</head>
<body>

<div class="top">
<button class="btn back" onclick="goBack()">⬅ Back</button>
<div class="btn timer" id="timer">30:00</div>
</div>

<div class="wrap">

<div id="statusBox" class="loader">Checking login...</div>

<div id="subjectBox" class="hide">
<h2 style="text-align:center;margin-bottom:15px;">Select Subject</h2>

<div class="grid">

<div class="card" onclick="startQuiz('POSTAL MANUAL VOLUME 7')">📘 POSTAL MANUAL VOLUME 7</div>
<div class="card" onclick="startQuiz('GK')">📘 GK</div>
<div class="card" onclick="startQuiz('Maths')">➕ Maths</div>
<div class="card" onclick="startQuiz('Reasoning')">🧠 Reasoning</div>
<div class="card" onclick="startQuiz('POSTAL MANUAL VOLUME 5')">📘 POSTAL MANUAL VOLUME 5</div>
<div class="card" onclick="startQuiz('Post Office Guide 1')">📮 PO GUIDE 1</div>
<div class="card" onclick="startQuiz('Post Office Guide 2')">📮 PO GUIDE 2</div>
<div class="card" onclick="startQuiz('POSTAL MANUAL VOLUME 6 PART 3')">📘 POSTAL MANUAL VOLUME 6 PART 3</div>

</div>
</div>

<div id="quizBox" class="hide">
<div class="small" id="progress"></div>
<div class="q" id="question"></div>
<div id="options"></div>

<div class="nav">
<button class="prev" onclick="prevQ()">Previous</button>
<button class="next" onclick="nextQ()">Next</button>
<button class="submit" onclick="submitQuiz()">Submit</button>
</div>

<div class="result" id="result"></div>
</div>

<div id="debug"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
query,
where,
addDoc,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* FIREBASE */
const firebaseConfig = {
apiKey: "AIzaSyDjzmo0A4KhOkrqFQdOyCEek6bsPF-UVPQ",
authDomain: "gds-departmental-exam-studyhub.firebaseapp.com",
projectId: "gds-departmental-exam-studyhub",
storageBucket: "gds-departmental-exam-studyhub.appspot.com",
messagingSenderId: "759916756080",
appId: "1:759916756080:web:7f2c0e66458bd007e888b5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let user=null;
let subject="";
let questions=[];
let current=0;
let answers={};
let submitted=false;
let sec=1800;
let timerInt=null;

/* LOGIN CHECK */
onAuthStateChanged(auth,(u)=>{

if(u){
user=u;
msg("Login Success",1);

document.getElementById("subjectBox").classList.remove("hide");

}else{
msg("Please login first");
setTimeout(()=>{
location.href="login.html";
},1200);
}

});

/* START QUIZ */
window.startQuiz = async function(sub){

subject=sub;
msg("Loading "+sub+" Questions...");

try{

const qy = query(
collection(db,"quizQuestions"),
where("subject","==",sub)
);

const snap = await getDocs(qy);

questions=[];

snap.forEach(doc=>{
questions.push(doc.data());
});


if(questions.length===0){
msg("No Questions Found For "+sub);
return;
}

document.getElementById("subjectBox").classList.add("hide");
document.getElementById("quizBox").classList.remove("hide");

current=0;
answers={};
submitted=false;
sec=1800;

startTimer();
render();

}catch(e){
msg("Error Loading Questions");
debug(e.message);
}

};

/* TIMER */
function startTimer(){

clearInterval(timerInt);

timerInt=setInterval(()=>{

sec--;

let m=Math.floor(sec/60);
let s=sec%60;

document.getElementById("timer").innerText=
String(m).padStart(2,"0")+":"+
String(s).padStart(2,"0");

if(sec<=0){
clearInterval(timerInt);
submitQuiz();
}

},1000);

}

/* RENDER */
function render(){

let q=questions[current];

document.getElementById("progress").innerText=
"Question "+(current+1)+" / "+questions.length;

document.getElementById("question").innerText=
(current+1)+". "+q.question;

let html="";

q.options.forEach(op=>{

let checked = answers[current]===op ? "checked":"";
let cls="opt";

if(submitted){
if(op===q.answer) cls+=" correct";
else if(answers[current]===op && op!==q.answer) cls+=" wrong";
}

html += `
<label class="${cls}">
<input type="radio"
name="x"
${checked}
${submitted?"disabled":""}
onclick="saveAns('${esc(op)}')">
${op}
</label>
`;

});

document.getElementById("options").innerHTML=html;

}

/* SAVE */
window.saveAns=function(v){
answers[current]=v;
};

/* NAV */
window.nextQ=function(){
if(current<questions.length-1){
current++;
render();
}
};

window.prevQ=function(){
if(current>0){
current--;
render();
}
};

/* SUBMIT */
window.submitQuiz = async function(){

if(submitted) return;

submitted=true;
clearInterval(timerInt);

let score=0;

questions.forEach((q,i)=>{
if(answers[i]===q.answer) score++;
});

render();

document.getElementById("result").innerText=
"Score: "+score+" / "+questions.length;

if(user){

await addDoc(collection(db,"results"),{
uid:user.uid,
email:user.email,
subject:subject,
score:score,
total:questions.length,
createdAt:serverTimestamp()
});

}

msg("Result Saved",1);

};

/* BACK */
window.goBack=function(){

if(confirm("Exit test?")){

if(history.length>1){
history.back();
}else{
location.href="candidate-dashboard.html";
}

}

};

/* HELPERS */
function msg(t,ok=0){
document.getElementById("statusBox").className=
ok?"ok":"loader";
document.getElementById("statusBox").innerText=t;
}

function debug(t){
document.getElementById("debug").innerHTML=
'<div class="err">'+t+'</div>';
}

function esc(str){
return String(str).replace(/'/g,"\\'");
}
</script>

</body>
</html>
