<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Start Quiz</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#f4f6f9;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:#fff;
padding:25px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,.08);
position:relative;
}

/* NEW BACK BUTTON */
.back-btn{
width:auto;
padding:10px 14px;
margin-top:0;
margin-bottom:15px;
background:#6c757d;
font-size:15px;
border-radius:8px;
}

.back-btn:hover{
background:#545b62;
}

h2{
text-align:center;
margin-bottom:20px;
color:#222;
}

label{
display:block;
margin-top:15px;
font-weight:bold;
color:#333;
}

input,select{
width:100%;
padding:12px;
margin-top:6px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
outline:none;
}

input:focus,select:focus{
border-color:#007bff;
}

button{
width:100%;
padding:14px;
margin-top:22px;
border:none;
background:#007bff;
color:#fff;
font-size:17px;
font-weight:bold;
border-radius:8px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#0056b3;
}

.info{
margin-top:18px;
background:#eef5ff;
padding:12px;
border-radius:8px;
font-size:14px;
color:#333;
line-height:1.6;
}

.error{
color:red;
margin-top:10px;
font-size:14px;
text-align:center;
}

.success{
color:green;
margin-top:10px;
font-size:14px;
text-align:center;
}
</style>
</head>

<body>

<div class="container">

<button type="button" class="back-btn" onclick="goBack()">⬅ Go Back</button>

<h2>Start Quiz</h2>

<form id="quizForm">

<label>Candidate Name</label>
<input type="text" id="name" maxlength="40" required>

<label>Select Subject</label>
<select id="subject" required>
<option value="">Choose Subject</option>
<option value="Post Office Guide 1">Post Office Guide 1</option>
<option value="Post Office Guide 2">Post Office Guide 2</option>
<option value="PO Manual Volume 5">PO Manual Volume 5</option>
<option value="Math">Math</option>
<option value="Reasoning">Reasoning</option>
<option value="GK">GK</option>
<option value="English">English</option>
<option value="Mixed Mock Test">Mixed Mock Test</option>
</select>

<label>Select Questions</label>
<select id="questions" required>
<option value="">Choose</option>
<option value="25">25 Questions</option>
<option value="50">50 Questions</option>
<option value="100">100 Questions</option>
</select>

<button type="submit">Start Test</button>

<div id="msg"></div>

</form>

<div class="info">
<b>Rules:</b><br>
• Full screen recommended<br>
• Refresh = Auto submit risk<br>
• Timer starts immediately<br>
• Result auto save permanently
</div>

</div>

<script type="module">
"use strict";

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
doc,
setDoc,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_PROJECT.firebaseapp.com",
projectId: "YOUR_PROJECT_ID",
storageBucket: "YOUR_PROJECT.appspot.com",
messagingSenderId: "YOUR_ID",
appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ========= SECURITY ========= */

// Disable right click
document.addEventListener("contextmenu", e => e.preventDefault());

// Disable inspect shortcuts
document.addEventListener("keydown", function(e){
if(
e.key === "F12" ||
(e.ctrlKey && e.shiftKey && ["I","J","C"].includes(e.key.toUpperCase())) ||
(e.ctrlKey && e.key.toUpperCase() === "U")
){
e.preventDefault();
}
});

// Tab switch warning
document.addEventListener("visibilitychange", function(){
if(document.hidden){
alert("Warning: Tab switching detected.");
}
});

/* ========= BACK BUTTON ========= */
window.goBack = function(){
if(history.length > 1){
history.back();
}else{
window.location.href="candidate-dashboard.html";
}
};

/* ========= FORM ========= */

const form = document.getElementById("quizForm");
const msg = document.getElementById("msg");

form.addEventListener("submit", async function(e){
e.preventDefault();

msg.innerHTML = "";

let name = document.getElementById("name").value.trim();
let subject = document.getElementById("subject").value;
let questions = document.getElementById("questions").value;

/* Validation */
if(name.length < 3){
showError("Enter valid name");
return;
}

if(!/^[a-zA-Z ]+$/.test(name)){
showError("Only letters allowed in name");
return;
}

if(subject === ""){
showError("Select subject");
return;
}

if(questions === ""){
showError("Select question limit");
return;
}

/* Timer */
let totalMinutes = Math.ceil(parseInt(questions) * 1.2);

/* Secure Session Data */
const quizData = {
name: escapeHTML(name),
subject: subject,
questions: parseInt(questions),
time: totalMinutes,
startTime: Date.now()
};

try{

/* Permanent Firestore Save */
await setDoc(doc(db,"quizSessions",Date.now().toString()),{
name: quizData.name,
subject: quizData.subject,
questions: quizData.questions,
time: quizData.time,
startTime: quizData.startTime,
createdAt: serverTimestamp()
});

/* Temporary session for quiz.html */
sessionStorage.setItem("quizSession", JSON.stringify(quizData));

showSuccess("Redirecting to test...");

setTimeout(()=>{
window.location.href = "quiz.html";
},1200);

}catch(error){
showError("Server error. Try again.");
}

});

/* ========= FUNCTIONS ========= */

function showError(text){
msg.innerHTML = `<div class="error">${text}</div>`;
}

function showSuccess(text){
msg.innerHTML = `<div class="success">${text}</div>`;
}

function escapeHTML(str){
return str.replace(/[&<>"']/g,function(m){
return {
"&":"&amp;",
"<":"&lt;",
">":"&gt;",
'"':"&quot;",
"'":"&#39;"
}[m];
});
}
</script>

</body>
</html>
