<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Syllabus Dashboard</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI', Tahoma, sans-serif;}
        body{background:#f9f9f9;padding:15px;display:flex;justify-content:center;}
        .container{width:100%;max-width:450px;}
        /* Card Design as per your screenshot */
        .card{background:#fff;padding:20px;border-radius:15px;margin-bottom:15px;border:1px solid #eee;box-shadow:0 2px 5px rgba(0,0,0,0.05);}
        .badge{background:#e7f1ff;color:#007bff;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:bold;display:inline-block;}
        .card h3{margin:10px 0 5px;font-size:22px;color:#111;} /* Yeh Title hai */
        .card p{color:#666;font-size:14px;margin-bottom:15px;} /* Yeh Description hai */
        .file-label{font-size:11px; color:#999; margin-bottom:10px; display:block;}
        .btn-pdf{display:block;width:100%;padding:14px;background:#28a745;color:#fff;text-align:center;text-decoration:none;border-radius:10px;font-weight:bold;border:none;cursor:pointer;font-size:16px;}
        .loading{text-align:center;padding:50px;color:#666;}
    </style>
</head>
<body>

<div class="container" id="syllabus-list">
    <div class="loading">Syllabus Load Ho Raha Hai...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyDjzmo0A4KhOkrqFQdOyCEek6bsPF-UVPQ",
    authDomain: "gds-departmental-exam-studyhub.firebaseapp.com",
    projectId: "gds-departmental-exam-studyhub",
    storageBucket: "gds-departmental-exam-studyhub.appspot.com",
    messagingSenderId: "759916756080",
    appId: "1:759916756080:web:7f2c0e66458bd007e888b5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const BACKEND_URL = "https://payment-backend-2-g6go.onrender.com";
let userEmail = "";

// Login Status Check
onAuthStateChanged(auth, (user) => {
    if (user) { 
        userEmail = user.email; 
        loadSyllabus(); 
    } else { 
        window.location.href = "login.html"; 
    }
});

function decodeHTMLEntities(text) {
    const textArea = document.createElement('textarea');
    textArea.innerHTML = text;
    return textArea.value.trim();
}

async function loadSyllabus() {
    const listDiv = document.getElementById("syllabus-list");
    try {
        const q = query(collection(db, "syllabus"), orderBy("createdAt", "desc"));
        const snap = await getDocs(q);
        listDiv.innerHTML = "";
        
        snap.forEach(doc => {
            const d = doc.data();
            
            // 1. Title: Jo screen par dikhega
            const syllabusTitle = d.title || "Exam Pattern";
            
            // 2. Post: Category (MTS/Postman/PA-SA)
            const postType = (d.category || "").trim();
            
            // 3. Filename: Exact file name for backend
            const exactFileName = decodeHTMLEntities(d.fileName || "");

            // Final URL: email, post, aur filename teeno ke sath
            const url = `${BACKEND_URL}/get-pdf?email=${encodeURIComponent(userEmail)}&post=${encodeURIComponent(postType)}&filename=${encodeURIComponent(exactFileName)}`;

            listDiv.innerHTML += `
                <div class="card">
                    <span class="badge">${postType}</span>
                    <h3>${syllabusTitle}</h3>
                    <p>${d.desc || 'Latest Pattern Syllabus'}</p>
                    <span class="file-label">Target File: ${exactFileName}</span>
                    <button class="btn-pdf" onclick="window.open('${url}', '_blank')">
                        📖 Open Syllabus PDF
                    </button>
                </div>`;
        });
    } catch(err) { 
        listDiv.innerHTML = "<p>Data load karne mein error aaya.</p>"; 
    }
}
</script>
</body>
</html>
