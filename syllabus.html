<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Syllabus</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#f2f5f9;
padding:15px;
}

.container{
max-width:700px;
margin:auto;
background:#fff;
padding:20px;
border-radius:14px;
box-shadow:0 0 12px rgba(0,0,0,0.08);
}

h2{
text-align:center;
margin-bottom:20px;
color:#222;
}

#adminPanel{
display:none;
background:#f8f9fa;
padding:15px;
border-radius:12px;
margin-bottom:20px;
border:1px solid #ddd;
}

input,select,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

button{
background:#007bff;
color:white;
border:none;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.card{
background:#fff;
border:1px solid #ddd;
padding:15px;
border-radius:12px;
margin-top:15px;
box-shadow:0 3px 8px rgba(0,0,0,0.05);
}

.card h3{
margin-bottom:10px;
color:#111;
}

.downloadBtn{
display:block;
text-align:center;
padding:10px;
background:green;
color:white;
text-decoration:none;
border-radius:8px;
font-weight:bold;
margin-top:10px;
}

.status{
margin-top:10px;
font-weight:bold;
text-align:center;
}

.note{
font-size:13px;
color:#555;
margin-top:10px;
text-align:center;
}
</style>
</head>

<body>

<div class="container">

<h2>Departmental Exam Syllabus</h2>

<!-- Admin Panel -->
<div id="adminPanel">

<input type="password" id="adminPass" placeholder="Enter Admin Password">

<select id="postName">
<option value="">Select Post</option>
<option value="mts">MTS</option>
<option value="postman">Postman / Mail Guard</option>
<option value="pa">Postal Assistant / Sorting Assistant</option>
</select>

<input type="file" id="pdfFile" accept=".pdf">

<button onclick="uploadPDF()">Upload PDF</button>

<div class="status" id="status"></div>

<div class="note">Only admin can upload syllabus.</div>

</div>

<!-- Candidate Cards -->

<div class="card">
<h3>MTS</h3>
<a id="mtsBtn" class="downloadBtn" href="#" target="_blank" style="display:none;">Download PDF</a>
<div id="mtsText">No syllabus uploaded</div>
</div>

<div class="card">
<h3>Postman / Mail Guard</h3>
<a id="postmanBtn" class="downloadBtn" href="#" target="_blank" style="display:none;">Download PDF</a>
<div id="postmanText">No syllabus uploaded</div>
</div>

<div class="card">
<h3>Postal Assistant / Sorting Assistant</h3>
<a id="paBtn" class="downloadBtn" href="#" target="_blank" style="display:none;">Download PDF</a>
<div id="paText">No syllabus uploaded</div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getStorage, ref, uploadBytes, getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {
apiKey: "AIzaSyDjzmo0A4KhOkrqFQdOyCEek6bsPF-UVPQ",
authDomain: "gds-departmental-exam-studyhub.firebaseapp.com",
databaseURL: "https://gds-departmental-exam-studyhub-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "gds-departmental-exam-studyhub",
storageBucket: "gds-departmental-exam-studyhub.firebasestorage.app",
messagingSenderId: "759916756080",
appId: "1:759916756080:web:7f2c0e66458bd007e888b5"
};

const app = initializeApp(firebaseConfig);
const storage = getStorage(app);

/* Change Password Here */
const ADMIN_PASSWORD = "12345";

/* Admin Access */
let pass = prompt("Admin only password. Candidate Cancel dabaye.");

if(pass === ADMIN_PASSWORD){
document.getElementById("adminPanel").style.display="block";
}

/* Upload PDF */
window.uploadPDF = async function(){

let pass2 = document.getElementById("adminPass").value;
let post = document.getElementById("postName").value;
let file = document.getElementById("pdfFile").files[0];

if(pass2 !== ADMIN_PASSWORD){
alert("Wrong Password");
return;
}

if(post === ""){
alert("Select Post");
return;
}

if(!file){
alert("Select PDF");
return;
}

document.getElementById("status").innerHTML="Uploading...";

try{

let fileRef = ref(storage,"syllabus/"+post+".pdf");

await uploadBytes(fileRef,file);

document.getElementById("status").innerHTML="Upload Successful";

loadPDFs();

}catch(e){

document.getElementById("status").innerHTML="Upload Failed";

}

}

/* Load PDFs */

async function loadOne(path,btn,text){

try{

let url = await getDownloadURL(ref(storage,path));

document.getElementById(btn).href=url;
document.getElementById(btn).style.display="block";
document.getElementById(text).style.display="none";

}catch(e){

}

}

function loadPDFs(){

loadOne("syllabus/mts.pdf","mtsBtn","mtsText");
loadOne("syllabus/postman.pdf","postmanBtn","postmanText");
loadOne("syllabus/pa.pdf","paBtn","paText");

}

loadPDFs();

</script>

</body>
</html>
