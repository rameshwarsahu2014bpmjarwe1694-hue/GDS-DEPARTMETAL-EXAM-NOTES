<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Syllabus</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f4f6f9;padding:20px}
.container{
max-width:900px;margin:auto;background:#fff;padding:20px;
border-radius:12px;box-shadow:0 5px 15px rgba(0,0,0,.08)
}
h1{text-align:center;margin-bottom:20px}
.card{
background:#fafafa;padding:15px;border:1px solid #ddd;
border-radius:10px;margin-bottom:12px
}
.small{font-size:14px;color:#666;margin-top:5px}
.download-btn{
display:inline-block;
margin-top:10px;
padding:10px 14px;
background:#28a745;
color:#fff;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}
</style>
</head>
<body>

<div class="container">

<h1>Candidate Syllabus</h1>

<div id="list">Loading...</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
query,
orderBy
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDjzmo0A4KhOkrqFQdOyCEek6bsPF-UVPQ",
authDomain: "gds-departmental-exam-studyhub.firebaseapp.com",
projectId: "gds-departmental-exam-studyhub",
storageBucket: "gds-departmental-exam-studyhub.appspot.com",
messagingSenderId: "759916756080",
appId: "1:759916756080:web:7f2c0e66458bd007e888b5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const list=document.getElementById("list");

loadData();

async function loadData(){

try{

const q=query(collection(db,"syllabus"),orderBy("createdAt","desc"));
const snap=await getDocs(q);

list.innerHTML="";

if(snap.empty){
list.innerHTML="<p>No syllabus available.</p>";
return;
}

snap.forEach(item=>{

const d=item.data();

list.innerHTML += `
<div class="card">
<h3>${safe(d.title)}</h3>
<p>${safe(d.category)}</p>
<p class="small">${safe(d.desc)}</p>

<a class="download-btn" href="${safe(d.fileName)}" download>
${safe(d.fileName)}
</a>

</div>
`;

});

}catch(err){
list.innerHTML="Failed to Load";
console.log(err);
}

}

function safe(str){ return str || ""; }

</script>
</body>
</html>
