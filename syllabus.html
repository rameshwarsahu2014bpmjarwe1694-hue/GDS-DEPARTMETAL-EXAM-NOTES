<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Syllabus</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f4f6f9;padding:20px}
.container{
max-width:900px;margin:auto;background:#fff;padding:20px;
border-radius:12px;box-shadow:0 5px 15px rgba(0,0,0,.08)
}
h1{text-align:center;margin-bottom:20px}
.card{
background:#fafafa;padding:15px;border:1px solid #ddd;
border-radius:10px;margin-bottom:12px
}
.row{
display:flex;justify-content:space-between;
gap:10px;flex-wrap:wrap;align-items:center
}
.small{font-size:14px;color:#666;margin-top:5px}
.open-btn{
display:inline-block;
padding:10px 14px;
background:#007bff;
color:#fff;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}
</style>
</head>
<body>

<div class="container">
<h1>Available Syllabus</h1>
<div id="list">Loading...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
query,
orderBy
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"YOUR_API_KEY",
authDomain:"YOUR_PROJECT.firebaseapp.com",
projectId:"YOUR_PROJECT_ID",
storageBucket:"YOUR_PROJECT.appspot.com",
messagingSenderId:"YOUR_ID",
appId:"YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const list=document.getElementById("list");

async function loadData(){

list.innerHTML="Loading...";

try{

const q=query(collection(db,"syllabus"),orderBy("createdAt","desc"));
const snap=await getDocs(q);

list.innerHTML="";

if(snap.empty){
list.innerHTML="<p>No syllabus available.</p>";
return;
}

snap.forEach(item=>{

const d=item.data();

list.innerHTML += `
<div class="card">
<div class="row">

<div>
<h3>${safe(d.title)}</h3>
<p>${safe(d.category)}</p>
<p class="small">${safe(d.desc)}</p>
<p class="small"><b>File:</b> ${safe(d.fileName)}</p>
</div>

<div>
<a class="open-btn" href="${safe(d.pdfLink)}" target="_blank">Open</a>
</div>

</div>
</div>
`;

});

}catch(e){
list.innerHTML="Failed to load";
console.log(e);
}

}

function safe(str){ return str || ""; }

loadData();
</script>

</body>
</html>
