<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Syllabus Hub - Official Study</title>
    <style>
        :root { --primary: #007bff; --success: #28a745; --warning: #ff9800; --dark: #2c3e50; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background: #f0f2f5; padding: 15px; color: #333; }
        .container { max-width: 600px; margin: auto; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--dark); margin-bottom: 20px; font-size: 22px; border-bottom: 3px solid var(--primary); padding-bottom: 10px; }
        
        .selector-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        select, input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; }
        input:focus, select:focus { border-color: var(--primary); }

        .status-bar { text-align: center; font-size: 14px; font-weight: bold; margin-bottom: 15px; padding: 8px; border-radius: 5px; display: none; }

        .card { background: #fafafa; border: 1px solid #eee; padding: 15px; border-radius: 12px; margin-top: 15px; }
        .category-badge { display: inline-block; padding: 4px 10px; background: var(--primary); color: #fff; font-size: 11px; border-radius: 5px; font-weight: bold; margin-bottom: 8px; }
        
        .btn-download { display: block; text-align: center; padding: 12px; background: var(--success); color: white; text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 14px; margin-top: 10px; cursor: pointer; border: none; width: 100%; }
        .btn-download:hover { opacity: 0.9; }

        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <h1>Candidate Syllabus</h1>

    <div class="selector-grid">
        <select id="categoryFilter">
            <option value="All">सभी कैटेगरी</option>
            <option value="MTS">MTS</option>
            <option value="Postman">Postman</option>
            <option value="PA/SA">PA/SA</option>
        </select>
        <input type="text" id="searchBox" placeholder="Syllabus सर्च करें...">
    </div>

    <div id="statusBox" class="status-bar"></div>

    <div id="list">
        <div class="loader"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDjzmo0A4KhOkrqFQdOyCEek6bsPF-UVPQ",
        authDomain: "gds-departmental-exam-studyhub.firebaseapp.com",
        projectId: "gds-departmental-exam-studyhub",
        storageBucket: "gds-departmental-exam-studyhub.appspot.com",
        messagingSenderId: "759916756080",
        appId: "1:759916756080:web:7f2c0e66458bd007e888b5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    
    // आपका RENDER BACKEND URL
    const BACKEND_URL = "https://payment-backend-2-g6go.onrender.com";

    let allData = [];
    let currentUserEmail = "";

    // Auth Check
    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUserEmail = user.email;
            loadData();
        } else {
            alert("Security Alert: कृपया पहले लॉगिन करें!");
            window.location.href = "login.html"; 
        }
    });

    async function loadData() {
        try {
            const q = query(collection(db, "syllabus"), orderBy("createdAt", "desc"));
            const snap = await getDocs(q);
            allData = [];
            snap.forEach(doc => { allData.push({ id: doc.id, ...doc.data() }); });
            renderData();
        } catch (error) {
            document.getElementById("list").innerHTML = `<p style="text-align:center; padding:20px;">डेटा लोड नहीं हो पाया।</p>`;
        }
    }

    window.renderData = function() {
        const category = document.getElementById("categoryFilter").value;
        const search = document.getElementById("searchBox").value.toLowerCase().trim();
        const listDiv = document.getElementById("list");

        let filtered = allData.filter(item => {
            let catMatch = (category === "All" || item.category === category);
            let searchMatch = (item.title || "").toLowerCase().includes(search) || (item.desc || "").toLowerCase().includes(search);
            return catMatch && searchMatch;
        });

        if (filtered.length === 0) {
            listDiv.innerHTML = `<div style="text-align:center; padding:20px;">कोई सिलेबस नहीं मिला।</div>`;
            return;
        }

        listDiv.innerHTML = "";
        filtered.forEach(item => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                <div class="category-badge">${item.category}</div>
                <h3>${item.title}</h3>
                <p style="font-size:13px; color:#666; margin:8px 0;">${item.desc || ""}</p>
                <button class="btn-download">📄 Open Syllabus PDF</button>
            `;
            
            // Render Backend से PDF खोलने का लॉजिक
            card.querySelector(".btn-download").onclick = () => {
                if(!currentUserEmail) return alert("लॉगिन जरूरी है!");
                
                // यहाँ हम Render URL का इस्तेमाल कर रहे हैं
                // नोट: आपके बैकएंड में 'post' और 'year' की जगह सिलेबस के लिए अलग पैरामीटर हो सकते हैं
                // फिलहाल मैं 'year' की जगह 'Syllabus' और 'post' की जगह कैटेगरी भेज रहा हूँ
                const url = `${BACKEND_URL}/get-pdf?email=${encodeURIComponent(currentUserEmail)}&year=Syllabus&post=${encodeURIComponent(item.category)}`;
                window.open(url, "_blank");
            };

            listDiv.appendChild(card);
        });
    };

    document.getElementById("categoryFilter").onchange = renderData;
    document.getElementById("searchBox").oninput = renderData;

</script>
</body>
</html>
