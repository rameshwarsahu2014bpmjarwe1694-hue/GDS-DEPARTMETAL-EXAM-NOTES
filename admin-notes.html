
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Notes Panel</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
padding:18px;
min-height:100vh;
}

.wrap{
max-width:1000px;
margin:auto;
}

.title{
background:#111;
color:#fff;
padding:16px;
text-align:center;
font-size:24px;
font-weight:700;
border-radius:14px;
margin-bottom:18px;
}

.card{
background:#fff;
padding:18px;
border-radius:16px;
box-shadow:0 6px 14px rgba(0,0,0,.10);
margin-bottom:18px;
}

h2{
font-size:20px;
margin-bottom:14px;
color:#111;
}

input,select,textarea{
width:100%;
padding:13px;
border:1px solid #ddd;
border-radius:12px;
outline:none;
font-size:15px;
margin-bottom:12px;
}

textarea{
min-height:120px;
resize:vertical;
}

input[type="file"]{
padding:10px;
background:#f8f8f8;
}

button{
width:100%;
padding:13px;
border:none;
border-radius:12px;
font-size:16px;
font-weight:700;
cursor:pointer;
}

.saveBtn{
background:#1565c0;
color:#fff;
}

.saveBtn:hover{
background:#0d47a1;
}

.delBtn{
margin-top:10px;
background:#e53935;
color:#fff;
}

.item{
border:1px solid #eee;
padding:15px;
border-radius:14px;
margin-bottom:12px;
background:#fafafa;
}

.name{
font-weight:700;
font-size:18px;
margin-bottom:6px;
color:#111;
}

.meta{
font-size:14px;
color:#555;
margin:4px 0;
word-break:break-word;
}

.linkBtn{
display:inline-block;
margin-top:8px;
padding:10px 14px;
background:#111;
color:#fff;
text-decoration:none;
border-radius:10px;
font-size:14px;
}

.empty{
text-align:center;
color:#777;
padding:20px;
}

.back{
display:block;
margin-top:14px;
text-align:center;
padding:14px;
background:#111;
color:#fff;
text-decoration:none;
border-radius:12px;
font-weight:700;
}
</style>
</head>
<body>

<div class="wrap">

<div class="title">📚 Admin Notes Panel</div>

<div class="card">
<h2>Upload New Note</h2>

<input type="text" id="titleInput" placeholder="Enter note title">

<select id="catInput">
<option value="MTS">MTS</option>
<option value="POSTMAN">POSTMAN</option>
<option value="PA/SA">PA/SA</option>
</select>

<textarea id="descInput" placeholder="Write description / text note"></textarea>

<input type="file" id="fileInput" accept=".pdf,image/*">

<button class="saveBtn" onclick="uploadNote()">Upload Note</button>
</div>

<div class="card">
<h2>All Uploaded Notes</h2>
<div id="listBox" class="empty">Loading...</div>
</div>

<a href="admin-panel.html" class="back">⬅ Back to Admin Panel</a>

</div>

<script type="module" src="firebase.js"></script>

<script type="module">

import {
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

import {
collection,
addDoc,
getDocs,
deleteDoc,
doc,
serverTimestamp,
query,
orderBy
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

import {
ref,
uploadBytes,
getDownloadURL,
deleteObject
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-storage.js";

function safe(v){
return String(v || "")
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/"/g,"&quot;")
.replace(/'/g,"&#039;");
}

function waitFirebase(){
if(window.auth && window.db && window.storage){
checkAdmin();
}else{
setTimeout(waitFirebase,300);
}
}

function checkAdmin(){

onAuthStateChanged(window.auth,(user)=>{

if(!user){
alert("Login First");
location.href="admin.html";
return;
}

if(user.email !== "rameshwarsahu2014bpmjarwe1694@gmail.com"){
alert("Unauthorized");
location.href="login.html";
return;
}

loadNotes();

});

}

window.uploadNote = async function(){

const title = document.getElementById("titleInput").value.trim();
const category = document.getElementById("catInput").value;
const desc = document.getElementById("descInput").value.trim();
const file = document.getElementById("fileInput").files[0];

if(!title){
alert("Enter title");
return;
}

try{

let fileURL = "";
let filePath = "";
let fileType = "text";

if(file){

fileType = file.type || "file";

const path = "notes/" + Date.now() + "_" + file.name;
const storageRef = ref(window.storage,path);

await uploadBytes(storageRef,file);

fileURL = await getDownloadURL(storageRef);
filePath = path;
}

await addDoc(collection(window.db,"notes"),{
title,
category,
description:desc,
fileURL,
filePath,
fileType,
createdAt:serverTimestamp()
});

document.getElementById("titleInput").value="";
document.getElementById("descInput").value="";
document.getElementById("fileInput").value="";

alert("Uploaded Successfully");

loadNotes();

}catch(error){
alert("Upload Failed");
}

}

async function loadNotes(){

const box = document.getElementById("listBox");

try{

const q = query(
collection(window.db,"notes"),
orderBy("createdAt","desc")
);

const snap = await getDocs(q);

if(snap.empty){
box.innerHTML =
`<div class="empty">No notes uploaded</div>`;
return;
}

let html = "";

snap.forEach((d)=>{

const x = d.data();

html += `
<div class="item">

<div class="name">${safe(x.title)}</div>

<div class="meta">📘 Category: ${safe(x.category)}</div>

<div class="meta">${safe(x.description || "")}</div>

${x.fileURL ? `
<a class="linkBtn" target="_blank"
href="${x.fileURL}">
Open File
</a>` : ""}

<button class="delBtn"
onclick="deleteNote('${d.id}','${x.filePath || ""}')">
Delete
</button>

</div>
`;

});

box.innerHTML = html;

}catch(error){
box.innerHTML =
`<div class="empty">Failed to load notes</div>`;
}

}

window.deleteNote = async function(id,path){

if(!confirm("Delete this note?")) return;

try{

await deleteDoc(doc(window.db,"notes",id));

if(path){
try{
await deleteObject(ref(window.storage,path));
}catch(e){}
}

alert("Deleted");

loadNotes();

}catch(error){
alert("Delete Failed");
}

}

waitFirebase();

</script>

</body>
</html>
