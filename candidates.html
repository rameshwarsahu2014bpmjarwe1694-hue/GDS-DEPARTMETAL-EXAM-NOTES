<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Total Candidates</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#2193b0,#6dd5ed);
}

.topbar{
background:#111;
color:#fff;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
padding:20px;
max-width:1000px;
margin:auto;
}

.summary{
background:#fff;
padding:18px;
border-radius:14px;
text-align:center;
font-size:24px;
font-weight:bold;
color:#2193b0;
box-shadow:0 5px 12px rgba(0,0,0,0.1);
margin-bottom:20px;
}

.list{
display:grid;
gap:15px;
}

.card{
background:#fff;
padding:18px;
border-radius:14px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.name{
font-size:18px;
font-weight:bold;
color:#111;
}

.info{
margin-top:6px;
color:#555;
font-size:15px;
}

.empty{
text-align:center;
color:#fff;
font-size:18px;
margin-top:30px;
}

.back{
display:block;
margin-top:25px;
background:#111;
color:#fff;
padding:12px;
text-align:center;
border-radius:10px;
text-decoration:none;
font-weight:bold;
}
</style>
</head>

<body>

<div class="topbar">👥 Total Candidates</div>

<div class="container">

<div class="summary" id="countBox">Registered Candidates: 0</div>

<div class="list" id="candidateList"></div>

<a href="admin-panel.html" class="back">⬅ Back to Admin Panel</a>

</div>

<script type="module" src="firebase.js"></script>

<script type="module">

import {
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

import {
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

function waitForFirebase(){
if(window.auth && window.db){
checkAdmin();
}else{
setTimeout(waitForFirebase,300);
}
}

function checkAdmin(){

onAuthStateChanged(window.auth, async (user) => {

if(!user){
alert("Please login first.");
window.location.href = "admin.html";
return;
}

if(user.email !== "rameshwarsahu2014bpmjarwe1694@gmail.com"){
alert("Unauthorized Access");
window.location.href = "login.html";
return;
}

loadCandidates();

});

}

async function loadCandidates(){

const db = window.db;

const countBox = document.getElementById("countBox");
const candidateList = document.getElementById("candidateList");

candidateList.innerHTML = "";

try{

const snapshot = await getDocs(collection(db,"candidates"));

let total = 0;

snapshot.forEach((doc) => {

total++;

const data = doc.data();

candidateList.innerHTML += `
<div class="card">
<div class="name">${data.name || "No Name"}</div>
<div class="info">Mobile: ${data.mobile || "-"}</div>
<div class="info">Email: ${data.email || "-"}</div>
</div>
`;

});

countBox.innerHTML = `Registered Candidates: ${total}`;

if(total === 0){
candidateList.innerHTML =
`<div class="empty">No candidates registered yet.</div>`;
}

}catch(error){

candidateList.innerHTML =
`<div class="empty">Failed to load candidates</div>`;

}

}

waitForFirebase();

</script>

</body>
</html>
