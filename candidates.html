<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Candidates Admin</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

.topbar{
background:#111;
color:#fff;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.summary{
background:#fff;
margin:15px;
padding:15px;
border-radius:10px;
font-weight:bold;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:10px;
}

.card{
background:#fff;
padding:12px;
margin:10px 0;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.name{
font-weight:bold;
font-size:18px;
margin-bottom:5px;
}

.info{
font-size:14px;
color:#444;
}

</style>
</head>

<body>

<div class="topbar">ADMIN - CANDIDATES</div>

<div class="summary" id="countBox">Registered Candidates: 0</div>

<div class="container" id="candidateList">
Loading...
</div>

<script type="module" src="firebase.js"></script>

<script type="module">

import {
collection,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

let allCandidates = [];

const ADMIN_EMAIL = "rameshwarsahu2014bpmjarwe1694@gmail.com";

function init(){

if(!window.auth || !window.db){
setTimeout(init,300);
return;
}

onAuthStateChanged(window.auth,(user)=>{

if(!user){
location.href="admin.html";
return;
}

if(user.email !== ADMIN_EMAIL){
location.href="login.html";
return;
}

loadCandidates();

});

}

function loadCandidates(){

const list = document.getElementById("candidateList");
const countBox = document.getElementById("countBox");

onSnapshot(collection(window.db,"candidates"),(snap)=>{

allCandidates = [];

snap.forEach((doc)=>{
allCandidates.push({id:doc.id,...doc.data()});
});

countBox.innerText = "Registered Candidates: " + snap.size;

render(allCandidates);

},()=>{

list.innerHTML = "Error loading data";

});

}

function render(data){

const list = document.getElementById("candidateList");

if(data.length === 0){
list.innerHTML = "No Candidates Found";
return;
}

let html = "";

data.forEach((d,i)=>{

html += `
<div class="card">

<div class="name">${i+1}. ${d.name || d.fullName || "No Name"}</div>

<div class="info">📱 ${d.mobile || d.phone || "-"}</div>

<div class="info">📧 ${d.email || d.userEmail || "-"}</div>

</div>
`;

});

list.innerHTML = html;

}

init();

</script>

</body>
</html>
