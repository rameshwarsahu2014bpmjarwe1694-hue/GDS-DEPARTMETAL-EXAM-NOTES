<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Total Candidates</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:linear-gradient(135deg,#2193b0,#6dd5ed);
min-height:100vh;
}

.topbar{
background:#111;
color:#fff;
padding:16px;
text-align:center;
font-size:24px;
font-weight:700;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.summary{
background:#fff;
padding:18px;
border-radius:14px;
text-align:center;
font-size:24px;
font-weight:bold;
color:#2193b0;
box-shadow:0 6px 15px rgba(0,0,0,.10);
margin-bottom:16px;
}

.searchBox{
margin-bottom:18px;
}

.searchBox input{
width:100%;
padding:14px;
border:none;
outline:none;
border-radius:12px;
font-size:16px;
box-shadow:0 4px 10px rgba(0,0,0,.08);
}

.list{
display:grid;
gap:14px;
}

.card{
background:#fff;
padding:18px;
border-radius:14px;
box-shadow:0 5px 12px rgba(0,0,0,.08);
}

.name{
font-size:19px;
font-weight:700;
color:#111;
margin-bottom:8px;
}

.info{
font-size:15px;
color:#555;
margin:4px 0;
}

.row{
display:flex;
gap:10px;
margin-top:12px;
flex-wrap:wrap;
}

.btn{
flex:1;
min-width:120px;
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.deleteBtn{
background:#e53935;
color:#fff;
}

.deleteBtn:hover{
background:#c62828;
}

.back{
display:block;
margin-top:22px;
background:#111;
color:#fff;
padding:14px;
text-align:center;
border-radius:12px;
text-decoration:none;
font-weight:bold;
}

.empty{
text-align:center;
color:#fff;
font-size:18px;
padding:25px 10px;
}
</style>
</head>

<body>

<div class="topbar">👥 Total Candidates (Real Time)</div>

<div class="container">

<div class="summary" id="countBox">Registered Candidates: 0</div>

<div class="searchBox">
<input type="text" id="searchInput" placeholder="Search by name / email / mobile">
</div>

<div class="list" id="candidateList">
<div class="empty">Loading candidates...</div>
</div>

<a href="admin-panel.html" class="back">⬅ Back to Admin Panel</a>

</div>

<script type="module" src="firebase.js"></script>

<script type="module">

import {
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

import {
collection,
onSnapshot,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

let allCandidates = [];

function safe(v){
return String(v || "")
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/"/g,"&quot;")
.replace(/'/g,"&#039;");
}

// ---------- AUTH CHECK ----------
function waitForFirebase(){
if(window.auth && window.db){
checkAdmin();
}else{
setTimeout(waitForFirebase,300);
}
}

function checkAdmin(){

onAuthStateChanged(window.auth,(user)=>{

if(!user){
alert("Please login first");
location.href="admin.html";
return;
}

if(user.email !== "rameshwarsahu2014bpmjarwe1694@gmail.com"){
alert("Unauthorized Access");
location.href="login.html";
return;
}

loadCandidates();

});

}

// ---------- REAL TIME LOAD ----------
function loadCandidates(){

const list = document.getElementById("candidateList");
const countBox = document.getElementById("countBox");

onSnapshot(collection(window.db,"candidates"),(snap)=>{

allCandidates = [];

snap.forEach((d)=>{
allCandidates.push({
id:d.id,
...d.data()
});
});

countBox.innerHTML = `Registered Candidates: ${snap.size}`;

renderCandidates(allCandidates);

},(error)=>{
console.error(error);
list.innerHTML = `<div class="empty">Failed to load candidates</div>`;
countBox.innerHTML = `Registered Candidates: 0`;
});

}

// ---------- RENDER ----------
function renderCandidates(arr){

const list = document.getElementById("candidateList");

if(arr.length === 0){
list.innerHTML = `<div class="empty">No candidates found</div>`;
return;
}

let html = "";

arr.forEach((item,index)=>{

html += `
<div class="card">

<div class="name">${index+1}. ${safe(item.name || "No Name")}</div>

<div class="info">📱 Mobile: ${safe(item.mobile || "-")}</div>
<div class="info">📧 Email: ${safe(item.email || "-")}</div>

<div class="row">
<button class="btn deleteBtn" onclick="deleteCandidate('${item.id}')">
Delete
</button>
</div>

</div>
`;

});

list.innerHTML = html;

}

// ---------- DELETE ----------
window.deleteCandidate = async function(id){

if(!confirm("Delete this candidate?")) return;

try{

await deleteDoc(doc(window.db,"candidates",id));

}catch(error){
alert("Delete Failed");
}

}

// ---------- SEARCH ----------
document.getElementById("searchInput")
.addEventListener("input",function(){

const q = this.value.toLowerCase().trim();

if(!q){
renderCandidates(allCandidates);
return;
}

const filtered = allCandidates.filter(item =>
(item.name || "").toLowerCase().includes(q) ||
(item.email || "").toLowerCase().includes(q) ||
(item.mobile || "").toLowerCase().includes(q)
);

renderCandidates(filtered);

});

// ---------- START ----------
waitForFirebase();

</script>

</body>
</html>
