<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Exam Poster System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  font-family: Arial;
  background:#f1f1f1;
  text-align:center;
}

.container{
  padding:15px;
}

input{
  width:40%;
  padding:10px;
  margin:5px;
}

button{
  padding:10px 15px;
  margin:5px;
  cursor:pointer;
}

#poster{
  width:800px;
  margin:20px auto;
  background:white;
  padding:20px;
  text-align:left;
  box-shadow:0px 0px 10px gray;
}

.header{
  text-align:center;
  font-size:22px;
  font-weight:bold;
  margin-bottom:10px;
  color:#2c3e50;
}

.qbox{
  border-bottom:1px solid #ddd;
  padding:10px 0;
}

.q{
  font-weight:bold;
}

.a{
  color:green;
  margin-top:5px;
}

.page-break{
  page-break-after: always;
}
</style>
</head>

<body>

<div class="container">

<h2>📘 Exam Poster Generator (Pro Version)</h2>

<input id="question" placeholder="Enter Question">
<input id="answer" placeholder="Enter Answer">

<br>

<button onclick="addQA()">➕ Add Question</button>
<button onclick="downloadPDF()">📄 Download PDF</button>

</div>

<div id="poster">
  <div class="header">Rameshwar Sahu GDS Study Hub</div>
  <div id="content"></div>
</div>

<script>

let count = 0;
let pageLimit = 8; // per page questions

function addQA(){

  let q = document.getElementById("question").value;
  let a = document.getElementById("answer").value;

  if(q=="" || a==""){
    alert("Fill both fields");
    return;
  }

  count++;

  let page = Math.ceil(count / pageLimit);
  let div = document.createElement("div");

  if(count % pageLimit == 1 && count > 1){
    div.classList.add("page-break");
  }

  div.classList.add("qbox");

  div.innerHTML = `
    <div class="q">Q${count}. ${q}</div>
    <div class="a">Ans: ${a}</div>
  `;

  document.getElementById("content").appendChild(div);

  document.getElementById("question").value="";
  document.getElementById("answer").value="";
}

function downloadPDF(){

  const { jsPDF } = window.jspdf;

  html2canvas(document.getElementById("poster"),{
    scale:2
  }).then(canvas => {

    let imgData = canvas.toDataURL("image/png");

    let pdf = new jsPDF("p","mm","a4");

    let pageWidth = 210;
    let pageHeight = 297;

    let imgHeight = canvas.height * pageWidth / canvas.width;

    let heightLeft = imgHeight;
    let position = 0;

    pdf.addImage(imgData, "PNG", 0, position, pageWidth, imgHeight);
    heightLeft -= pageHeight;

    while(heightLeft > 0){
      position = heightLeft - imgHeight;
      pdf.addPage();
      pdf.addImage(imgData, "PNG", 0, position, pageWidth, imgHeight);
      heightLeft -= pageHeight;
    }

    pdf.save("exam-poster.pdf");

  });

}

</script>

</body>
</html>
