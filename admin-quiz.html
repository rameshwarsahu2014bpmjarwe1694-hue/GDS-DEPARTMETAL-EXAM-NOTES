<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Add Quiz</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:#fff;
padding:22px;
border-radius:14px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

h2{
text-align:center;
margin-bottom:20px;
}

label{
display:block;
margin-top:14px;
font-weight:bold;
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:6px;
border:1px solid #ccc;
border-radius:10px;
font-size:15px;
outline:none;
}

textarea{
resize:vertical;
min-height:90px;
}

button{
padding:12px 16px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
margin-top:16px;
}

.save{background:#007bff;color:#fff;}
.bulk{background:green;color:#fff;}
.clear{background:#b30000;color:#fff;}

.list{
margin-top:25px;
}

.item{
background:#f8f8f8;
padding:14px;
border-radius:10px;
margin-bottom:12px;
border-left:4px solid #007bff;
}

.small{
font-size:14px;
color:#555;
margin-top:4px;
word-break:break-word;
}
</style>
</head>

<body>

<div class="container">

<h2>Admin Quiz Manager</h2>

<label>Select Subject</label>
<select id="subject">
<option value="GK">GK</option>
<option value="Maths">Maths</option>
<option value="Reasoning">Reasoning</option>
<option value="English">English</option>
<option value="Post Office Guide 1">Post Office Guide 1</option>
<option value="Post Office Guide 2">Post Office Guide 2</option>
<option value="PO Manual Volume 5">PO Manual Volume 5</option>
<option value="Mixed Mock Test">Mixed Mock Test</option>
</select>

<label>Question</label>
<textarea id="question"></textarea>

<label>Option A</label>
<input type="text" id="opt1">

<label>Option B</label>
<input type="text" id="opt2">

<label>Option C</label>
<input type="text" id="opt3">

<label>Option D</label>
<input type="text" id="opt4">

<label>Correct Answer</label>
<select id="answer">
<option value="A">Option A</option>
<option value="B">Option B</option>
<option value="C">Option C</option>
<option value="D">Option D</option>
</select>

<button class="save" onclick="saveQuestion()">Save Question</button>

<label style="margin-top:25px;">Bulk Import (One question per block)</label>
<textarea id="bulkData" placeholder="Format:

Question text
A) option
B) option
C) option
D) option
Answer: A

(next question)..."></textarea>

<button class="bulk" onclick="bulkImport()">Bulk Import</button>
<button class="clear" onclick="clearAll()">Delete All Questions</button>

<div class="list" id="listBox"></div>

</div>

<script>
"use strict";

/* ---------- SECURITY ---------- */
document.addEventListener("contextmenu",e=>e.preventDefault());

document.addEventListener("keydown",function(e){
if(
e.key==="F12" ||
(e.ctrlKey && e.shiftKey && ["I","J","C"].includes(e.key.toUpperCase())) ||
(e.ctrlKey && e.key.toUpperCase()==="U")
){
e.preventDefault();
}
});

/* ---------- STORAGE ---------- */
let questions =
JSON.parse(localStorage.getItem("quizQuestions")) || [];

/* ---------- SAVE SINGLE ---------- */
function saveQuestion(){

let subject = val("subject");
let question = val("question");
let o1 = val("opt1");
let o2 = val("opt2");
let o3 = val("opt3");
let o4 = val("opt4");
let ans = val("answer");

if(question==="" || o1==="" || o2==="" || o3==="" || o4===""){
alert("Fill all fields");
return;
}

let options = [o1,o2,o3,o4];

let correct = "";

if(ans==="A") correct=o1;
if(ans==="B") correct=o2;
if(ans==="C") correct=o3;
if(ans==="D") correct=o4;

questions.push({
subject:subject,
question:question,
options:options,
answer:correct
});

saveStorage();
clearInputs();
showList();
alert("Question Saved");

}

/* ---------- BULK IMPORT ---------- */
function bulkImport(){

let subject = val("subject");
let text = val("bulkData").trim();

if(text===""){
alert("Paste data first");
return;
}

let blocks = text.split(/\n\s*\n/);

let count = 0;

blocks.forEach(function(block){

let lines = block.split("\n").map(x=>x.trim()).filter(Boolean);

if(lines.length >= 6){

let q = lines[0];
let a = clean(lines[1]);
let b = clean(lines[2]);
let c = clean(lines[3]);
let d = clean(lines[4]);

let ansLine = lines[5].toUpperCase();

let answer = a;

if(ansLine.includes("B")) answer=b;
if(ansLine.includes("C")) answer=c;
if(ansLine.includes("D")) answer=d;

questions.push({
subject:subject,
question:q,
options:[a,b,c,d],
answer:answer
});

count++;

}

});

saveStorage();
showList();
alert(count + " Questions Imported");

}

/* ---------- HELPERS ---------- */
function clean(t){
return t.replace(/^A\)|^B\)|^C\)|^D\)/i,"").trim();
}

function val(id){
return document.getElementById(id).value.trim();
}

function saveStorage(){
localStorage.setItem(
"quizQuestions",
JSON.stringify(questions)
);
}

function clearInputs(){
["question","opt1","opt2","opt3","opt4"].forEach(id=>{
document.getElementById(id).value="";
});
}

/* ---------- SHOW LIST ---------- */
function showList(){

let box = document.getElementById("listBox");

if(questions.length===0){
box.innerHTML="<h3>No Questions Added</h3>";
return;
}

let html = "<h3>Total Questions: "+questions.length+"</h3><br>";

questions.forEach(function(q,i){

html += `
<div class="item">
<b>${i+1}. ${escapeHTML(q.question)}</b>
<div class="small">Subject: ${escapeHTML(q.subject)}</div>
<div class="small">A. ${escapeHTML(q.options[0])}</div>
<div class="small">B. ${escapeHTML(q.options[1])}</div>
<div class="small">C. ${escapeHTML(q.options[2])}</div>
<div class="small">D. ${escapeHTML(q.options[3])}</div>
<div class="small"><b>Answer:</b> ${escapeHTML(q.answer)}</div>
</div>
`;

});

box.innerHTML = html;
}

function clearAll(){

if(confirm("Delete all questions?")){

questions = [];
saveStorage();
showList();

}

}

function escapeHTML(str){
return str.replace(/[&<>"']/g,function(m){
return {
"&":"&amp;",
"<":"&lt;",
">":"&gt;",
'"':"&quot;",
"'":"&#39;"
}[m];
});
}

/* ---------- START ---------- */
showList();

</script>

</body>
</html>
